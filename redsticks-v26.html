<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RedSticks v26 - ESP Absoluta</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --r:#C8102E;--n:#0d0d1a;--n2:#161628;--n3:#1e1e34;
  --g:#16a34a;--a:#f59e0b;--b:#2563eb;--p:#7c3aed;
  --bd:#2a2a44;--bg:#0a0a14;
  --t:#e8e8f8;--t2:#7070a0;--t3:#3a3a5a;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'Barlow Condensed',sans-serif;overflow:hidden}
button,select,input{font-family:'Barlow Condensed',sans-serif;-webkit-appearance:none;touch-action:manipulation}
button{cursor:pointer}
select,input{color:var(--t);background:var(--n3);border:1px solid var(--bd)}

/* LAYOUT */
#app{height:100vh;display:flex;flex-direction:column}

/* HEADER */
#hdr{background:var(--n);border-bottom:1px solid var(--bd);padding:8px 14px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;z-index:50}
.logo{font-size:20px;font-weight:900;letter-spacing:4px;color:var(--t);line-height:1}
.logo em{color:var(--r);font-style:normal}
.logo-sub{font-size:7px;color:var(--t2);letter-spacing:2px}
.hdr-center{flex:1;display:flex;align-items:center;justify-content:center;gap:10px}
.score-wrap{display:flex;align-items:center;gap:6px}
.score-team{font-size:8px;color:var(--t2);letter-spacing:2px;font-weight:700;min-width:28px;text-align:center}
.score-num{font-size:28px;font-weight:900;color:var(--t);font-family:'JetBrains Mono',monospace;width:28px;text-align:center;line-height:1}
.score-sep{font-size:20px;color:var(--t3);margin:0 2px}
.score-adj{background:none;border:1px solid var(--bd);color:var(--t2);width:24px;height:24px;border-radius:5px;font-size:14px;display:flex;align-items:center;justify-content:center}
.timer-wrap{display:flex;flex-direction:column;align-items:center}
.timer{font-size:28px;font-weight:900;font-family:'JetBrains Mono',monospace;color:#4ade80;letter-spacing:2px;line-height:1}
.timer-phase{font-size:7px;color:var(--t2);letter-spacing:2px;font-weight:700;margin-top:1px}
.qpips{display:flex;gap:3px;margin-top:3px}
.qpip{width:20px;height:4px;border-radius:2px;background:var(--t3)}
.qpip-a{background:var(--r)}.qpip-d{background:var(--g)}

/* MAIN TABS */
#main-tabs{display:flex;background:var(--n);border-bottom:1px solid var(--bd);flex-shrink:0}
.mtab{flex:1;background:none;border:none;border-bottom:3px solid transparent;
  color:var(--t2);padding:10px 6px;font-size:9px;letter-spacing:2px;font-weight:800;cursor:pointer}
.mtab-a{border-bottom-color:var(--r);color:var(--t)}

/* SCREENS */
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;padding:12px 14px;padding-bottom:24px}
.screen-a{display:block}

/* SECTION LABEL */
.slbl{font-size:7px;letter-spacing:3px;color:var(--t2);font-weight:800;
  text-transform:uppercase;margin-bottom:8px;margin-top:14px}
.slbl:first-child{margin-top:0}

/* CARDS / TILES */
.card{background:var(--n2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:8px}

/* BUTTONS */
.btn-r{background:var(--r);border:none;color:#fff;padding:11px 18px;
  font-size:10px;letter-spacing:2px;font-weight:800;border-radius:8px;min-height:44px;cursor:pointer}
.btn-n{background:var(--n3);border:1px solid var(--bd);color:var(--t);padding:9px 14px;
  font-size:10px;font-weight:700;border-radius:8px;min-height:40px;cursor:pointer}
.btn-g{background:rgba(22,163,74,.12);border:1px solid rgba(22,163,74,.4);color:#4ade80;
  padding:9px 14px;font-size:10px;font-weight:700;border-radius:8px;min-height:40px;cursor:pointer}
.btn-sm{padding:6px 12px;font-size:9px;min-height:32px;border-radius:6px}

/* FORM */
.finp{background:var(--n3);border:1px solid var(--bd);color:var(--t);padding:10px 12px;
  font-size:13px;border-radius:8px;min-height:44px;width:100%}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.flbl{font-size:8px;letter-spacing:2px;color:var(--t2);width:52px;flex-shrink:0;font-weight:700}

/* PLAYER GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:10px}
.ptile{background:var(--n2);border:1px solid var(--bd);border-radius:9px;padding:9px 11px;cursor:pointer;transition:border-color .15s}
.ptile:active{transform:scale(.97)}
.ptile-f{border-color:var(--g);background:rgba(22,163,74,.07)}
.ptile-b{border-color:var(--a);background:rgba(245,158,11,.05)}
.ptile-o{opacity:.3}
.pt-num{font-size:20px;font-weight:900;color:var(--r);font-family:'JetBrains Mono',monospace;line-height:1}
.pt-name{font-size:11px;font-weight:700;color:var(--t);margin:3px 0 4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-pos{font-size:7px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px;display:inline-block}
.pos-GK{background:rgba(124,58,237,.2);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}
.pos-DEF{background:rgba(37,99,235,.2);color:#60a5fa;border:1px solid rgba(37,99,235,.3)}
.pos-MID{background:rgba(22,163,74,.2);color:#4ade80;border:1px solid rgba(22,163,74,.3)}
.pos-FWD{background:rgba(200,16,46,.2);color:#f87171;border:1px solid rgba(200,16,46,.3)}
.pt-status{font-size:7px;font-weight:800;padding:2px 7px;border-radius:10px;
  margin-top:5px;display:inline-block;letter-spacing:1px}
.st-f{background:rgba(22,163,74,.15);color:#4ade80;border:1px solid rgba(22,163,74,.3)}
.st-b{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.st-o{background:rgba(58,58,90,.3);color:var(--t2);border:1px solid var(--bd)}

/* ROLES TABLE */
.roles-table{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:10px}
.roles-table th{background:var(--n3);color:var(--t2);padding:7px 6px;
  font-size:7px;letter-spacing:1px;font-weight:800;text-align:center;border-bottom:1px solid var(--bd)}
.roles-table th:first-child{text-align:left;padding-left:10px}
.roles-table td{padding:6px;text-align:center;border-bottom:1px solid var(--n3)}
.roles-table td:first-child{text-align:left;padding-left:10px;font-weight:700;font-size:10px}
.roles-table tr:last-child td{border-bottom:none}
.rank-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;cursor:pointer}
.r1{background:var(--a);color:#000}.r2{background:rgba(245,158,11,.3);color:var(--a);border:1px solid rgba(245,158,11,.4)}
.r3{background:rgba(245,158,11,.1);color:var(--t2);border:1px solid var(--bd)}
.r-empty{color:var(--t3);font-size:14px;cursor:pointer}

/* PC VARIANTS */
.var-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.var-card{background:var(--n2);border-radius:10px;padding:11px 13px;cursor:pointer;border:2px solid}
.var-card-d{border-color:rgba(37,99,235,.4);background:rgba(37,99,235,.06)}
.var-card-v{border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.06)}
.var-rank{font-size:7px;font-weight:800;letter-spacing:1px;margin-bottom:3px}
.var-name{font-size:13px;font-weight:900;margin-bottom:6px}
.var-pips{display:flex;flex-wrap:wrap;gap:3px}
.var-pip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff}
.var-pip-d{background:var(--b)}.var-pip-v{background:var(--p)}
.var-unavail{opacity:.4}

/* ─────────────────────────────────
   PROGRAMACION - TIMELINE
───────────────────────────────── */
#prog-screen{padding:0}
.prog-hdr{background:var(--n);border-bottom:1px solid var(--bd);
  padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.qsel{display:flex;gap:4px}
.qsbtn{background:var(--n3);border:1px solid var(--bd);color:var(--t2);
  padding:7px 12px;font-size:9px;font-weight:800;border-radius:6px;letter-spacing:1px;cursor:pointer}
.qsbtn-a{background:var(--r);border-color:var(--r);color:#fff}
.mirror-btn{background:none;border:1px solid rgba(22,163,74,.5);color:#4ade80;
  padding:7px 11px;font-size:8px;font-weight:800;border-radius:6px;letter-spacing:1px;cursor:pointer}
.mirror-off{border-color:var(--bd);color:var(--t2)}

.prog-body{padding:12px 14px;padding-bottom:24px;overflow-y:auto;flex:1}

/* TIMELINE BAR */
.tl-wrap{margin-bottom:16px}
.tl-bar{display:flex;gap:3px;margin-bottom:6px}
.tl-min{flex:1;min-height:48px;border-radius:6px;background:var(--n3);border:1px solid var(--bd);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:all .15s}
.tl-min:active{transform:scale(.93)}
.tl-min-num{font-size:8px;font-weight:800;color:var(--t2);font-family:'JetBrains Mono',monospace}
.tl-min-cd{font-size:7px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.tl-min-dot{width:6px;height:6px;border-radius:50%;background:var(--a);margin-top:3px}
.tl-min-count{font-size:8px;font-weight:800;color:var(--a)}
.tl-min-has{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4)}
.tl-min-start{background:rgba(200,16,46,.12);border-color:rgba(200,16,46,.5);min-height:56px}
.tl-min-start .tl-min-num{color:var(--r)}

/* CHANGE ITEMS */
.chg-item{background:var(--n2);border:1px solid var(--bd);border-radius:9px;
  padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.chg-time{font-size:12px;font-weight:800;color:var(--a);min-width:46px;font-family:'JetBrains Mono',monospace}
.chg-time-start{color:var(--r)}
.chg-out{font-size:13px;color:#f87171;font-weight:800}
.chg-in{font-size:13px;color:#4ade80;font-weight:800}
.chg-arr{color:var(--t3);font-size:13px}
.chg-del{background:none;border:none;color:var(--t3);font-size:18px;margin-left:auto;cursor:pointer;padding:4px}

/* ─────────────────────────────────
   PARTIDO
───────────────────────────────── */
#match-screen{padding:0}
.match-body{padding:10px 14px;padding-bottom:24px;overflow-y:auto}

/* BREAK BANNER */
#break-banner{display:none;background:rgba(37,99,235,.12);border-bottom:2px solid rgba(37,99,235,.4);
  padding:12px 16px;align-items:center;gap:14px;flex-shrink:0}
.brk-timer{font-size:36px;font-weight:900;color:#60a5fa;font-family:'JetBrains Mono',monospace}
.brk-title{font-size:11px;font-weight:800;color:#60a5fa;letter-spacing:2px}
.brk-sub{font-size:9px;color:var(--t2);margin-top:2px}
.brk-btn{background:var(--b);border:none;color:#fff;padding:11px 18px;
  border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;margin-left:auto}

/* PENDING WIDGET */
.pend-widget{background:var(--n2);border:1px solid var(--bd);border-radius:10px;
  overflow:hidden;margin-bottom:10px}
.pend-hdr{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid var(--bd);gap:8px}
.pend-title{font-size:8px;font-weight:800;letter-spacing:2px;color:var(--t2)}
.pend-count{background:var(--r);color:#fff;font-size:8px;font-weight:800;
  padding:2px 8px;border-radius:10px}
.pend-row{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid var(--n)}
.pend-row:last-child{border-bottom:none}
.pend-row-now{background:rgba(200,16,46,.08)}
.pr-cd{font-size:11px;font-weight:800;min-width:44px;font-family:'JetBrains Mono',monospace}
.pr-cd-now{color:var(--r)}.pr-cd-soon{color:var(--a)}.pr-cd-ok{color:var(--t2)}
.pr-out{font-size:12px;font-weight:800;color:#f87171}
.pr-in{font-size:12px;font-weight:800;color:#4ade80}
.pr-sep{color:var(--t3);font-size:11px}
.pr-exec{background:var(--r);border:none;color:#fff;padding:7px 13px;
  border-radius:7px;font-size:10px;font-weight:800;cursor:pointer;margin-left:auto;letter-spacing:1px}
.pr-exec-done{background:rgba(22,163,74,.15);border:1px solid rgba(22,163,74,.4);color:#4ade80}

/* FIELD */
.field-wrap{width:100%;aspect-ratio:91.4/55;position:relative;
  border-radius:10px;overflow:visible;margin-bottom:8px}
.tok{position:absolute;width:52px;height:46px;border-radius:8px;border:2px solid;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;cursor:pointer;touch-action:none;user-select:none}
.tok-num{font-size:13px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.tok-name{font-size:6px;font-weight:700;max-width:48px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tok-time{font-size:6px;opacity:.7;font-family:'JetBrains Mono',monospace}
.tok-gk{background:#7c3aed;border-color:#6d28d9}
.tok-def{background:var(--b);border-color:#1d4ed8}
.tok-mid{background:var(--g);border-color:#15803d}
.tok-fwd{background:var(--r);border-color:#991b1b}
@keyframes tokAlert{0%,100%{transform:scale(1)}50%{transform:scale(1.1);box-shadow:0 0 0 5px rgba(245,158,11,.4)}}
.tok-pend{animation:tokAlert .85s ease infinite!important;border-color:var(--a)!important}

/* EVENT BUTTONS */
.ev-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.ev-btn{padding:10px 4px;border-radius:9px;border:2px solid;font-size:10px;font-weight:800;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:50px;letter-spacing:.5px}
.ev-sub{font-size:7px;opacity:.6;font-weight:600}
.ev-pcp{background:rgba(37,99,235,.1);border-color:var(--b);color:#60a5fa}
.ev-pcn{background:rgba(245,158,11,.08);border-color:var(--a);color:#fbbf24}
.ev-gp{background:rgba(22,163,74,.1);border-color:var(--g);color:#4ade80}
.ev-gn{background:rgba(200,16,46,.1);border-color:var(--r);color:#f87171}

/* CTRL BUTTONS */
.ctrl-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ctrl-play{background:rgba(22,163,74,.12);border:2px solid rgba(22,163,74,.4);color:#4ade80;
  padding:10px 16px;font-size:10px;font-weight:800;border-radius:8px;cursor:pointer;min-height:42px;letter-spacing:1px;flex:1}
.ctrl-pause{background:rgba(245,158,11,.1);border:2px solid rgba(245,158,11,.3);color:#fbbf24;
  padding:10px 16px;font-size:10px;font-weight:800;border-radius:8px;cursor:pointer;min-height:42px;letter-spacing:1px;flex:1}
.ctrl-end{background:rgba(200,16,46,.1);border:2px solid rgba(200,16,46,.3);color:#f87171;
  padding:10px 16px;font-size:10px;font-weight:800;border-radius:8px;cursor:pointer;min-height:42px;letter-spacing:1px}

/* PC PANEL */
#pc-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.75);z-index:400;align-items:center;justify-content:center;padding:16px}
.pc-box{background:var(--n2);border:1px solid var(--bd);border-radius:14px;
  padding:18px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.pc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pc-title{font-size:10px;font-weight:800;letter-spacing:2px;color:#60a5fa}
.pc-close{background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer}
.pc-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pc-col-title{font-size:8px;font-weight:800;letter-spacing:2px;margin-bottom:8px}
.pc-item{border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;border:2px solid;transition:transform .1s}
.pc-item:active{transform:scale(.97)}
.pc-item-d{background:rgba(37,99,235,.1);border-color:rgba(37,99,235,.4)}
.pc-item-v{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.4)}
.pc-item-unavail{opacity:.35;cursor:default}
.pc-rank{font-size:7px;font-weight:800;margin-bottom:3px}
.pc-name{font-size:14px;font-weight:900;margin-bottom:6px}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  align-items:center;justify-content:center;z-index:500;padding:16px}
.modal-box{background:var(--n2);border:1px solid var(--bd);border-radius:14px;
  padding:20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
.modal-box button{touch-action:manipulation}
.modal-title{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--t);margin-bottom:14px}
.modal-acts{display:flex;gap:8px;margin-top:14px}

/* TOASTS */
#toasts{position:fixed;top:8px;right:8px;z-index:600;display:flex;flex-direction:column;gap:4px;max-width:300px;pointer-events:none}
.toast{padding:9px 13px;border-radius:9px;font-size:11px;font-weight:700;
  pointer-events:all;box-shadow:0 4px 16px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px}
.t-ok{background:#052e16;border:1px solid rgba(22,163,74,.5);color:#4ade80}
.t-warn{background:#1c1a05;border:1px solid rgba(245,158,11,.5);color:#fbbf24}
.t-urgent{background:#2d0a0a;border:1px solid rgba(200,16,46,.5);color:#f87171}
.t-info{background:#0a1628;border:1px solid rgba(37,99,235,.5);color:#60a5fa}
.t-x{background:none;border:none;color:inherit;font-size:16px;margin-left:auto;cursor:pointer;pointer-events:all}

/* INFORME */
.inf-player{background:var(--n2);border:1px solid var(--bd);border-radius:9px;padding:10px 13px;margin-bottom:6px}
.inf-bar{height:4px;background:var(--n3);border-radius:4px;margin:5px 0;overflow:hidden}
.inf-fill{height:100%;background:linear-gradient(90deg,var(--r),#f59e0b);border-radius:4px}
</style>
</head>
<body>
<div id="app">

  <!-- TOASTS -->
  <div id="toasts"></div>

  <!-- PC PANEL (overlay) -->
  <div id="pc-panel" onclick="if(event.target===this)closePCP()">
    <div class="pc-box" id="pc-box"></div>
  </div>

  <!-- MODAL -->
  <div id="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" id="modal-box" onclick="event.stopPropagation()"></div>
  </div>

  <!-- HEADER -->
  <header id="hdr">
    <div>
      <div class="logo">RED<em>STICKS</em></div>
      <div class="logo-sub">ESP ABSOLUTA</div>
    </div>
    <div class="hdr-center" id="hdr-center" style="display:none">
      <div class="score-wrap">
        <div>
          <div class="score-team">ESP</div>
          <div style="display:flex;align-items:center;gap:3px">
            <button class="score-adj" onclick="adjScore('h',-1)">-</button>
            <div class="score-num" id="sc-h">0</div>
            <button class="score-adj" onclick="adjScore('h',1)">+</button>
          </div>
        </div>
        <div class="score-sep">-</div>
        <div>
          <div class="score-team" id="riv-lbl">RIV</div>
          <div style="display:flex;align-items:center;gap:3px">
            <button class="score-adj" onclick="adjScore('a',-1)">-</button>
            <div class="score-num" id="sc-a">0</div>
            <button class="score-adj" onclick="adjScore('a',1)">+</button>
          </div>
        </div>
      </div>
      <div class="timer-wrap">
        <div class="timer" id="timer-display">15:00</div>
        <div class="timer-phase" id="phase-lbl">PRE-PARTIDO</div>
        <div class="qpips" id="qpips"></div>
      </div>
    </div>
    <button onclick="openRivModal()" style="margin-left:auto;background:none;border:1px solid var(--bd);color:var(--t2);padding:5px 10px;font-size:8px;font-weight:700;border-radius:6px;letter-spacing:1px;cursor:pointer" id="riv-btn">ESP vs ?</button>
  </header>

  <!-- MAIN TABS -->
  <div id="main-tabs">
    <button class="mtab mtab-a" onclick="navTo('plantilla')">PLANTILLA</button>
    <button class="mtab" onclick="navTo('prog')">PROGRAMA</button>
    <button class="mtab" onclick="navTo('partido')">PARTIDO</button>

var QD = 15*60;

function ft(s){
  if(s < 0) s = 0;
  return pad(Math.floor(s/60)) + ":" + pad(Math.floor(s) % 60);
}
function pad(n){ return n < 10 ? "0"+n : ""+n; }
function gP(id){ for(var i=0;i<POOL.length;i++){ if(POOL[i].id===id) return POOL[i]; } return null; }
function isQ(){ return ["q1","q2","q3","q4"].indexOf(S.phase) >= 0; }
function isBk(){ return S.phase.charAt(0)==="b"; }
function qI(){ return ["q1","q2","q3","q4"].indexOf(S.phase); }
function qNum(){ return qI()+1; }
function cdQ(){ return ft(Math.max(0, QD - S.qElapsed)); }
function inSquad(id){ return S.squad.indexOf(id)>=0 || S.bench.indexOf(id)>=0; }
function onField(id){ return S.squad.indexOf(id)>=0; }

function fieldAfterPairs(upToQ, upToCd) {
  // Compute field state at a given point in a quarter
  // Start from S.squad, apply pairs in order
  var f = S.squad.slice();
  var pairs = sortedPairs();
  for(var i=0;i<pairs.length;i++){
    var p = pairs[i];
    if(p.q > upToQ) break;
    if(p.q === upToQ && p.cd > upToCd) break; // cd descending so higher cd = earlier
    if(p.q < upToQ || (p.q === upToQ && p.cd >= upToCd)){
      var oi = f.indexOf(p.out);
      if(oi >= 0){ f.splice(oi,1); if(f.indexOf(p.inp)<0) f.push(p.inp); }
    }
  }
  return f;
}

function sortedPairs(){
  // Sort: by quarter ASC, then within quarter by cd DESC (higher cd = earlier in quarter)
  return S.pairs.slice().sort(function(a,b){
    if(a.q !== b.q) return a.q - b.q;
    return b.cd - a.cd; // cd=14 happens at min 01:00 first in countdown terms? 
    // cd=14 means countdown was 14:00 → happened at 1 min elapsed
    // cd=1 means countdown was 01:00 → happened at 14 min elapsed
    // So higher cd = earlier. Sort desc to get execution order.
  });
}

// ── TOASTS ──
var _toasts = [];
function toast(msg, type){
  type = type || "info";
  var id = Date.now() + Math.random();
  _toasts.push({id:id,msg:msg,type:type});
  renderToasts();
  var dur = type==="urgent" ? 18000 : 6000;
  setTimeout(function(){ _toasts = _toasts.filter(function(t){ return t.id!==id; }); renderToasts(); }, dur);
}
function renderToasts(){
  var el = document.getElementById("toasts"); if(!el) return;
  var cls = {ok:"t-ok",warn:"t-warn",urgent:"t-urgent",info:"t-info"};
  el.innerHTML = _toasts.map(function(t){
    var c = cls[t.type]||"t-info";
    return '<div class="toast ' + c + '"><span style="flex:1">' + t.msg + '</span>' +
      '<button class="t-x" onclick="dismissToast('+t.id+')">x</button></div>';
  }).join("");
}
function dismissToast(id){ _toasts = _toasts.filter(function(t){ return t.id!==id; }); renderToasts(); }

function cyclePlayer(id){
  var inf = S.squad.indexOf(id);
  var ben = S.bench.indexOf(id);
  if(inf >= 0){
    // Campo -> Banquillo
    S.squad.splice(inf,1);
    S.bench.push(id);
  } else if(ben >= 0){
    // Banquillo -> No conv
    S.bench.splice(ben,1);
  } else {
    // No conv -> Banquillo (safer default)
    S.bench.push(id);
  }
  scheduleSave();
  // Update just that tile
  var tile = document.querySelector("[data-pid='"+id+"']");
  if(tile){ renderPlantilla(); } // re-render for simplicity
}

function setQ(q){ S.curQ=q; renderProg(); }

function renderTimeline(){
  var el=document.getElementById("prog-body"); if(!el) return;
  var q=S.curQ;
  var qPairs=S.pairs.filter(function(p){ return p.q===q; });
  var byMin={};
  qPairs.forEach(function(p){
    if(!byMin[p.cd]) byMin[p.cd]=[];
    byMin[p.cd].push(p);
  });

  var h = "";

  // INICIO DE CUARTO (cd=0) - only for Q2,Q3,Q4
  if(q > 1){
    var startPairs = byMin[0] || [];
    h += '<div style="margin-bottom:16px">';
    h += '<div style="font-size:8px;font-weight:800;color:var(--r);letter-spacing:2px;margin-bottom:8px">INICIO Q'+q+' — SE EJECUTA AL FINALIZAR Q'+(q-1)+'</div>';
    h += '<div style="background:rgba(200,16,46,.08);border:1px solid rgba(200,16,46,.3);border-radius:10px;padding:10px 13px;margin-bottom:6px">';
    if(startPairs.length){
      startPairs.forEach(function(p){
        var pO=gP(p.out),pI=gP(p.inp);
        h += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(200,16,46,.15)">';
        h += '<span style="font-size:9px;font-weight:800;color:var(--r);min-width:52px">INICIO Q'+q+'</span>';
        h += '<span class="chg-out">SALE #'+(pO?pO.num:"?")+' '+(pO?pO.nick:"?")+'</span>';
        h += '<span class="chg-arr">-></span>';
        h += '<span class="chg-in">ENTRA #'+(pI?pI.num:"?")+' '+(pI?pI.nick:"?")+'</span>';
        h += '<button class="chg-del" onclick="deletePair('+p.id+')">x</button>';
        h += '</div>';
      });
    } else {
      h += '<div style="font-size:10px;color:var(--t2)">Sin cambios de inicio — toca + para anadir</div>';
    }
    h += '<button onclick="openAddPairModal('+q+',0)" style="margin-top:8px;background:none;border:1px solid rgba(200,16,46,.4);color:#f87171;padding:6px 14px;font-size:9px;font-weight:800;border-radius:6px;cursor:pointer;letter-spacing:1px">+ ANADIR CAMBIO DE INICIO</button>';
    h += '</div></div>';
  }

  // TIMELINE BAR (minutes 1-14 = cd 14 down to 1)
  h += '<div class="slbl">TIMELINE Q'+q+(S.mirror&&q<=2?" (ESPEJO Q"+(q+2)+")":"")+'</div>';
  h += '<div class="tl-wrap"><div class="tl-bar">';
  // cd goes from 14 (early) to 1 (late)
  // Display as countdown: cd=14 -> "14:00", cd=1 -> "01:00"
  for(var cd=14; cd>=1; cd--){
    var hasPairs = (byMin[cd]||[]).length > 0;
    var count = (byMin[cd]||[]).length;
    h += '<div class="tl-min'+(hasPairs?" tl-min-has":"")+'" onclick="openAddPairModal('+q+','+cd+')">';
    h += '<div class="tl-min-cd">'+pad(cd)+':00</div>';
    if(hasPairs){
      h += '<div class="tl-min-count">'+count+'x</div>';
    }
    h += '</div>';
  }
  h += '</div>';
  h += '<div style="display:flex;justify-content:space-between;font-size:7px;color:var(--t3);margin-top:2px">';
  h += '<span>INICIO Q'+q+'</span><span>FIN Q'+q+'</span></div></div>';

  // CHANGES LIST
  h += '<div class="slbl">CAMBIOS Q'+q+'</div>';
  // Sort by cd desc (early first)
  var allQPairs = qPairs.filter(function(p){ return p.cd>0; }).sort(function(a,b){ return b.cd-a.cd; });
  if(!allQPairs.length){
    h += '<div style="color:var(--t2);font-size:11px;padding:10px 0">Sin cambios en Q'+q+'. Toca un minuto del timeline para anadir.</div>';
  } else {
    allQPairs.forEach(function(p){
      var pO=gP(p.out),pI=gP(p.inp);
      h += '<div class="chg-item">';
      h += '<span class="chg-time">'+pad(p.cd)+':00</span>';
      h += '<span class="chg-out">SALE #'+(pO?pO.num:"?")+' '+(pO?pO.nick:"?")+'</span>';
      h += '<span class="chg-arr">-></span>';
      h += '<span class="chg-in">ENTRA #'+(pI?pI.num:"?")+' '+(pI?pI.nick:"?")+'</span>';
      h += '<button class="chg-del" onclick="deletePair('+p.id+')">x</button>';
      h += '</div>';
    });
  }
  h += '<button class="btn-r" style="width:100%;margin-top:16px" onclick="navTo_partido()">IR AL PARTIDO</button>';
  el.innerHTML = h;
}

function openAddPairModal(q, cd){
  // Compute who is on field at that point
  var fieldAtPoint = computeFieldAt(q, cd);
  var allConv = S.squad.concat(S.bench);
  var onF = fieldAtPoint.filter(function(id){ return allConv.indexOf(id)>=0; });
  var offF = allConv.filter(function(id){ return onF.indexOf(id)<0; });
  var outOpts = onF.sort(function(a,b){ var pa=gP(a),pb=gP(b); return (pa?pa.num:0)-(pb?pb.num:0); })
                   .map(function(id){ var p=gP(id); return p?'<option value="'+id+'">#'+p.num+' '+p.nick+'</option>':""; }).join("");
  var inOpts = offF.sort(function(a,b){ var pa=gP(a),pb=gP(b); return (pa?pa.num:0)-(pb?pb.num:0); })
                   .map(function(id){ var p=gP(id); return p?'<option value="'+id+'">#'+p.num+' '+p.nick+'</option>':""; }).join("");
  var timeLabel = cd===0 ? "INICIO Q"+q : pad(cd)+":00";
  openModal(
    '<div class="modal-title">CAMBIO ' + timeLabel + ' — Q' + q + '</div>' +
    '<div style="font-size:9px;color:var(--t2);margin-bottom:12px">Campo en ese momento: '+onF.length+' jugadores</div>' +
    '<div class="frow"><label class="flbl">SALE</label><select class="finp" id="p-out" style="color:#f87171"><option value="">— quien sale —</option>'+outOpts+'</select></div>' +
    '<div class="frow"><label class="flbl">ENTRA</label><select class="finp" id="p-in" style="color:#4ade80"><option value="">— quien entra —</option>'+inOpts+'</select></div>' +
    '<div class="modal-acts">' +
    '<button class="btn-r" style="flex:1" onclick="addPair('+q+','+cd+')">ANADIR</button>' +
    '<button class="btn-n" onclick="closeModal()">CANCELAR</button>' +
    '</div>' +
    '<div style="font-size:8px;color:var(--t2);margin-top:10px">Para anadir varios cambios en el mismo minuto, vuelve a tocar el minuto y repite.</div>'
  );
}

function computeFieldAt(q, cd){
  // Start from initial squad, apply pairs up to this point
  var field = S.squad.slice();
  var allPairs = sortedPairs();
  for(var i=0;i<allPairs.length;i++){
    var p = allPairs[i];
    // Apply pairs that happen BEFORE this point
    var before = false;
    if(p.q < q) before = true;
    else if(p.q === q){
      if(cd === 0){
        // inicio de quarter - don't apply any same-q pairs
        before = false;
      } else {
        // cd descending: pairs with higher cd happen earlier
        before = p.cd > cd;
      }
    }
    if(before){
      var oi = field.indexOf(p.out);
      if(oi >= 0){ field.splice(oi,1); if(field.indexOf(p.inp)<0) field.push(p.inp); }
    }
  }
  return field;
}

function addPair(q, cd){
  var outEl=document.getElementById("p-out"), inEl=document.getElementById("p-in");
  var outId=parseInt(outEl?outEl.value:""), inId=parseInt(inEl?inEl.value:"");
  if(!outId||!inId) return toast("Selecciona quien sale y quien entra","warn");
  S.pairs.push({id:Date.now(),q:q,cd:cd,out:outId,inp:inId});
  closeModal(); scheduleSave(); renderProg();
  toast("Cambio anadido","ok");
}

function deletePair(id){
  S.pairs = S.pairs.filter(function(p){ return p.id!==id; });
  scheduleSave(); renderProg();
}

function renderPending(){
  if(!isQ()) return "";
  var q=qNum(), elapsed=S.qElapsed;
  var pending=getPendingNow(q,elapsed);
  if(!pending.length) return '<div style="font-size:9px;color:var(--t2);padding:8px 0;margin-bottom:8px">Sin cambios pendientes</div>';
  var h='<div class="pend-widget"><div class="pend-hdr"><span class="pend-title">CAMBIOS PENDIENTES</span><span class="pend-count">'+pending.length+'</span></div>';
  pending.forEach(function(p){
    var pO=gP(p.out),pI=gP(p.inp);
    var secLeft = p.cd*60 - elapsed;
    var isNow=secLeft<=0,isSoon=!isNow&&secLeft<=60;
    var cdCls=isNow?"pr-cd-now":isSoon?"pr-cd-soon":"pr-cd-ok";
    var cdTxt=isNow?"AHORA":ft(secLeft);
    var rowCls=isNow?" pend-row-now":"";
    h+='<div class="pend-row'+rowCls+'">';
    h+='<span class="pr-cd '+cdCls+'">'+cdTxt+'</span>';
    h+='<span class="pr-out">SALE #'+(pO?pO.num:"?")+" "+(pO?pO.nick:"?")+'</span>';
    h+='<span class="pr-sep">-></span>';
    h+='<span class="pr-in">ENTRA #'+(pI?pI.num:"?")+" "+(pI?pI.nick:"?")+'</span>';
// NEEDS MANUAL FIX:     h+='<button class="pr-exec" onclick="execPair('+p.id+',''+( p.mk||"")+'')">OK</button>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function getPendingNow(q, elapsed){
  var result=[];
  var srcQ = S.mirror&&(q===3||q===4) ? q-2 : q;
  S.pairs.filter(function(p){ return p.q===srcQ&&p.cd>0; }).forEach(function(p){
    var mk = (q===3?"m3_":q===4?"m4_":"") + p.id;
    var execKey = (q===3||q===4) ? mk : String(p.id);
    if(S.execIds.indexOf(execKey)>=0) return;
    var secLeft = p.cd*60 - elapsed;
    if(secLeft <= 90){
      result.push({id:p.id,out:p.out,inp:p.inp,cd:p.cd,mk:(q===3||q===4)?mk:"",secLeft:secLeft});
    }
  });
  return result.sort(function(a,b){ return a.secLeft-b.secLeft; });
}

function execPair(pairId, mk){
  // Find pair - either by id or mirror key
  var srcId = mk ? parseInt(mk.replace("m3_","").replace("m4_","")) : pairId;
  var pair = S.pairs.filter(function(p){ return p.id===srcId; })[0];
  if(!pair) return;
  var execKey = mk || String(pairId);
  if(S.execIds.indexOf(execKey)>=0) return;
  S.execIds.push(execKey);
  // Execute
  var oi=S.squad.indexOf(pair.out);
  if(oi>=0){ S.squad.splice(oi,1); if(S.squad.indexOf(pair.inp)<0) S.squad.push(pair.inp); }
  // Update positions
  if(S.pos[pair.out]) S.pos[pair.inp]={x:S.pos[pair.out].x,y:S.pos[pair.out].y};
  S.log.push({type:"sub",sec:S.matchTime,outId:pair.out,inId:pair.inp,sit:""});
  var pO=gP(pair.out),pI=gP(pair.inp);
  toast("CAMBIO: #"+(pO?pO.num:"?")+" "+(pO?pO.nick:"?")+" -> #"+(pI?pI.num:"?")+" "+(pI?pI.nick:"?"),"ok");
  scheduleSave();
  renderPartido();
}

function buildField(){
  var fc="#1a3a1a";
  var W=100,H=60,l="rgba(255,255,255,0.25)";
  var svg='<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">';
  svg+='<rect width="'+W+'" height="'+H+'" fill="'+fc+'"/>';
  svg+='<rect x="1" y="1" width="98" height="58" fill="none" stroke="'+l+'" stroke-width="0.6"/>';
  svg+='<line x1="50" y1="1" x2="50" y2="59" stroke="'+l+'" stroke-width="0.4"/>';
  svg+='<line x1="25" y1="1" x2="25" y2="59" stroke="'+l+'" stroke-width="0.4"/>';
  svg+='<line x1="75" y1="1" x2="75" y2="59" stroke="'+l+'" stroke-width="0.4"/>';
  svg+='<clipPath id="cl"><rect x="1" y="1" width="24" height="58"/></clipPath>';
  svg+='<circle cx="1" cy="30" r="18" fill="none" stroke="'+l+'" stroke-width="0.5" clip-path="url(#cl)"/>';
  svg+='<circle cx="99" cy="30" r="18" fill="none" stroke="'+l+'" stroke-width="0.5" clip-path="url(#cl2)"/>';
  svg+='<clipPath id="cl2"><rect x="75" y="1" width="24" height="58"/></clipPath>';
  svg+='<circle cx="50" cy="30" r="0.5" fill="'+l+'"/></svg>';
  var toks="";
  var posColor={GK:"tok-gk",DEF:"tok-def",MID:"tok-mid",FWD:"tok-fwd"};
  var pending=isQ()?getPendingNow(qNum(),S.qElapsed):[];
  var pendOut=pending.map(function(p){ return p.out; });
  S.squad.forEach(function(id){
    if(S.pb.indexOf(id)>=0) return;
    var p=gP(id); if(!p) return;
    var ps=S.pos[id]||{x:50,y:50};
    var isPend=pendOut.indexOf(id)>=0;
    var cls="tok "+(posColor[p.pos]||"tok-mid")+(isPend?" tok-pend":"");
    var pt=playedTime(id);
    toks+='<div class="'+cls+'" data-fid="'+id+'" '+
      'style="left:calc('+ps.x+'% - 26px);top:calc('+ps.y+'% - 23px)" '+
      'onclick="tapToken('+id+')">';
    toks+='<div class="tok-num">#'+p.num+'</div>';
    toks+='<div class="tok-name">'+p.nick+'</div>';
    toks+='<div class="tok-time">'+ft(pt)+'</div>';
    toks+='</div>';
  });
  return '<div class="field-wrap" id="field-wrap">'+svg+toks+'</div>';
}

function tapToken(id){
  var pending=getPendingNow(qNum(),S.qElapsed);
  var pend=pending.filter(function(p){ return p.out===id; })[0];
  if(pend){
    openModal(
      '<div class="modal-title">CAMBIO PENDIENTE</div>' +

      '<div style="font-size:9px;color:#f87171;font-weight:700;margin-bottom:4px">SALE</div>' +
      '<div style="font-size:16px;font-weight:900;color:var(--t)">#'+(gP(pend.out)?gP(pend.out).num:"?")+'</div>' +
      '<div style="font-size:11px;color:var(--t2)">'+(gP(pend.out)?gP(pend.out).nick:"?")+'</div></div>' +
      '<div style="font-size:20px;color:var(--t3);align-self:center">-></div>' +
      '<div style="flex:1;background:rgba(22,163,74,.12);border:1px solid rgba(22,163,74,.3);border-radius:9px;padding:10px;text-align:center">' +
      '<div style="font-size:9px;color:#4ade80;font-weight:700;margin-bottom:4px">ENTRA</div>' +
      '<div style="font-size:16px;font-weight:900;color:var(--t)">#'+(gP(pend.inp)?gP(pend.inp).num:"?")+'</div>' +
      '<div style="font-size:11px;color:var(--t2)">'+(gP(pend.inp)?gP(pend.inp).nick:"?")+'</div></div></div>' +

// NEEDS MANUAL FIX:       '<button class="btn-r" style="flex:1;padding:14px;font-size:13px" onclick="execPair('+pend.id+',''+pend.mk+'');closeModal()">EJECUTAR</button>' +
      '<button class="btn-n" onclick="closeModal()">CANCELAR</button></div>'
    );
  } else {
    openManualSub(id);
  }
}

function openManualSub(outId){
  var p=gP(outId);
  var bench=S.bench.filter(function(id){ return S.squad.indexOf(id)<0; });
  var inOpts=bench.sort(function(a,b){ var pa=gP(a),pb=gP(b); return (pa?pa.num:0)-(pb?pb.num:0); })
               .map(function(id){ var p=gP(id); return p?'<option value="'+id+'">#'+p.num+' '+p.nick+'</option>':""; }).join("");
  openModal(
    '<div class="modal-title">CAMBIO MANUAL</div>' +
    '<div style="font-size:11px;color:#f87171;font-weight:700;margin-bottom:12px">SALE: #'+(p?p.num:"?")+" "+(p?p.nick:"?")+'</div>' +
    '<div class="frow"><label class="flbl">ENTRA</label><select class="finp" id="ms-in" style="color:#4ade80"><option value="">— quien entra —</option>'+inOpts+'</select></div>' +
    '<div class="modal-acts"><button class="btn-r" style="flex:1" onclick="confirmManualSub('+outId+')">EJECUTAR</button><button class="btn-n" onclick="closeModal()">CANCELAR</button></div>'
  );
}
function confirmManualSub(outId){
  var el=document.getElementById("ms-in");
  var inId=el?parseInt(el.value):0;
  if(!inId) return toast("Selecciona quien entra","warn");
  var oi=S.squad.indexOf(outId);
  if(oi>=0){ S.squad.splice(oi,1); if(S.squad.indexOf(inId)<0) S.squad.push(inId); }
  if(S.pos[outId]) S.pos[inId]={x:S.pos[outId].x,y:S.pos[outId].y};
  S.log.push({type:"sub",sec:S.matchTime,outId:outId,inId:inId,sit:"manual"});
  var pO=gP(outId),pI=gP(inId);
  toast("CAMBIO MANUAL: #"+(pO?pO.num:"?")+" -> #"+(pI?pI.num:"?"),"ok");
  closeModal(); scheduleSave(); renderPartido();
}

// ── PC VARIANTS ──
function trigPC(side){
  if(S.running){ S.running=false; stopTmr(); }
  S.events.push({id:Date.now(),lbl:"PC_"+(side==="p"?"ESP":S.rival),start:Math.max(0,S.matchTime-2),end:S.matchTime+5});
  if(side==="p") openPCPanel();
  renderHdr(); if(CUR_SCREEN==="partido") renderPartido();
}

function openPCPanel(){
  var onFieldNow = S.squad.slice();
  var avail = S.pcVars.filter(function(v){ return v.pids.every(function(pid){ return onFieldNow.indexOf(pid)>=0; }); });
  var dirs = avail.filter(function(v){ return v.cat==="direct"; }).sort(function(a,b){ return a.rank-b.rank; });
  var vrs  = avail.filter(function(v){ return v.cat!=="variant"; return v.cat==="variant"; }).sort(function(a,b){ return a.rank-b.rank; });
  // fix above
  vrs = avail.filter(function(v){ return v.cat==="variant"; }).sort(function(a,b){ return a.rank-b.rank; });
  var notAvail = S.pcVars.filter(function(v){ return !v.pids.every(function(pid){ return onFieldNow.indexOf(pid)>=0; }); });
  function renderGroup(items, col, pipCls){
    if(!items.length) return '<div style="color:var(--t2);font-size:10px;padding:6px">Ninguna disponible</div>';
    return items.map(function(v){
      var pls=v.pids.map(function(pid){ var p=gP(pid); return p?p.nick:"?"; });
      return '<div class="pc-item pc-item-'+(v.cat==="direct"?"d":"v")+'" onclick="selectVariant('+v.id+')">' +
        '<div class="pc-rank" style="color:'+col+'">R'+v.rank+'</div>' +
        '<div class="pc-name" style="color:'+col+'">'+v.name+'</div>' +
        '<div class="var-pips">'+pls.map(function(n){ return '<span class="var-pip '+pipCls+'">'+n+'</span>'; }).join("")+'</div>' +
        '</div>';
    }).join("");
  }
  var notAvailH = "";
  if(notAvail.length){
    notAvailH = '<div style="margin-top:12px;border-top:1px solid var(--bd);padding-top:12px">' +
      '<div style="font-size:8px;color:var(--t2);font-weight:700;letter-spacing:2px;margin-bottom:6px">NO DISPONIBLES (jugadores fuera de campo)</div>' +
      notAvail.map(function(v){ return '<div class="pc-item pc-item-'+(v.cat==="direct"?"d":"v")+' pc-item-unavail"><div class="pc-rank">R'+v.rank+'</div><div class="pc-name">'+v.name+'</div></div>'; }).join("") +
      '</div>';
  }
  document.getElementById("pc-box").innerHTML =
    '<div class="pc-hdr"><span class="pc-title">PC+ OPCIONES DISPONIBLES ('+avail.length+'/'+S.pcVars.length+')</span><button class="pc-close" onclick="closePCP()">x</button></div>' +
    '<div class="pc-cols">' +
    '<div><div class="pc-col-title" style="color:#60a5fa">DIRECTOS ('+dirs.length+')</div>'+renderGroup(dirs,"#60a5fa","var-pip-d")+'</div>' +
    '<div><div class="pc-col-title" style="color:#a78bfa">VARIANTES ('+vrs.length+')</div>'+renderGroup(vrs,"#a78bfa","var-pip-v")+'</div>' +
    '</div>' + notAvailH +
    '<button onclick="closePCP()" style="width:100%;margin-top:14px;background:none;border:1px solid var(--bd);color:var(--t2);padding:10px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer">CERRAR</button>';
  document.getElementById("pc-panel").style.display="flex";
}
function closePCP(){ document.getElementById("pc-panel").style.display="none"; }
function selectVariant(id){
  var v=S.pcVars.filter(function(x){ return x.id===id; })[0]; if(!v) return;
  closePCP();
  toast("PC: "+v.name+" — COMUNICAR AL CAMPO","info");
}

// ── GOL ──
function trigGol(side){
  S.events.push({id:Date.now(),lbl:"GOL_"+(side==="p"?"ESP":S.rival),start:Math.max(0,S.matchTime-5),end:S.matchTime+5});
  if(side==="p"){ S.score.h++; var sh=document.getElementById("sc-h"); if(sh) sh.textContent=S.score.h; }
  else{ S.score.a++; var sa=document.getElementById("sc-a"); if(sa) sa.textContent=S.score.a; }
  if(S.running){ S.running=false; stopTmr(); }
  var cd=40;
  clearInterval(stopInt);
  stopInt=setInterval(function(){
    cd--;
    if(cd<=0){ clearInterval(stopInt); S.running=true; startTmr(); }
    renderHdr();
  },1000);
  toast("GOL "+(side==="p"?"ESP":S.rival)+" — reanuda en 40s","info");
  renderHdr(); if(CUR_SCREEN==="partido") renderPartido();
}

// ── TIMER ──
function startTmr(){
  clearInterval(tiInt); if(!S.running) return;
  tiInt=setInterval(function(){
    if(isBk()){
      S.breakCd--;
      if(S.breakCd<=0){ S.running=false; S.breakCd=0; clearInterval(tiInt); renderHdr(); }
    } else if(isQ()){
      S.qElapsed++; S.matchTime++;
      if(S.qElapsed>=QD){ autoEndQ(); return; }
      checkAlerts();
    }
    renderHdr();
    if(CUR_SCREEN==="partido") updateFieldTimes();
  },1000);
}
function stopTmr(){ clearInterval(tiInt); }

function startQ(){
  if(S.phase==="pre"){
    S.log=[{type:"init",ids:S.squad.slice(),sec:0}];
    S.execIds=[]; S.alerted={}; S.cards=[]; S.pb=[]; S.events=[];
    S.score={h:0,a:0}; S.matchTime=0; S.qElapsed=0; S.qLog=[];
    var sh=document.getElementById("sc-h"); if(sh) sh.textContent="0";
    var sa=document.getElementById("sc-a"); if(sa) sa.textContent="0";
  }
  var bb=document.getElementById("break-banner"); if(bb) bb.style.display="none";
  S.phase="q1"; S.qElapsed=0; S.running=true;
  startTmr(); renderHdr(); if(CUR_SCREEN==="partido") renderPartido();
}

function startNextQ(){
  var nq={b12:"q2",b23:"q3",b34:"q4"}[S.phase]; if(!nq) return;
  var bb=document.getElementById("break-banner"); if(bb) bb.style.display="none";
  S.phase=nq; S.qElapsed=0; S.running=true;
  startTmr(); renderHdr(); if(CUR_SCREEN==="partido") renderPartido();
}

function pauseGame(){ S.running=false; stopTmr(); renderHdr(); if(CUR_SCREEN==="partido") renderPartido(); }
function resumeGame(){ S.running=true; startTmr(); renderHdr(); if(CUR_SCREEN==="partido") renderPartido(); }

function endQ(){
  stopTmr(); S.running=false;
  S.qLog.push({num:qNum(),start:S.matchTime-S.qElapsed,end:S.matchTime});
  var nxt={q1:"b12",q2:"b23",q3:"b34",q4:"ended"}[S.phase];
  if(nxt==="ended"){ S.phase="ended"; renderHdr(); if(CUR_SCREEN==="partido") renderPartido(); return; }
  // Execute inicio-de-cuarto pairs for next quarter
  var nextQNum={b12:2,b23:3,b34:4}[nxt];
  var initPairs=S.pairs.filter(function(p){ return p.q===nextQNum&&p.cd===0; });
  initPairs.forEach(function(p){
    var oi=S.squad.indexOf(p.out);
    if(oi>=0){ S.squad.splice(oi,1); if(S.squad.indexOf(p.inp)<0) S.squad.push(p.inp); }
    if(S.pos[p.out]) S.pos[p.inp]={x:S.pos[p.out].x,y:S.pos[p.out].y};
    S.log.push({type:"sub",sec:S.matchTime,outId:p.out,inId:p.inp,sit:"inicio_q"+nextQNum});
    S.execIds.push(String(p.id));
  });
  if(initPairs.length) toast(initPairs.length+" cambios de inicio Q"+nextQNum+" ejecutados","ok");
  S.breakCd=BREAKS[nxt]; S.phase=nxt; S.qElapsed=0; S.running=true;
  var bb=document.getElementById("break-banner");
  if(bb){
    bb.style.display="flex";
    var bt=document.getElementById("brk-title"); if(bt) bt.textContent={b12:"DESCANSO 2 MIN",b23:"MEDIO TIEMPO",b34:"DESCANSO 2 MIN"}[nxt];
    var bs=document.getElementById("brk-sub"); if(bs) bs.textContent=initPairs.length>0?initPairs.length+" cambios de inicio ejecutados":"Sin cambios de inicio";
    var bbn=document.getElementById("brk-btn"); if(bbn) bbn.textContent="INICIAR Q"+nextQNum;
  }
  startTmr(); renderHdr(); if(CUR_SCREEN==="partido") renderPartido();
}

function autoEndQ(){
  stopTmr(); S.running=false;
  S.qLog.push({num:qNum(),start:S.matchTime-QD,end:S.matchTime});
  var nxt={q1:"b12",q2:"b23",q3:"b34",q4:"ended"}[S.phase];
  if(nxt==="ended"){ S.phase="ended"; renderHdr(); navTo("informe"); return; }
  var nextQNum={b12:2,b23:3,b34:4}[nxt];
  var initPairs=S.pairs.filter(function(p){ return p.q===nextQNum&&p.cd===0; });
  initPairs.forEach(function(p){
    var oi=S.squad.indexOf(p.out);
    if(oi>=0){ S.squad.splice(oi,1); if(S.squad.indexOf(p.inp)<0) S.squad.push(p.inp); }
    if(S.pos[p.out]) S.pos[p.inp]={x:S.pos[p.out].x,y:S.pos[p.out].y};
    S.log.push({type:"sub",sec:S.matchTime,outId:p.out,inId:p.inp,sit:"inicio_q"+nextQNum});
    S.execIds.push(String(p.id));
  });
  S.breakCd=BREAKS[nxt]; S.phase=nxt; S.qElapsed=0; S.running=true;
  var bb=document.getElementById("break-banner");
  if(bb){ bb.style.display="flex"; var bbn=document.getElementById("brk-btn"); if(bbn) bbn.textContent="INICIAR Q"+nextQNum; }
  startTmr(); renderHdr(); if(CUR_SCREEN==="partido") renderPartido();
}

function checkAlerts(){
  if(S.phase!=="q1"&&S.phase!=="q2"&&S.phase!=="q3"&&S.phase!=="q4") return;
  var q=qNum(), elapsed=S.qElapsed;
  var pending=getPendingNow(q,elapsed);
  pending.forEach(function(p){
    var k50="50_"+p.out+"_"+q;
    var k0="0_"+p.out+"_"+q;
    if(!S.alerted[k50]&&p.secLeft>0&&p.secLeft<=50){
      S.alerted[k50]=1;
      toast("CAMBIO EN "+Math.round(p.secLeft)+"s: #"+(gP(p.out)?gP(p.out).num:"?")+" -> #"+(gP(p.inp)?gP(p.inp).num:"?"),"warn");
    }
    if(!S.alerted[k0]&&p.secLeft<=0){
      S.alerted[k0]=1;
      toast("CAMBIO AHORA: #"+(gP(p.out)?gP(p.out).num:"?")+" -> #"+(gP(p.inp)?gP(p.inp).num:"?"),"urgent");
    }
  });
}

function updateFieldTimes(){
  S.squad.forEach(function(id){
    var tok=document.getElementById("tok-"+id); // no id set - use data-fid
  });
  // Light refresh: update pending classes
  var pending=getPendingNow(qNum(),S.qElapsed);
  var pendOut=pending.map(function(p){ return p.out; });
  document.querySelectorAll("[data-fid]").forEach(function(tok){
    var id=parseInt(tok.dataset.fid);
    tok.classList.toggle("tok-pend",pendOut.indexOf(id)>=0);
    var tEl=tok.querySelector(".tok-time");
    if(tEl) tEl.textContent=ft(playedTime(id));
  });
  // Update pending widget
  var pw=document.querySelector(".pend-widget");
  if(pw){
    var newH=renderPending();
    if(newH){ var tmp=document.createElement("div"); tmp.innerHTML=newH; if(tmp.firstChild) pw.parentNode.replaceChild(tmp.firstChild,pw); }
  }
}

function playedTime(id){
  var t=0,inF=false,last=0;
  var init=S.log.filter(function(e){ return e.type==="init"; })[0];
  if(init&&init.ids&&init.ids.indexOf(id)>=0){ inF=true; last=0; }
  S.log.filter(function(e){ return e.type==="sub"; }).forEach(function(e){
    if(e.outId===id&&inF){ t+=e.sec-last; inF=false; last=e.sec; }
    if(e.inId===id&&!inF){ inF=true; last=e.sec; }
  });
  if(inF) t+=S.matchTime-last;
  return t;
}

function adjScore(side,d){ S.score[side]=Math.max(0,S.score[side]+d); var el=document.getElementById("sc-"+side); if(el) el.textContent=S.score[side]; }

function renderHdr(){
  var td=document.getElementById("timer-display"); if(!td) return;
  td.textContent = isBk()?ft(S.breakCd):cdQ();
  td.style.color = isBk()?"#60a5fa":(!S.running&&S.phase!=="pre")?"#fbbf24":"#4ade80";
  var phases={pre:"PRE-PARTIDO",ended:"FINALIZADO",b12:"DESCANSO",b23:"MEDIO TIEMPO",b34:"DESCANSO"};
  var pl=document.getElementById("phase-lbl");
  if(pl) pl.textContent=phases[S.phase]||(isQ()?"Q"+qNum()+(S.running?" EN JUEGO":" PARADO"):"");
  var qp=document.getElementById("qpips");
  if(qp) qp.innerHTML=[1,2,3,4].map(function(q){
    var done=S.qLog.filter(function(ql){ return ql.num===q; }).length>0;
    var act=S.phase===["q1","q2","q3","q4"][q-1];
    return '<div class="qpip'+(done?" qpip-d":act?" qpip-a":'')+'"></div>';
  }).join("");
  var bt=document.getElementById("brk-timer");
  if(bt) bt.textContent=ft(S.breakCd);
  var rb=document.getElementById("riv-btn");
  if(rb) rb.textContent="ESP vs "+S.rival;
  var rl=document.getElementById("riv-lbl");
  if(rl) rl.textContent=S.rival;
}

// ── INFORME ──
function renderInforme(){
  var el=document.getElementById("informe-content"); if(!el) return;
  var h='<div style="font-size:11px;font-weight:800;color:var(--t);margin-bottom:14px">ESP '+S.score.h+' - '+S.score.a+' '+S.rival+' · '+ft(S.matchTime)+'</div>';
  // Subs log
  h+='<div class="slbl">CAMBIOS REALIZADOS</div>';
  var subs=S.log.filter(function(e){ return e.type==="sub"; });
  if(!subs.length) h+='<div style="color:var(--t2);font-size:10px">Sin cambios registrados</div>';
  subs.forEach(function(ev){
    var pO=gP(ev.outId),pI=gP(ev.inId);
    var qn=Math.floor(ev.sec/QD)+1, cd=ft(Math.max(0,QD-(ev.sec%QD)));
    h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--n2);border:1px solid var(--bd);border-radius:8px;margin-bottom:5px">';
    h+='<span style="font-size:10px;font-weight:800;color:var(--a);min-width:52px;font-family:monospace">'+cd+' Q'+qn+'</span>';
    h+='<span style="font-size:11px;color:#f87171;font-weight:700">SALE #'+(pO?pO.num:"?")+' '+(pO?pO.nick:"?")+'</span>';
    h+='<span style="color:var(--t3)">-></span>';
    h+='<span style="font-size:11px;color:#4ade80;font-weight:700">ENTRA #'+(pI?pI.num:"?")+' '+(pI?pI.nick:"?")+'</span>';
    h+='</div>';
  });
  // Player times
  h+='<div class="slbl" style="margin-top:14px">TIEMPOS DE JUEGO</div>';
  var conv=S.squad.concat(S.bench);
  conv.forEach(function(id){
    var p=gP(id); if(!p) return;
    var pt=playedTime(id),pct=S.matchTime>0?Math.round(pt/S.matchTime*100):0;
    h+='<div class="inf-player">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">';
    h+='<span style="font-size:11px;font-weight:700">#'+p.num+' '+p.nick+'</span>';
    h+='<span style="font-size:10px;color:#4ade80;font-weight:700;font-family:monospace">'+ft(pt)+'</span></div>';
    h+='<div class="inf-bar"><div class="inf-fill" style="width:'+pct+'%"></div></div>';
    h+='</div>';
  });
  // Export + New match
  h+='<div style="display:flex;gap:8px;margin-top:16px">';
  h+='<button class="btn-r" style="flex:1" onclick="exportXML()">EXPORTAR XML</button>';
  h+='<button class="btn-n" style="flex:1" onclick="newMatch()">NUEVO PARTIDO</button>';
  h+='</div>';
  el.innerHTML=h;
}

function exportXML(){
  var iid=1,lines=['<?xml version="1.0" encoding="utf-8"?>',"<file>","  <ALL_INSTANCES>"];
  var conv=S.squad.concat(S.bench);
  conv.forEach(function(id){
    var segs=[],inF=false,seg=null;
    var init=S.log.filter(function(e){ return e.type==="init"; })[0];
    if(init&&init.ids&&init.ids.indexOf(id)>=0){ inF=true; seg=0; }
    S.log.filter(function(e){ return e.type==="sub"; }).forEach(function(ev){
      if(ev.outId===id&&inF){ segs.push({s:seg,e:ev.sec}); inF=false; seg=null; }
      if(ev.inId===id&&!inF){ inF=true; seg=ev.sec; }
    });
    if(inF&&seg!==null) segs.push({s:seg,e:S.matchTime});
    var p=gP(id);
    segs.forEach(function(sg){
      lines.push("    <instance><ID>"+iid+"</ID><start>"+sg.s+"</start><end>"+sg.e+"</end><code>"+(p?p.nick:id)+".Player</code></instance>");
      iid++;
    });
  });
  S.events.forEach(function(ev){
    lines.push("    <instance><ID>"+iid+"</ID><start>"+ev.start+"</start><end>"+ev.end+"</end><code>"+ev.lbl+"</code></instance>");
    iid++;
  });
  S.qLog.forEach(function(q){
    lines.push("    <instance><ID>"+iid+"</ID><start>"+q.start+"</start><end>"+q.end+"</end><code>Quarters_Time</code></instance>");
    iid++;
  });
  lines.push("  </ALL_INSTANCES>","</file>");
  var blob=new Blob([lines.join("\n")],{type:"application/xml"});


  var url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url; a.download="Logs-"+new Date().toISOString().slice(0,10)+"_ESP-"+S.rival+".xml";
  a.click(); URL.revokeObjectURL(url);
}

function newMatch(){
  if(!confirm("Iniciar nuevo partido? Se conserva la plantilla.")) return;
  S.phase="pre"; S.running=false; S.qElapsed=0; S.matchTime=0; S.breakCd=0;
  S.score={h:0,a:0}; S.qLog=[]; S.log=[]; S.execIds=[]; S.alerted={};
  S.cards=[]; S.pb=[]; S.events=[];
  stopTmr();
  var bb=document.getElementById("break-banner"); if(bb) bb.style.display="none";
  scheduleSave(); renderHdr(); navTo("plantilla");
  toast("Nuevo partido iniciado. Plantilla conservada.","ok");
}

// ── LOCALSTORAGE ──
var LS_KEY="rs26_esp_v1";
var _saveTimer=null;
function scheduleSave(){ clearTimeout(_saveTimer); _saveTimer=setTimeout(doSave,1500); }
setInterval(doSave,15000);
function doSave(){
  try{
    var execArr=[];
    S.execIds.forEach(function(id){ execArr.push(id); });
    localStorage.setItem(LS_KEY,JSON.stringify({
      squad:S.squad,bench:S.bench,roles:S.roles,pcVars:S.pcVars,nextVid:S.nextVid,
      pairs:S.pairs,mirror:S.mirror,
      rival:S.rival,phase:S.phase,running:false,
      qElapsed:S.qElapsed,matchTime:S.matchTime,breakCd:S.breakCd,
      score:S.score,qLog:S.qLog,log:S.log,execIds:execArr,
      alerted:S.alerted,cards:S.cards,pb:S.pb,events:S.events,pos:S.pos
    }));
  } catch(e){ console.warn("save err",e); }
}
function doLoad(){
  try{
    var raw=localStorage.getItem(LS_KEY); if(!raw) return false;
    var d=JSON.parse(raw);
    if(d.squad) S.squad=d.squad; if(d.bench) S.bench=d.bench;
    if(d.roles) S.roles=d.roles; if(d.pcVars) S.pcVars=d.pcVars;
    if(d.nextVid) S.nextVid=d.nextVid; if(d.pairs) S.pairs=d.pairs;
    if(d.mirror!=null) S.mirror=d.mirror; if(d.rival) S.rival=d.rival;
    if(d.phase) S.phase=d.phase; if(d.qElapsed!=null) S.qElapsed=d.qElapsed;
    if(d.matchTime!=null) S.matchTime=d.matchTime; if(d.breakCd!=null) S.breakCd=d.breakCd;
    if(d.score) S.score=d.score; if(d.qLog) S.qLog=d.qLog;
    if(d.log) S.log=d.log; if(d.execIds) S.execIds=d.execIds;
    if(d.alerted) S.alerted=d.alerted; if(d.cards) S.cards=d.cards;
    if(d.pb) S.pb=d.pb; if(d.events) S.events=d.events; if(d.pos) S.pos=d.pos;
    return true;
  } catch(e){ console.warn("load err",e); return false; }
}


function setPTabEl(el){ if(el&&el.dataset&&el.dataset.ptab) setPTab(el.dataset.ptab); }
function cycleRoleEl(el){ if(el&&el.dataset) cycleRole(parseInt(el.dataset.pid), el.dataset.rid); }
function execPairEl(el){ if(el&&el.dataset) execPair(parseInt(el.dataset.pid), el.dataset.mk||''); }
function navTo_plantilla(){ navTo('plantilla'); }
function navTo_prog(){ navTo('prog'); }
function navTo_partido(){ navTo('partido'); }
function navTo_informe(){ navTo('informe'); }
// ── INIT ──
doLoad();
navTo("plantilla");
</script>
