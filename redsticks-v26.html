<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>RedSticks v26 - ESP Absoluta</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --r:#C8102E;--n:#1a1a2e;--g:#16a34a;--a:#f59e0b;--b:#2563eb;--p:#7c3aed;
  --bd:#e0e0f0;--bg:#f4f5f8;--card:#ffffff;
  --t:#1a1a2e;--t2:#555577;--t3:#9999bb;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'Barlow Condensed',sans-serif;overflow:hidden}
button,select,input{font-family:'Barlow Condensed',sans-serif;-webkit-appearance:none;touch-action:manipulation}
button{cursor:pointer}
select,input{color:var(--t);background:#fff;border:1.5px solid var(--bd)}

#app{height:100vh;display:flex;flex-direction:column}

/* HEADER */
#hdr{background:var(--n);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo{font-size:20px;font-weight:900;letter-spacing:4px;color:#fff;line-height:1}
.logo em{color:var(--r);font-style:normal}
.logo-sub{font-size:7px;color:#8888aa;letter-spacing:2px}
.hdr-center{flex:1;display:flex;align-items:center;justify-content:center;gap:12px}
.score-wrap{display:flex;align-items:center;gap:6px}
.score-team{font-size:8px;color:#aaa;letter-spacing:2px;font-weight:700;min-width:28px;text-align:center}
.score-num{font-size:28px;font-weight:900;color:#fff;font-family:'JetBrains Mono',monospace;width:28px;text-align:center;line-height:1}
.score-sep{font-size:20px;color:#555;margin:0 2px}
.score-adj{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#ccc;width:24px;height:24px;border-radius:5px;font-size:14px;display:flex;align-items:center;justify-content:center}
.timer-wrap{display:flex;flex-direction:column;align-items:center}
.timer{font-size:28px;font-weight:900;font-family:'JetBrains Mono',monospace;color:#4ade80;letter-spacing:2px;line-height:1}
.timer-phase{font-size:7px;color:#aaa;letter-spacing:2px;font-weight:700;margin-top:1px}
.qpips{display:flex;gap:3px;margin-top:3px}
.qpip{width:20px;height:4px;border-radius:2px;background:#333}
.qpip-a{background:var(--r)}.qpip-d{background:var(--g)}
.riv-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#ccc;padding:5px 10px;font-size:8px;font-weight:700;border-radius:6px;letter-spacing:1px;cursor:pointer;margin-left:auto}

/* MAIN TABS */
#main-tabs{display:flex;background:var(--n);border-bottom:3px solid rgba(255,255,255,.05);flex-shrink:0}
.mtab{flex:1;background:none;border:none;border-bottom:3px solid transparent;color:#888;padding:10px 6px;font-size:9px;letter-spacing:2px;font-weight:800;cursor:pointer;margin-bottom:-3px}
.mtab-a{border-bottom-color:var(--r);color:#fff}

/* SCREENS */
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:none;overflow-y:auto;padding:12px 14px;padding-bottom:24px}
.screen-a{display:block!important}

/* COMMON */
.slbl{font-size:7px;letter-spacing:3px;color:var(--t3);font-weight:800;text-transform:uppercase;margin-bottom:8px;margin-top:14px}
.slbl:first-child{margin-top:0}
.card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.divider{height:1px;background:var(--bd);margin:12px 0}

/* BUTTONS */
.btn-r{background:var(--r);border:none;color:#fff;padding:11px 18px;font-size:10px;letter-spacing:2px;font-weight:800;border-radius:8px;min-height:44px}
.btn-n{background:var(--card);border:1.5px solid var(--bd);color:var(--t);padding:9px 14px;font-size:10px;font-weight:700;border-radius:8px;min-height:40px}
.btn-g{background:#f0fdf4;border:1.5px solid var(--g);color:var(--g);padding:9px 14px;font-size:10px;font-weight:700;border-radius:8px;min-height:40px}
.btn-sm{padding:6px 12px;font-size:9px;min-height:32px;border-radius:6px}

/* FORM */
.finp{background:#fff;border:1.5px solid var(--bd);color:var(--t);padding:10px 12px;font-size:13px;border-radius:8px;min-height:44px;width:100%}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.flbl{font-size:8px;letter-spacing:2px;color:var(--t2);width:52px;flex-shrink:0;font-weight:700}

/* ── PLANTILLA ── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:10px}
.ptile{background:var(--card);border:1.5px solid var(--bd);border-radius:9px;padding:9px 11px;cursor:pointer}
.ptile:active{transform:scale(.97)}
.ptile-f{border-color:var(--g);background:#f0fdf4}
.ptile-b{border-color:var(--a);background:#fffbeb}
.ptile-o{opacity:.35}
.pt-num{font-size:20px;font-weight:900;color:var(--r);font-family:'JetBrains Mono',monospace;line-height:1}
.pt-name{font-size:11px;font-weight:700;color:var(--t);margin:3px 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-pos{font-size:7px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px;display:inline-block}
.pos-GK{background:rgba(124,58,237,.15);color:#7c3aed;border:1px solid rgba(124,58,237,.3)}
.pos-DEF{background:rgba(37,99,235,.12);color:var(--b);border:1px solid rgba(37,99,235,.25)}
.pos-MID{background:rgba(22,163,74,.12);color:var(--g);border:1px solid rgba(22,163,74,.25)}
.pos-FWD{background:rgba(200,16,46,.1);color:var(--r);border:1px solid rgba(200,16,46,.2)}
.pt-status{font-size:7px;font-weight:800;padding:2px 7px;border-radius:10px;margin-top:5px;display:inline-block;letter-spacing:1px}
.st-f{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.st-b{background:#fef9c3;color:#a16207;border:1px solid #fde68a}
.st-o{background:#f1f5f9;color:#94a3b8;border:1px solid #e2e8f0}

/* ROLES TABLE */
.roles-table{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:10px}
.roles-table th{background:#f8f8fc;color:var(--t2);padding:7px 6px;font-size:7px;letter-spacing:1px;font-weight:800;text-align:center;border-bottom:1.5px solid var(--bd);border-right:1px solid var(--bd)}
.roles-table th:first-child{text-align:left;padding-left:10px;border-right:1.5px solid var(--bd)}
.roles-table td{padding:5px 4px;text-align:center;border-bottom:1px solid #f0f0f8;border-right:1px solid #f0f0f8}
.roles-table td:first-child{text-align:left;padding-left:10px;font-weight:700;font-size:10px;border-right:1.5px solid var(--bd)}
.roles-table tr:hover td{background:#fafafe}
.rk{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;cursor:pointer;min-width:24px}
.rk1{background:var(--a);color:#000}
.rk2{background:#fef9c3;color:#a16207;border:1px solid #fde68a}
.rk3{background:#f1f5f9;color:var(--t2);border:1px solid var(--bd)}
.rk0{color:var(--t3);font-size:16px;line-height:1}

/* PC VARIANTS */
.var-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.var-card{background:var(--card);border-radius:10px;padding:11px 13px;cursor:pointer;border:1.5px solid}
.var-card-d{border-color:rgba(37,99,235,.35);background:#eff6ff}
.var-card-v{border-color:rgba(124,58,237,.35);background:#f5f3ff}
.var-rank{font-size:7px;font-weight:800;letter-spacing:1px;margin-bottom:3px}
.var-name{font-size:13px;font-weight:900;margin-bottom:6px}
.var-pips{display:flex;flex-wrap:wrap;gap:3px}
.var-pip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff}
.vp-d{background:var(--b)}.vp-v{background:var(--p)}

/* ── PROGRAMACION ── */
.prog-hdr{background:var(--card);border-bottom:1.5px solid var(--bd);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.qsel{display:flex;gap:4px}
.qsbtn{background:#f4f5f8;border:1.5px solid var(--bd);color:var(--t2);padding:7px 12px;font-size:9px;font-weight:800;border-radius:6px;letter-spacing:1px;cursor:pointer}
.qsbtn-a{background:var(--r);border-color:var(--r);color:#fff}
.mirror-btn{background:none;border:1.5px solid var(--g);color:var(--g);padding:7px 11px;font-size:8px;font-weight:800;border-radius:6px;letter-spacing:1px;cursor:pointer}
.mirror-off{border-color:var(--bd);color:var(--t2)}
.prog-body{padding:12px 14px;padding-bottom:24px}

/* TIMELINE */
.tl-bar{display:flex;gap:3px;margin-bottom:8px}
.tl-min{flex:1;min-height:52px;border-radius:7px;background:var(--card);border:1.5px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.tl-min:active{transform:scale(.92)}
.tl-min-cd{font-size:8px;font-weight:800;color:var(--t2);font-family:'JetBrains Mono',monospace}
.tl-min-n{font-size:10px;font-weight:900;color:var(--a);margin-top:2px}
.tl-min-has{background:#fffbeb;border-color:var(--a)}
.tl-start-box{background:#fff0f0;border:1.5px solid rgba(200,16,46,.35);border-radius:10px;padding:10px 13px;margin-bottom:12px}
.chg-item{background:var(--card);border:1.5px solid var(--bd);border-radius:9px;padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.chg-time{font-size:12px;font-weight:800;color:var(--a);min-width:46px;font-family:'JetBrains Mono',monospace}
.chg-time-start{color:var(--r)}
.chg-out{font-size:12px;color:var(--r);font-weight:800}
.chg-in{font-size:12px;color:var(--g);font-weight:800}
.chg-arr{color:var(--t3);font-size:12px}
.chg-del{background:none;border:none;color:var(--t3);font-size:18px;margin-left:auto;cursor:pointer;padding:4px 6px}

/* ── PARTIDO ── */
.match-body{padding:10px 14px;padding-bottom:24px}
#break-banner{display:none;background:#eff6ff;border-bottom:2px solid rgba(37,99,235,.3);padding:12px 16px;align-items:center;gap:14px;flex-shrink:0}
.brk-timer{font-size:36px;font-weight:900;color:var(--b);font-family:'JetBrains Mono',monospace}
.brk-title{font-size:11px;font-weight:800;color:var(--b);letter-spacing:2px}
.brk-sub{font-size:9px;color:var(--t2);margin-top:2px}
.brk-btn{background:var(--b);border:none;color:#fff;padding:11px 18px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;margin-left:auto;min-height:44px}

/* PENDING */
.pend-widget{background:var(--card);border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:10px}
.pend-hdr{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid var(--bd);gap:8px;background:#f8f8fc}
.pend-title{font-size:8px;font-weight:800;letter-spacing:2px;color:var(--t2)}
.pend-count{background:var(--r);color:#fff;font-size:8px;font-weight:800;padding:2px 8px;border-radius:10px}
.pend-row{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid #f4f5f8}
.pend-row:last-child{border-bottom:none}
.pend-now{background:#fff5f5}
.pr-cd{font-size:11px;font-weight:800;min-width:44px;font-family:'JetBrains Mono',monospace}
.pr-now{color:var(--r)}.pr-soon{color:var(--a)}.pr-ok{color:var(--t2)}
.pr-out{font-size:12px;font-weight:800;color:var(--r)}
.pr-in{font-size:12px;font-weight:800;color:var(--g)}
.pr-sep{color:var(--t3);font-size:11px}
.pr-exec{background:var(--r);border:none;color:#fff;padding:7px 13px;border-radius:7px;font-size:10px;font-weight:800;cursor:pointer;margin-left:auto;letter-spacing:1px;min-height:36px}
.pr-done{background:#f0fdf4;border:1.5px solid var(--g);color:var(--g)}

/* FIELD */
.field-wrap{width:100%;aspect-ratio:91.4/55;position:relative;border-radius:10px;overflow:visible;margin-bottom:8px}
.tok{position:absolute;width:50px;height:44px;border-radius:8px;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;cursor:pointer;touch-action:none;user-select:none;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.tok-num{font-size:12px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.tok-name{font-size:6px;font-weight:700;max-width:46px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tok-time{font-size:6px;opacity:.8;font-family:'JetBrains Mono',monospace}
.tok-gk{background:#7c3aed;border-color:#6d28d9}
.tok-def{background:var(--b);border-color:#1d4ed8}
.tok-mid{background:var(--g);border-color:#15803d}
.tok-fwd{background:var(--r);border-color:#991b1b}
@keyframes tokAlert{0%,100%{transform:scale(1)}50%{transform:scale(1.1);box-shadow:0 0 0 5px rgba(245,158,11,.4)}}
.tok-pend{animation:tokAlert .85s ease infinite!important;border-color:var(--a)!important;border-width:3px!important}

/* BENCH PANEL */
.bench-panel{background:var(--card);border:1.5px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.bench-hdr{font-size:8px;font-weight:800;letter-spacing:2px;color:var(--t2);margin-bottom:8px}
.bench-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f4f5f8}
.bench-row:last-child{border-bottom:none}
.bench-num{font-size:13px;font-weight:800;min-width:28px;font-family:'JetBrains Mono',monospace}
.bench-name{font-size:11px;font-weight:700;color:var(--t);flex:1}
.bench-pos{font-size:7px;font-weight:800;padding:2px 6px;border-radius:4px}
.bench-pend{background:#f0fdf4;border-left:3px solid var(--g)}

/* EVENT BUTTONS */
.ev-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.ev-btn{padding:10px 4px;border-radius:9px;border:1.5px solid;font-size:10px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:50px;letter-spacing:.5px;background:var(--card)}
.ev-sub{font-size:7px;opacity:.7;font-weight:600}
.ev-pcp{border-color:var(--b);color:var(--b)}
.ev-pcn{border-color:var(--a);color:var(--a)}
.ev-gp{border-color:var(--g);color:var(--g)}
.ev-gn{border-color:var(--r);color:var(--r)}

/* CTRL BUTTONS */
.ctrl-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ctrl-play{background:#f0fdf4;border:1.5px solid var(--g);color:var(--g);padding:10px 16px;font-size:10px;font-weight:800;border-radius:8px;cursor:pointer;min-height:42px;letter-spacing:1px;flex:1}
.ctrl-pause{background:#fffbeb;border:1.5px solid var(--a);color:#92400e;padding:10px 16px;font-size:10px;font-weight:800;border-radius:8px;cursor:pointer;min-height:42px;letter-spacing:1px;flex:1}
.ctrl-end{background:#fff0f0;border:1.5px solid var(--r);color:var(--r);padding:10px 16px;font-size:10px;font-weight:800;border-radius:8px;cursor:pointer;min-height:42px;letter-spacing:1px}

/* PC PANEL */
#pc-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:16px}
.pc-box{background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:18px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.pc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pc-title{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--b)}
.pc-close{background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;padding:4px 8px}
.pc-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pc-col-title{font-size:8px;font-weight:800;letter-spacing:2px;margin-bottom:8px}
.pc-item{border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;border:1.5px solid}
.pc-item:active{transform:scale(.97)}
.pc-item-d{background:#eff6ff;border-color:rgba(37,99,235,.4)}
.pc-item-v{background:#f5f3ff;border-color:rgba(124,58,237,.4)}
.pc-item-na{opacity:.4;cursor:default}
.pc-rank{font-size:7px;font-weight:800;margin-bottom:3px}
.pc-name{font-size:14px;font-weight:900;margin-bottom:6px}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:500;padding:16px}
.modal-box{background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-box button{touch-action:manipulation}
.modal-title{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--t);margin-bottom:14px}
.modal-acts{display:flex;gap:8px;margin-top:14px}

/* TOASTS */
#toasts{position:fixed;top:8px;right:8px;z-index:600;display:flex;flex-direction:column;gap:4px;max-width:300px;pointer-events:none}
.toast{padding:9px 13px;border-radius:9px;font-size:11px;font-weight:700;pointer-events:all;box-shadow:0 4px 16px rgba(0,0,0,.12);display:flex;align-items:center;gap:8px;border:1.5px solid}
.t-ok{background:#f0fdf4;border-color:var(--g);color:#15803d}
.t-warn{background:#fffbeb;border-color:var(--a);color:#92400e}
.t-urgent{background:#fff0f0;border-color:var(--r);color:var(--r)}
.t-info{background:#eff6ff;border-color:var(--b);color:var(--b)}
.t-x{background:none;border:none;color:inherit;font-size:16px;margin-left:auto;cursor:pointer}

/* INFORME */
.inf-player{background:var(--card);border:1.5px solid var(--bd);border-radius:9px;padding:10px 13px;margin-bottom:6px}
.inf-bar{height:5px;background:#f0f0f8;border-radius:4px;margin:5px 0;overflow:hidden}
.inf-fill{height:100%;background:linear-gradient(90deg,var(--r),var(--a));border-radius:4px}
</style>
</head>
<body>
<div id="app">
  <div id="toasts"></div>
  <div id="pc-panel" onclick="if(event.target===this)closePCP()">
    <div class="pc-box" id="pc-box"></div>
  </div>
  <div id="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" id="modal-box" onclick="event.stopPropagation()"></div>
  </div>

  <header id="hdr">
    <div>
      <div class="logo">RED<em>STICKS</em></div>
      <div class="logo-sub">ESP ABSOLUTA v26</div>
    </div>
    <div class="hdr-center" id="hdr-center" style="display:none">
      <div class="score-wrap">
        <div>
          <div class="score-team">ESP</div>
          <div style="display:flex;align-items:center;gap:3px">
            <button class="score-adj" onclick="adjScore(0,-1)">-</button>
            <div class="score-num" id="sc-h">0</div>
            <button class="score-adj" onclick="adjScore(0,1)">+</button>
          </div>
        </div>
        <div class="score-sep">-</div>
        <div>
          <div class="score-team" id="riv-lbl">RIV</div>
          <div style="display:flex;align-items:center;gap:3px">
            <button class="score-adj" onclick="adjScore(1,-1)">-</button>
            <div class="score-num" id="sc-a">0</div>
            <button class="score-adj" onclick="adjScore(1,1)">+</button>
          </div>
        </div>
      </div>
      <div class="timer-wrap">
        <div class="timer" id="timer-display">15:00</div>
        <div class="timer-phase" id="phase-lbl">PRE-PARTIDO</div>
        <div class="qpips" id="qpips"></div>
      </div>
    </div>
    <button class="riv-btn" id="riv-btn" onclick="openRivModal()">ESP vs ?</button>
  </header>

  <div id="main-tabs">
    <button class="mtab mtab-a" onclick="navTo(0)">PLANTILLA</button>
    <button class="mtab" onclick="navTo(1)">PROGRAMA</button>
    <button class="mtab" onclick="navTo(2)">PARTIDO</button>
    <button class="mtab" onclick="navTo(3)">INFORME</button>
  </div>

  <div id="break-banner">
    <div>
      <div class="brk-title" id="brk-title">DESCANSO</div>
      <div class="brk-sub" id="brk-sub"></div>
    </div>
    <div class="brk-timer" id="brk-timer">02:00</div>

// ── INIT ──
function initDefaults(){
  var gks = [];
  var flds = [];
  for(var i=0;i<POOL.length;i++){
    if(POOL[i].pos==='GK') gks.push(POOL[i]);
    else flds.push(POOL[i]);
  }
  for(var i=0;i<10&&i<flds.length;i++) S.squad.push(flds[i].id);
  if(gks.length) S.squad.push(gks[0].id);
  for(var i=10;i<16&&i<flds.length;i++) S.bench.push(flds[i].id);
  if(gks.length>1) S.bench.push(gks[1].id);
  // Position counters per line for organized layout
  var lineX = {GK:6, DEF:22, MID:48, FWD:72};
  var lineCount = {GK:0, DEF:0, MID:0, FWD:0};
  var lineTotal = {GK:0, DEF:0, MID:0, FWD:0};
  for(var i=0;i<POOL.length;i++) lineTotal[POOL[i].pos]=(lineTotal[POOL[i].pos]||0)+1;
  for(var i=0;i<POOL.length;i++){
    var p = POOL[i];
    S.roles[p.id] = {};
    var pr = p.roles || {};
    var keys = Object.keys(pr);
    for(var k=0;k<keys.length;k++) S.roles[p.id][keys[k]] = pr[keys[k]];
    var tot = lineTotal[p.pos]||1;
    var idx = lineCount[p.pos]||0;
    var ySpacing = 80 / (tot+1);
    S.pos[p.id] = {x: lineX[p.pos]||50, y: 10 + (idx+1)*ySpacing};
    lineCount[p.pos] = idx+1;
  }
}

// ── UTILS ──
function ft(s){
  if(s<0)s=0;
  var m=Math.floor(s/60), sec=Math.floor(s)%60;
  return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;
}
function gP(id){
  for(var i=0;i<POOL.length;i++) if(POOL[i].id===id) return POOL[i];
  return null;
}
function isQ(){ return ['q1','q2','q3','q4'].indexOf(S.phase)>=0; }
function isBk(){ return S.phase.charAt(0)==='b'; }
function qI(){ return ['q1','q2','q3','q4'].indexOf(S.phase); }
function qNum(){ return qI()+1; }
function cdQ(){ return ft(Math.max(0, QD-S.qElapsed)); }

function navTo(n){
  CUR_SCR = n;
  var scrIds = ['scr-0','scr-1','scr-2','scr-3'];
  for(var i=0;i<scrIds.length;i++){
    var el = document.getElementById(scrIds[i]);
    if(!el) continue;
    if(i===n){
      el.className='screen screen-a';
      el.style.display='block';
    } else {
      el.className='screen';
      el.style.display='none';
    }
  }
  var tabs = document.querySelectorAll('.mtab');
  for(var i=0;i<tabs.length;i++){
    tabs[i].className = i===n ? 'mtab mtab-a' : 'mtab';
  }
  var hc = document.getElementById('hdr-center');
  if(hc) hc.style.display = n===2 ? 'flex' : 'none';
  try {
    if(n===0) renderPlantilla();
    if(n===1) renderProg();
    if(n===2) renderPartido();
    if(n===3) renderInforme();
    renderHdr();
  } catch(err) {
    var scr = document.getElementById('scr-'+n);
    if(scr) scr.innerHTML = '<div style="padding:20px;background:#fff0f0;border-radius:10px;margin:10px;font-size:12px;color:#C8102E;font-weight:700">ERROR: '+err.message+'<br><br><span style="font-size:10px;font-weight:400;color:#555">'+err.stack+'</span></div>';
  }
}

// ── TOASTS ──
var _toasts = [];
function toast(msg, type){
  type = type||'info';
  var id = Date.now()+Math.random();
  _toasts.push({id:id, msg:msg, type:type});
  renderToasts();
  var dur = type==='urgent' ? 18000 : 6000;
  setTimeout(function(){ _toasts=_toasts.filter(function(t){return t.id!==id;}); renderToasts(); }, dur);
}
function renderToasts(){
  var el=document.getElementById('toasts'); if(!el) return;
  var h='';
  for(var i=0;i<_toasts.length;i++){
    var t=_toasts[i];
    var cls='toast t-'+(t.type||'info');
    h+='<div class="'+cls+'"><span style="flex:1">'+t.msg+'</span>'+
       '<button class="t-x" data-tid="'+t.id+'" onclick="dismissToast(this)">x</button></div>';
  }
  el.innerHTML=h;
}
function dismissToast(btn){
  var id=parseFloat(btn.dataset.tid);
  _toasts=_toasts.filter(function(t){return t.id!==id;});
  renderToasts();
}

     '<div style="font-size:20px;font-weight:900;color:var(--g);font-family:monospace">'+S.squad.length+'</div>'+

function cyclePlayer(el){
  var id=parseInt(el.dataset.pid); if(!id) return;
  var inf=S.squad.indexOf(id), ben=S.bench.indexOf(id);
  if(inf>=0){
    // Campo -> Banquillo
    S.squad.splice(inf,1); S.bench.push(id);
  } else if(ben>=0){
    // Banquillo -> No conv
    S.bench.splice(ben,1);
  } else {
    // No conv -> Campo
    S.squad.push(id);
  }
  scheduleSave(); renderPlantilla();
}

function openEditPlayer(btn){
  var id=parseInt(btn.dataset.pid);
  var p=gP(id); if(!p) return;
  var posOpts='';
  var poss=['GK','DEF','MID','FWD'];
  for(var i=0;i<poss.length;i++){
    posOpts+='<option value="'+poss[i]+'"'+(p.pos===poss[i]?' selected':'')+'>'+poss[i]+'</option>';
  }
  openModal('<div class="modal-title">EDITAR JUGADOR</div>'+
    '<div class="frow"><label class="flbl">NOMBRE</label><input class="finp" id="ep-name" value="'+p.name+'"></div>'+
    '<div class="frow"><label class="flbl">NICK</label><input class="finp" id="ep-nick" value="'+p.nick+'"></div>'+
    '<div class="frow"><label class="flbl">DORSAL</label><input class="finp" type="number" id="ep-num" value="'+p.num+'" style="max-width:90px;flex:none"></div>'+
    '<div class="frow"><label class="flbl">POS</label><select class="finp" id="ep-pos" style="max-width:110px;flex:none">'+posOpts+'</select></div>'+

    '<button class="btn-r" style="flex:1" data-pid="'+id+'" onclick="savePlayer(this)">GUARDAR</button>'+
    '<button class="btn-n" onclick="closeModal()">CANCELAR</button>'+
    '</div>');
}
function savePlayer(btn){
  var id=parseInt(btn.dataset.pid); var p=gP(id); if(!p) return;
  var n=document.getElementById('ep-name'),nick=document.getElementById('ep-nick'),
      num=document.getElementById('ep-num'),pos=document.getElementById('ep-pos');
  if(n&&n.value.trim()) p.name=n.value.trim();
  if(nick&&nick.value.trim()) p.nick=nick.value.trim();
  if(num&&parseInt(num.value)) p.num=parseInt(num.value);
  if(pos) p.pos=pos.value;
  closeModal(); scheduleSave(); renderPlantilla();
}

function saveNewPlayer(){
  var name=document.getElementById('np-name'),
      nick=document.getElementById('np-nick'),
      num=document.getElementById('np-num'),
      pos=document.getElementById('np-pos'),
      st=document.getElementById('np-st');
  var nameV=name?name.value.trim():'';
  var nickV=nick?nick.value.trim().toUpperCase():'';
  var numV=parseInt(num?num.value:'')||0;
  var posV=pos?pos.value:'FWD';
  var stV=st?st.value:'bench';
  if(!nameV||!nickV||!numV) return toast('Rellena nombre, nick y dorsal','warn');
  // Check dorsal not duplicated
  for(var i=0;i<POOL.length;i++) if(POOL[i].num===numV) return toast('Dorsal #'+numV+' ya existe','warn');
  var newId = Date.now();
  var newP = {id:newId, num:numV, name:nameV, nick:nickV, pos:posV, roles:{}};
  POOL.push(newP);
  S.roles[newId]={};
  S.pos[newId]={x:50,y:50};
  if(stV==='squad') S.squad.push(newId);
  else if(stV==='bench') S.bench.push(newId);
  closeModal(); scheduleSave(); renderPlantilla();
  toast(nickV+' anadido','ok');
}

function renderRoles(){
  var convIds=S.squad.concat(S.bench);
  var conv=[];
  for(var i=0;i<POOL.length;i++) if(convIds.indexOf(POOL[i].id)>=0) conv.push(POOL[i]);
  conv.sort(function(a,b){return a.num-b.num;});
  var pcdR=[], pcaR=[];
  for(var i=0;i<ROLES_DEF.length;i++){
    if(ROLES_DEF[i].grp==='PCD') pcdR.push(ROLES_DEF[i]);
    if(ROLES_DEF[i].grp==='PCA') pcaR.push(ROLES_DEF[i]);
  }
  function buildTable(roles, color){
    var h='<div style="overflow-x:auto;margin-bottom:16px"><table class="roles-table"><thead><tr>';
    h+='<th>JUGADOR</th>';
    for(var i=0;i<roles.length;i++) h+='<th style="color:'+color+'">'+roles[i].lbl+'</th>';
    h+='</tr></thead><tbody>';
    for(var pi=0;pi<conv.length;pi++){
      var p=conv[pi];
      h+='<tr><td>#'+p.num+' '+p.nick+'</td>';
      for(var ri=0;ri<roles.length;ri++){
        var r=roles[ri];
        var rank=(S.roles[p.id]||{})[r.id]||0;
        var btn;
        if(rank>0){
          btn='<span class="rk rk'+rank+'" data-pid="'+p.id+'" data-rid="'+r.id+'" onclick="cycleRank(this)">R'+rank+'</span>';
        } else {
          btn='<span class="rk rk0" data-pid="'+p.id+'" data-rid="'+r.id+'" onclick="cycleRank(this)">+</span>';
        }
        h+='<td>'+btn+'</td>';
      }
      h+='</tr>';
    }
    h+='</tbody></table></div>';
    return h;
  }
  var h='<div style="font-size:9px;color:var(--t2);margin-bottom:10px">Toca la celda para ciclar: R1 &#8594; R2 &#8594; R3 &#8594; sin rol</div>';
  h+='<div style="font-size:8px;font-weight:800;color:var(--a);letter-spacing:2px;margin-bottom:6px">PENALTI CORNER DEFENSA</div>';
  h+=buildTable(pcdR,'var(--a)');
  h+='<div style="font-size:8px;font-weight:800;color:var(--p);letter-spacing:2px;margin-bottom:6px">PENALTI CORNER ATAQUE</div>';
  h+=buildTable(pcaR,'var(--p)');
  return h;
}
function cycleRank(el){
  var pid=parseInt(el.dataset.pid), rid=el.dataset.rid;
  if(!S.roles[pid]) S.roles[pid]={};
  var cur=(S.roles[pid][rid]||0);
  S.roles[pid][rid]=cur>=3?0:cur+1;
  scheduleSave(); renderPlantilla();
}

function renderProg(){
  renderQSel();
  renderTimeline();
}
function renderQSel(){
  var el=document.getElementById('qsel'); if(!el) return;
  var qs=S.mirror?[1,2]:[1,2,3,4];
  var h='';
  for(var i=0;i<qs.length;i++){
    var q=qs[i], a=S.curQ===q;
    var lbl='Q'+q+(S.mirror&&q===1?' =Q3':S.mirror&&q===2?' =Q4':'');
    h+='<button class="qsbtn'+(a?' qsbtn-a':'')+'" data-q="'+q+'" onclick="setQ(this)">'+lbl+'</button>';
  }
  el.innerHTML=h;
  var mb=document.getElementById('mirror-btn');
  if(mb){ mb.className='mirror-btn'+(S.mirror?'':' mirror-off'); }
  var pi=document.getElementById('prog-info');
  if(pi) pi.textContent=S.pairs.length+' cambios totales';
}
function setQ(btn){ S.curQ=parseInt(btn.dataset.q); renderProg(); }
function toggleMirror(){ S.mirror=!S.mirror; if(S.curQ>2&&S.mirror) S.curQ=1; renderProg(); }

function renderTimeline(){
  var el=document.getElementById('prog-body'); if(!el) return;
  var q=S.curQ;
  var qPairs=S.pairs.filter(function(p){return p.q===q;});
  var byMin={};
  for(var i=0;i<qPairs.length;i++){
    var p=qPairs[i];
    if(!byMin[p.cd]) byMin[p.cd]=[];
    byMin[p.cd].push(p);
  }
  var h='';
  // INICIO DE CUARTO
  if(q>1){
    var startPairs=byMin[0]||[];
    h+='<div style="font-size:8px;font-weight:800;color:var(--r);letter-spacing:2px;margin-bottom:8px">INICIO Q'+q+' - AUTOMATICO AL FINALIZAR Q'+(q-1)+'</div>';
    h+='<div class="tl-start-box">';
    if(startPairs.length){
      for(var i=0;i<startPairs.length;i++){
        var sp=startPairs[i], pO=gP(sp.out), pI=gP(sp.inp);
        h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(200,16,46,.12)">';
        h+='<span style="font-size:9px;font-weight:800;color:var(--r);min-width:60px">INICIO Q'+q+'</span>';
        h+='<span class="chg-out">SALE #'+(pO?pO.num:'?')+' '+(pO?pO.nick:'')+'</span>';
        h+='<span class="chg-arr">&#8594;</span>';
        h+='<span class="chg-in">ENTRA #'+(pI?pI.num:'?')+' '+(pI?pI.nick:'')+'</span>';
        h+='<button class="chg-del" data-pid="'+sp.id+'" onclick="deletePairEl(this)">x</button>';
        h+='</div>';
      }
    } else {
      h+='<div style="font-size:10px;color:var(--t2)">Sin cambios de inicio - toca el boton para anadir</div>';
    }
    h+='<button onclick="openAddPairModal('+q+',0)" style="margin-top:8px;background:none;border:1.5px solid rgba(200,16,46,.4);color:var(--r);padding:6px 14px;font-size:9px;font-weight:800;border-radius:6px;cursor:pointer;letter-spacing:1px">+ ANADIR INICIO Q'+q+'</button>';
    h+='</div><div class="divider"></div>';
  }
  // TIMELINE BAR
  h+='<div style="font-size:7px;letter-spacing:3px;color:var(--t3);font-weight:800;text-transform:uppercase;margin-bottom:8px">TIMELINE Q'+q+(S.mirror&&q<=2?' (ESPEJO Q'+(q+2)+')':'')+'</div>';
  h+='<div class="tl-bar">';
  for(var cd=14;cd>=1;cd--){
    var cnt=(byMin[cd]||[]).length;
    var has=cnt>0;
    h+='<div class="tl-min'+(has?' tl-min-has':'')+'" data-q="'+q+'" data-cd="'+cd+'" onclick="openAddPairModalEl(this)">';
    h+='<div class="tl-min-cd">'+(cd<10?'0':'')+cd+':00</div>';
    if(has) h+='<div class="tl-min-n">'+cnt+'x</div>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:7px;color:var(--t3);margin-bottom:12px"><span>INICIO Q'+q+'</span><span>FIN Q'+q+'</span></div>';
  // CHANGES LIST
  var allQP=qPairs.filter(function(p){return p.cd>0;});
  allQP.sort(function(a,b){return b.cd-a.cd;});
  h+='<div style="font-size:7px;letter-spacing:3px;color:var(--t3);font-weight:800;text-transform:uppercase;margin-bottom:8px">CAMBIOS Q'+q+'</div>';
  if(!allQP.length){
    h+='<div style="color:var(--t2);font-size:11px;padding:10px 0">Sin cambios. Toca un minuto del timeline para anadir.</div>';
  } else {
    for(var i=0;i<allQP.length;i++){
      var p=allQP[i], pO=gP(p.out), pI=gP(p.inp);
      h+='<div class="chg-item">';
      h+='<span class="chg-time">'+(p.cd<10?'0':'')+p.cd+':00</span>';
      h+='<span class="chg-out">SALE #'+(pO?pO.num:'?')+' '+(pO?pO.nick:'')+'</span>';
      h+='<span class="chg-arr">&#8594;</span>';
      h+='<span class="chg-in">ENTRA #'+(pI?pI.num:'?')+' '+(pI?pI.nick:'')+'</span>';
      h+='<button class="chg-del" data-pid="'+p.id+'" onclick="deletePairEl(this)">x</button>';
      h+='</div>';
    }
  }
  h+='<button class="btn-r" style="width:100%;margin-top:16px" onclick="navTo(2)">IR AL PARTIDO</button>';
  el.innerHTML=h;
}
function openAddPairModalEl(el){
  openAddPairModal(parseInt(el.dataset.q), parseInt(el.dataset.cd));
}
function openAddPairModal(q,cd){
  var field=computeFieldAt(q,cd);
  var allConv=S.squad.concat(S.bench);
  var onF=field.filter(function(id){return allConv.indexOf(id)>=0;});
  var offF=allConv.filter(function(id){return onF.indexOf(id)<0;});
  function mkOpts(ids){
    var opts='', sorted=ids.slice().sort(function(a,b){var pa=gP(a),pb=gP(b);return (pa?pa.num:0)-(pb?pb.num:0);});
    for(var i=0;i<sorted.length;i++){var p=gP(sorted[i]);if(p) opts+='<option value="'+p.id+'">#'+p.num+' '+p.nick+'</option>';}
    return opts;
  }
  var tlbl=cd===0?'INICIO Q'+q:(cd<10?'0':'')+cd+':00';
  openModal('<div class="modal-title">CAMBIO '+tlbl+' - Q'+q+'</div>'+
    '<div style="font-size:9px;color:var(--t2);margin-bottom:12px">'+onF.length+' jugadores en campo en ese momento</div>'+
    '<div class="frow"><label class="flbl">SALE</label><select class="finp" id="p-out" style="color:var(--r)"><option value="">- quien sale -</option>'+mkOpts(onF)+'</select></div>'+
    '<div class="frow"><label class="flbl">ENTRA</label><select class="finp" id="p-in" style="color:var(--g)"><option value="">- quien entra -</option>'+mkOpts(offF)+'</select></div>'+
    '<div class="modal-acts">'+
    '<button class="btn-r" style="flex:1" data-q="'+q+'" data-cd="'+cd+'" onclick="addPairEl(this)">ANADIR</button>'+
    '<button class="btn-n" onclick="closeModal()">CANCELAR</button>'+
    '</div>'+
    '<div style="font-size:8px;color:var(--t2);margin-top:10px">Para varios cambios en el mismo minuto, repite el proceso.</div>');
}
function addPairEl(btn){
  var q=parseInt(btn.dataset.q), cd=parseInt(btn.dataset.cd);
  var outEl=document.getElementById('p-out'), inEl=document.getElementById('p-in');
  var outId=parseInt(outEl?outEl.value:''), inId=parseInt(inEl?inEl.value:'');
  if(!outId||!inId) return toast('Selecciona quien sale y quien entra','warn');
  S.pairs.push({id:Date.now(),q:q,cd:cd,out:outId,inp:inId});
  closeModal(); scheduleSave(); renderProg();
  toast('Cambio anadido','ok');
}
function deletePairEl(btn){
  var id=parseInt(btn.dataset.pid);
  S.pairs=S.pairs.filter(function(p){return p.id!==id;});
  scheduleSave(); renderProg();
}
function computeFieldAt(q,cd){
  var field=S.squad.slice();
  var sorted=S.pairs.slice().sort(function(a,b){
    if(a.q!==b.q) return a.q-b.q;
    return b.cd-a.cd;
  });
  for(var i=0;i<sorted.length;i++){
    var p=sorted[i];
    var before=false;
    if(p.q<q) before=true;
    else if(p.q===q){
      if(cd===0) before=false;
      else before=(p.cd>cd);
    }
    if(before){
      var oi=field.indexOf(p.out);
      if(oi>=0){field.splice(oi,1); if(field.indexOf(p.inp)<0) field.push(p.inp);}
    }
  }
  return field;
}

function renderPartido(){
  var el=document.getElementById('match-body'); if(!el) return;
  var h='';
  // Controls
  h+='<div class="ctrl-row" style="margin-top:10px">';
  if(S.phase==='pre') h+='<button class="ctrl-play" onclick="startQ()">INICIAR Q1</button>';
  if(isQ()&&S.running){
    h+='<button class="ctrl-pause" onclick="pauseGame()">PAUSA</button>';
    h+='<button class="ctrl-end" onclick="endQ()">FIN Q'+qNum()+'</button>';
  }
  if(isQ()&&!S.running){
    h+='<button class="ctrl-play" onclick="resumeGame()">REANUDAR</button>';
    h+='<button class="ctrl-end" onclick="endQ()">FIN Q'+qNum()+'</button>';
  }
  if(S.phase==='ended') h+='<button class="btn-r" style="flex:1" onclick="newMatch()">NUEVO PARTIDO</button>';
  h+='</div>';

  h+='<button class="ev-btn ev-pcn" onclick="trigPC(0)"><span>PC-</span><span class="ev-sub">'+S.rival+'</span></button>';
  h+='<button class="ev-btn ev-gp" onclick="trigGol(1)"><span>GOL+</span><span class="ev-sub">40s</span></button>';
  h+='<button class="ev-btn ev-gn" onclick="trigGol(0)"><span>GOL-</span><span class="ev-sub">40s</span></button>';
  h+='</div>';
  el.innerHTML=h;
}

function renderBench(){
  var bench=S.bench.filter(function(id){return S.squad.indexOf(id)<0;});
  if(!bench.length) return '';
  var pending=isQ()?getAllPending(qNum(),S.qElapsed):[];
  var pendIn=pending.map(function(p){return p.inp;});
  var posColors={GK:'#7c3aed',DEF:'var(--b)',MID:'var(--g)',FWD:'var(--r)'};
  bench.sort(function(a,b){
    var pa=gP(a),pb=gP(b);
    var po=['GK','DEF','MID','FWD'];
    var ia=po.indexOf(pa?pa.pos:'FWD'), ib=po.indexOf(pb?pb.pos:'FWD');
    if(ia!==ib) return ia-ib;
    return (pa?pa.num:0)-(pb?pb.num:0);
  });
  var h='<div class="bench-panel">';
  h+='<div class="bench-hdr">BANQUILLO ('+bench.length+')</div>';
  for(var i=0;i<bench.length;i++){
    var id=bench[i], p=gP(id); if(!p) continue;
    var isPend=pendIn.indexOf(id)>=0;
    var pc=posColors[p.pos]||'var(--r)';
    h+='<div class="bench-row'+(isPend?' bench-pend':'')+'">'+
       '<span class="bench-num" style="color:'+pc+'">#'+p.num+'</span>'+
       '<span class="bench-name">'+p.nick+'</span>'+
       '<span class="bench-pos pos-'+p.pos+'">'+p.pos+'</span>';
    if(isPend) h+='<span style="font-size:8px;color:var(--g);font-weight:800;margin-left:4px">ENTRA</span>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderPending(){
  if(!isQ()) return '';
  var q=qNum(), elapsed=S.qElapsed;
  var pending=getAllPending(q,elapsed);
  if(!pending.length) return '<div style="font-size:9px;color:var(--t2);padding:6px 0;margin-bottom:8px">Sin cambios programados en Q'+q+'</div>';
  var h='<div class="pend-widget"><div class="pend-hdr"><span class="pend-title">CAMBIOS PENDIENTES</span><span class="pend-count">'+pending.length+'</span></div>';
  for(var i=0;i<pending.length;i++){
    var p=pending[i], pO=gP(p.out), pI=gP(p.inp);
    var sl=p.secLeft;
    var isNow=sl<=0, isSoon=!isNow&&sl<=60;
    var cdCls=isNow?'pr-now':isSoon?'pr-soon':'pr-ok';
    var cdTxt=isNow?'AHORA':(sl<0?'AHORA':ft(sl));
    var cdLabel=(p.cd<10?'0':'')+p.cd+':00';
    h+='<div class="pend-row'+(isNow?' pend-now':isSoon?' pend-now':'')+'">';
    h+='<span class="pr-cd '+cdCls+'" style="min-width:52px">'+cdLabel+'</span>';

  }

}

function getAllPending(q,elapsed){
  // ALL unexecuted pairs for current quarter - for the widget
  var result=[];
  var srcQ=(S.mirror&&(q===3||q===4))?q-2:q;
  for(var i=0;i<S.pairs.length;i++){
    var p=S.pairs[i];
    if(p.q!==srcQ||p.cd===0) continue;
    var mk=(q===3?'m3_':q===4?'m4_':'')+p.id;
    var execKey=(q===3||q===4)?mk:String(p.id);
    if(S.execIds.indexOf(execKey)>=0) continue;
    var sl=p.cd*60-elapsed;
    result.push({pairId:p.id,out:p.out,inp:p.inp,cd:p.cd,mk:(q===3||q===4)?mk:'',secLeft:sl});
  }
  result.sort(function(a,b){return b.cd-a.cd;});
  return result;
}
function getPendingNow(q,elapsed){
  // Only pairs in the 90s alert window - for toasts and token pulsing
  var all=getAllPending(q,elapsed);
  return all.filter(function(p){return p.secLeft<=90;});
}

function execPairBtn(btn){
  var pairId=parseInt(btn.dataset.pid), mk=btn.dataset.mk||'';
  execPair(pairId,mk);
}

function execPair(pairId,mk){
  var srcId=mk?parseInt(mk.replace('m3_','').replace('m4_','')):pairId;
  var pair=null;
  for(var i=0;i<S.pairs.length;i++) if(S.pairs[i].id===srcId) pair=S.pairs[i];
  if(!pair) return;
  var execKey=mk||String(pairId);
  if(S.execIds.indexOf(execKey)>=0) return;
  S.execIds.push(execKey);
  var oi=S.squad.indexOf(pair.out);
  if(oi>=0){
    S.squad.splice(oi,1);
    if(S.bench.indexOf(pair.out)<0) S.bench.push(pair.out);
    if(S.squad.indexOf(pair.inp)<0) S.squad.push(pair.inp);
    var bi=S.bench.indexOf(pair.inp);
    if(bi>=0) S.bench.splice(bi,1);
  }
  if(S.pos[pair.out]) S.pos[pair.inp]={x:S.pos[pair.out].x,y:S.pos[pair.out].y};
  S.log.push({type:'sub',sec:S.matchTime,outId:pair.out,inId:pair.inp});
  var pO=gP(pair.out),pI=gP(pair.inp);
  toast('CAMBIO: #'+(pO?pO.num:'?')+' '+(pO?pO.nick:'')+' -> #'+(pI?pI.num:'?')+' '+(pI?pI.nick:''),'ok');
  scheduleSave();
  if(CUR_SCR===2) renderPartido();
}

function buildField(){

  svg+='<circle cx="1" cy="30" r="18" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5" clip-path="url(#cl1)"/>';
  svg+='<clipPath id="cl2"><rect x="75" y="1" width="24" height="58"/></clipPath>';

  svg+='<circle cx="50" cy="30" r="0.5" fill="rgba(255,255,255,0.5)"/></svg>';

// ── TOKEN DRAG (document-level listeners) ──
var _drag={id:null,el:null,fw:null,moved:false,ox:0,oy:0};

function tokTouchStart(e){
  var el=e.currentTarget;
  if(e.cancelable) e.preventDefault();
  _drag.id=parseInt(el.dataset.pid);
  _drag.el=el;
  _drag.moved=false;
  _drag.fw=document.querySelector('.field-wrap');
  if(!_drag.fw) return;
  var t=e.touches[0];
  var fr=_drag.fw.getBoundingClientRect();
  _drag.ox=t.clientX-fr.left-el.offsetWidth/2;
  _drag.oy=t.clientY-fr.top-el.offsetHeight/2;
  el.style.zIndex='20';
}
function _onTouchMove(e){
  if(_drag.id===null||!_drag.fw) return;
  if(e.cancelable) e.preventDefault();
  _drag.moved=true;
  var t=e.touches[0];
  var fr=_drag.fw.getBoundingClientRect();
  var x=t.clientX-fr.left-_drag.el.offsetWidth/2;
  var y=t.clientY-fr.top-_drag.el.offsetHeight/2;
  var px=Math.max(0,Math.min(fr.width-_drag.el.offsetWidth,x));
  var py=Math.max(0,Math.min(fr.height-_drag.el.offsetHeight,y));
  _drag.el.style.left=px+'px';
  _drag.el.style.top=py+'px';
  S.pos[_drag.id]={
    x:Math.round((px+_drag.el.offsetWidth/2)/fr.width*100),
    y:Math.round((py+_drag.el.offsetHeight/2)/fr.height*100)
  };
  S.posDragged[_drag.id]=1;
}
function _onTouchEnd(e){
  if(_drag.id===null) return;
  if(!_drag.moved){ tapToken(_drag.el); }
  _drag.el.style.zIndex='';
  _drag.id=null; _drag.el=null; _drag.fw=null;
  scheduleSave();
}
document.addEventListener('touchmove',_onTouchMove,{passive:false});
document.addEventListener('touchend',_onTouchEnd);

// Keep old names as no-ops so HTML refs don't break
function tokDragStart(e,el){}
function tokDragMove(e,el){}
function tokDragEnd(e,el){}

function playedTime(id){
  var t=0,inF=false,last=0;
  var init=null;
  for(var i=0;i<S.log.length;i++) if(S.log[i].type==='init'){init=S.log[i];break;}
  if(init&&init.ids&&init.ids.indexOf(id)>=0){inF=true;last=0;}
  for(var i=0;i<S.log.length;i++){
    var e=S.log[i]; if(e.type!=='sub') continue;
    if(e.outId===id&&inF){t+=e.sec-last;inF=false;last=e.sec;}
    if(e.inId===id&&!inF){inF=true;last=e.sec;}
  }
  if(inF) t+=S.matchTime-last;
  return t;
}

    '<div><div class="pc-col-title" style="color:var(--p)">VARIANTES ('+vrs.length+')</div>'+grpH(vrs,'var(--p)','vp-v','pc-item-v')+'</div>'+

// ── TIMER ──
function startTmr(){
  clearInterval(tiInt); if(!S.running) return;
  tiInt=setInterval(function(){
    if(isBk()){
      S.breakCd--;
      if(S.breakCd<=0){S.running=false;S.breakCd=0;clearInterval(tiInt);renderHdr();}
    } else if(isQ()){
      S.qElapsed++;S.matchTime++;
      if(S.qElapsed>=QD){autoEndQ();return;}
      checkAlerts();
    }
    renderHdr();
    if(CUR_SCR===2) updateMatchTimes();
  },1000);
}
function stopTmr(){clearInterval(tiInt);}

function updateMatchTimes(){
  // Full re-render of partido screen every second for accuracy
  renderPartido();
}

function startQ(){
  if(S.phase==='pre'){
    S.log=[{type:'init',ids:S.squad.slice(),sec:0}];
    S.execIds=[];S.alerted={};S.cards=[];S.pb=[];S.events=[];
    S.score={h:0,a:0};S.matchTime=0;S.qElapsed=0;S.qLog=[];
    var sh=document.getElementById('sc-h');if(sh)sh.textContent='0';
    var sa=document.getElementById('sc-a');if(sa)sa.textContent='0';
  }
  var bb=document.getElementById('break-banner');if(bb)bb.style.display='none';
  S.phase='q1';S.qElapsed=0;S.running=true;
  startTmr();renderHdr();if(CUR_SCR===2)renderPartido();
}
function startNextQ(){
  var nq={b12:'q2',b23:'q3',b34:'q4'}[S.phase]; if(!nq) return;
  var bb=document.getElementById('break-banner');if(bb)bb.style.display='none';
  S.phase=nq;S.qElapsed=0;S.running=true;
  startTmr();renderHdr();if(CUR_SCR===2)renderPartido();
}
function pauseGame(){S.running=false;stopTmr();renderHdr();if(CUR_SCR===2)renderPartido();}
function resumeGame(){S.running=true;startTmr();renderHdr();if(CUR_SCR===2)renderPartido();}

function endQ(){
  stopTmr();S.running=false;
  S.qLog.push({num:qNum(),start:S.matchTime-S.qElapsed,end:S.matchTime});
  var nxt={q1:'b12',q2:'b23',q3:'b34',q4:'ended'}[S.phase];
  if(nxt==='ended'){S.phase='ended';renderHdr();if(CUR_SCR===2)renderPartido();return;}
  var nextQNum={b12:2,b23:3,b34:4}[nxt];
  // Execute inicio-de-cuarto pairs
  var initPairs=S.pairs.filter(function(p){return p.q===nextQNum&&p.cd===0;});
  var cnt=0;
  for(var i=0;i<initPairs.length;i++){
    var p=initPairs[i];
    var oi=S.squad.indexOf(p.out);
    if(oi>=0){
      S.squad.splice(oi,1);
      if(S.bench.indexOf(p.out)<0) S.bench.push(p.out);
      if(S.squad.indexOf(p.inp)<0) S.squad.push(p.inp);
      var bi=S.bench.indexOf(p.inp); if(bi>=0) S.bench.splice(bi,1);
    }
    if(S.pos[p.out]) S.pos[p.inp]={x:S.pos[p.out].x,y:S.pos[p.out].y};
    S.log.push({type:'sub',sec:S.matchTime,outId:p.out,inId:p.inp,sit:'inicio_q'+nextQNum});
    S.execIds.push(String(p.id));
    cnt++;
  }
  S.breakCd=BREAKS[nxt];S.phase=nxt;S.qElapsed=0;S.running=true;
  var bb=document.getElementById('break-banner');
  if(bb){
    bb.style.display='flex';
    var bt=document.getElementById('brk-title');if(bt)bt.textContent={b12:'DESCANSO 2 MIN',b23:'MEDIO TIEMPO',b34:'DESCANSO 2 MIN'}[nxt];
    var bs=document.getElementById('brk-sub');if(bs)bs.textContent=cnt>0?cnt+' cambios de inicio Q'+nextQNum+' ejecutados':'Sin cambios de inicio';
    var bbn=document.getElementById('brk-btn');if(bbn)bbn.textContent='INICIAR Q'+nextQNum;
  }
  if(cnt>0) toast(cnt+' cambios de inicio Q'+nextQNum+' ejecutados','ok');
  startTmr();renderHdr();if(CUR_SCR===2)renderPartido();
}

function autoEndQ(){
  stopTmr();S.running=false;
  S.qLog.push({num:qNum(),start:S.matchTime-QD,end:S.matchTime});
  var nxt={q1:'b12',q2:'b23',q3:'b34',q4:'ended'}[S.phase];
  if(nxt==='ended'){S.phase='ended';renderHdr();navTo(3);return;}
  var nextQNum={b12:2,b23:3,b34:4}[nxt];
  var initPairs=S.pairs.filter(function(p){return p.q===nextQNum&&p.cd===0;});
  var cnt=0;
  for(var i=0;i<initPairs.length;i++){
    var p=initPairs[i];
    var oi=S.squad.indexOf(p.out);
    if(oi>=0){
      S.squad.splice(oi,1);
      if(S.bench.indexOf(p.out)<0) S.bench.push(p.out);
      if(S.squad.indexOf(p.inp)<0) S.squad.push(p.inp);
      var bi=S.bench.indexOf(p.inp); if(bi>=0) S.bench.splice(bi,1);
    }
    if(S.pos[p.out]) S.pos[p.inp]={x:S.pos[p.out].x,y:S.pos[p.out].y};
    S.log.push({type:'sub',sec:S.matchTime,outId:p.out,inId:p.inp,sit:'inicio_q'+nextQNum});
    S.execIds.push(String(p.id));
    cnt++;
  }
  S.breakCd=BREAKS[nxt];S.phase=nxt;S.qElapsed=0;S.running=true;
  var bb=document.getElementById('break-banner');
  if(bb){
    bb.style.display='flex';
    var bbn=document.getElementById('brk-btn');if(bbn)bbn.textContent='INICIAR Q'+nextQNum;
    var bs=document.getElementById('brk-sub');if(bs)bs.textContent=cnt>0?cnt+' cambios ejecutados':'';
  }
  startTmr();renderHdr();if(CUR_SCR===2)renderPartido();
}

function checkAlerts(){
  if(!isQ()) return;
  var q=qNum(), elapsed=S.qElapsed;
  var pending=getPendingNow(q,elapsed);
  for(var i=0;i<pending.length;i++){
    var p=pending[i], sl=p.secLeft;
    var k50='50_'+p.out+'_q'+q, k0='0_'+p.out+'_q'+q;
    var pO=gP(p.out),pI=gP(p.inp);
    if(!S.alerted[k50]&&sl>0&&sl<=50){
      S.alerted[k50]=1;
      toast('CAMBIO EN '+Math.round(sl)+'s: #'+(pO?pO.num:'?')+' -> #'+(pI?pI.num:'?'),'warn');
    }
    if(!S.alerted[k0]&&sl<=0){
      S.alerted[k0]=1;
      toast('CAMBIO AHORA: #'+(pO?pO.num:'?')+' -> #'+(pI?pI.num:'?'),'urgent');
    }
  }
}

function renderHdr(){
  var td=document.getElementById('timer-display');if(!td)return;
  td.textContent=isBk()?ft(S.breakCd):cdQ();
  td.style.color=isBk()?'#60a5fa':(!S.running&&S.phase!=='pre')?'#fbbf24':'#4ade80';
  var phases={pre:'PRE-PARTIDO',ended:'FINALIZADO',b12:'DESCANSO',b23:'MEDIO TIEMPO',b34:'DESCANSO'};
  var pl=document.getElementById('phase-lbl');
  if(pl) pl.textContent=phases[S.phase]||(isQ()?'Q'+qNum()+(S.running?' EN JUEGO':' PARADO'):'');
  var qp=document.getElementById('qpips');
  if(qp){
    var h='';
    for(var q=1;q<=4;q++){
      var done=false;
      for(var i=0;i<S.qLog.length;i++) if(S.qLog[i].num===q){done=true;break;}
      var act=S.phase===('q'+q);
      h+='<div class="qpip'+(done?' qpip-d':act?' qpip-a':'')+'"></div>';
    }
    qp.innerHTML=h;
  }
  var bt=document.getElementById('brk-timer');if(bt)bt.textContent=ft(S.breakCd);
  var rb=document.getElementById('riv-btn');if(rb)rb.textContent='ESP vs '+S.rival;
  var rl=document.getElementById('riv-lbl');if(rl)rl.textContent=S.rival;
}

function toggleRivCustom(sel){var cw=document.getElementById("riv-cw");if(cw)cw.style.display=sel.value==="OTHER"?"block":"none";}
// ── RIVAL ──
function openRivModal(){
  var opts='';
  for(var i=0;i<FIH.length;i++) opts+='<option value="'+FIH[i]+'"'+(S.rival===FIH[i]?' selected':'')+'>'+FIH[i]+'</option>';
  opts+='<option value="OTHER">Otro...</option>';
  openModal('<div class="modal-title">RIVAL</div>'+
    '<select class="finp" id="riv-sel" style="margin-bottom:10px" '+
    'onchange="toggleRivCustom(this)">'+opts+'</select>'+
    '<div id="riv-cw" style="display:none;margin-bottom:10px"><input class="finp" id="riv-custom" placeholder="Codigo FIH (3 letras)"></div>'+
    '<div class="modal-acts"><button class="btn-r" style="flex:1" onclick="setRival()">OK</button><button class="btn-n" onclick="closeModal()">CANCELAR</button></div>');
}
function setRival(){
  var sel=document.getElementById('riv-sel');if(!sel)return;
  if(sel.value==='OTHER'){var c=document.getElementById('riv-custom');if(c&&c.value.trim())S.rival=c.value.trim().toUpperCase();}
  else S.rival=sel.value;
  closeModal();scheduleSave();renderHdr();if(CUR_SCR===2)renderPartido();
}

function newMatch(){
  openModal('<div class="modal-title">NUEVO PARTIDO</div>'+
    '<div style="font-size:11px;color:var(--t2);margin-bottom:14px">Se conserva la plantilla, roles y variantes PC. Se borran marcador, log y cambios ejecutados.</div>'+
    '<div class="modal-acts"><button class="btn-r" style="flex:1" onclick="doNewMatch()">CONFIRMAR</button><button class="btn-n" onclick="closeModal()">CANCELAR</button></div>');
}
function doNewMatch(){
  closeModal();
  S.phase='pre';S.running=false;S.qElapsed=0;S.matchTime=0;S.breakCd=0;
  S.score={h:0,a:0};S.qLog=[];S.log=[];S.execIds=[];S.alerted={};
  S.cards=[];S.pb=[];S.events=[];
  stopTmr();clearInterval(stopInt);
  var bb=document.getElementById('break-banner');if(bb)bb.style.display='none';
  scheduleSave();renderHdr();navTo(0);
  toast('Nuevo partido iniciado. Plantilla conservada.','ok');
}

// ═══════════════════════════════════════════
// INFORME
// ═══════════════════════════════════════════
function renderInforme(){
  var el=document.getElementById('informe-content');if(!el)return;
  var h='<div style="font-size:12px;font-weight:800;color:var(--t);margin-bottom:14px">'+
        'ESP '+S.score.h+' - '+S.score.a+' '+S.rival+' &middot; '+ft(S.matchTime)+'</div>';
  var subs=S.log.filter(function(e){return e.type==='sub';});
  h+='<div style="font-size:7px;letter-spacing:3px;color:var(--t3);font-weight:800;text-transform:uppercase;margin-bottom:8px">CAMBIOS REALIZADOS</div>';
  if(!subs.length) h+='<div style="color:var(--t2);font-size:10px;margin-bottom:14px">Sin cambios registrados</div>';
  for(var i=0;i<subs.length;i++){
    var ev=subs[i], pO=gP(ev.outId), pI=gP(ev.inId);
    var qn=Math.floor(ev.sec/QD)+1, cd=ft(Math.max(0,QD-(ev.sec%QD)));
    h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border:1.5px solid var(--bd);border-radius:8px;margin-bottom:5px">'+
       '<span style="font-size:10px;font-weight:800;color:var(--a);min-width:52px;font-family:monospace">'+cd+' Q'+qn+'</span>'+
       '<span style="font-size:11px;color:var(--r);font-weight:700">SALE #'+(pO?pO.num:'?')+' '+(pO?pO.nick:'')+'</span>'+
       '<span style="color:var(--t3)">&#8594;</span>'+
       '<span style="font-size:11px;color:var(--g);font-weight:700">ENTRA #'+(pI?pI.num:'?')+' '+(pI?pI.nick:'')+'</span>'+
       '</div>';
  }
  var conv=S.squad.concat(S.bench);
  h+='<div style="font-size:7px;letter-spacing:3px;color:var(--t3);font-weight:800;text-transform:uppercase;margin:14px 0 8px">TIEMPOS DE JUEGO</div>';
  for(var i=0;i<conv.length;i++){
    var p=gP(conv[i]);if(!p)continue;
    var pt=playedTime(conv[i]),pct=S.matchTime>0?Math.round(pt/S.matchTime*100):0;
    h+='<div class="inf-player">'+
       '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'+
       '<span style="font-size:11px;font-weight:700">#'+p.num+' '+p.nick+'</span>'+
       '<span style="font-size:10px;color:var(--g);font-weight:700;font-family:monospace">'+ft(pt)+'</span></div>'+
       '<div class="inf-bar"><div class="inf-fill" style="width:'+pct+'%"></div></div>'+
       '</div>';
  }
  h+='<div style="display:flex;gap:8px;margin-top:16px">'+
     '<button class="btn-r" style="flex:1" onclick="exportXML()">EXPORTAR XML</button>'+
     '<button class="btn-n" style="flex:1" onclick="newMatch()">NUEVO PARTIDO</button>'+
     '</div>';
  el.innerHTML=h;
}

function exportXML(){
  var iid=1, lines=['<?xml version="1.0" encoding="utf-8"?>','<file>','  <ALL_INSTANCES>'];
  var conv=S.squad.concat(S.bench);
  for(var ci=0;ci<conv.length;ci++){
    var id=conv[ci], segs=[], inF=false, seg=null;
    var init=null;
    for(var i=0;i<S.log.length;i++) if(S.log[i].type==='init'){init=S.log[i];break;}
    if(init&&init.ids&&init.ids.indexOf(id)>=0){inF=true;seg=0;}
    for(var i=0;i<S.log.length;i++){
      var e=S.log[i]; if(e.type!=='sub') continue;
      if(e.outId===id&&inF){segs.push({s:seg,e:e.sec});inF=false;seg=null;}
      if(e.inId===id&&!inF){inF=true;seg=e.sec;}
    }
    if(inF&&seg!==null) segs.push({s:seg,e:S.matchTime});
    var p=gP(id);
    for(var si=0;si<segs.length;si++){
      lines.push('    <instance><ID>'+iid+'</ID><start>'+segs[si].s+'</start><end>'+segs[si].e+'</end><code>'+(p?p.nick:id)+'.Player</code></instance>');
      iid++;
    }
  }
  for(var i=0;i<S.events.length;i++){
    var ev=S.events[i];
    lines.push('    <instance><ID>'+iid+'</ID><start>'+ev.start+'</start><end>'+ev.end+'</end><code>'+ev.lbl+'</code></instance>');
    iid++;
  }
  for(var i=0;i<S.qLog.length;i++){
    var q=S.qLog[i];
    lines.push('    <instance><ID>'+iid+'</ID><start>'+q.start+'</start><end>'+q.end+'</end><code>Quarters_Time</code></instance>');
    iid++;
  }
  lines.push('  </ALL_INSTANCES>','</file>');
  var blob=new Blob([lines.join('')],{type:'application/xml'});

  var url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download='Logs-'+new Date().toISOString().slice(0,10)+'_ESP-'+S.rival+'.xml';
  a.click(); URL.revokeObjectURL(url);
}

// ── LOCALSTORAGE ──
var LS='rs26b_v1', _st=null;
function scheduleSave(){clearTimeout(_st);_st=setTimeout(doSave,1500);}
setInterval(doSave,15000);
function doSave(){
  try{
    var ea=[];
    for(var i=0;i<S.execIds.length;i++) ea.push(S.execIds[i]);
    localStorage.setItem(LS,JSON.stringify({
      squad:S.squad,bench:S.bench,roles:S.roles,pcVars:S.pcVars,nextVid:S.nextVid,posDragged:S.posDragged,
      pairs:S.pairs,mirror:S.mirror,rival:S.rival,
      phase:S.phase,qElapsed:S.qElapsed,matchTime:S.matchTime,breakCd:S.breakCd,
      score:S.score,qLog:S.qLog,log:S.log,execIds:ea,
      alerted:S.alerted,cards:S.cards,pb:S.pb,events:S.events,pos:S.pos
    }));
  }catch(e){console.warn('save',e);}
}
function doLoad(){
  try{
    var raw=localStorage.getItem(LS); if(!raw) return false;
    var d=JSON.parse(raw);
    var keys=['squad','bench','roles','pcVars','nextVid','pairs','mirror','rival',
               'phase','qElapsed','matchTime','breakCd','score','qLog','log',
               'execIds','alerted','cards','pb','events','pos','posDragged'];
    for(var i=0;i<keys.length;i++){
      var k=keys[i];
      if(d[k]!==undefined) S[k]=d[k];
    }
    return true;
  }catch(e){console.warn('load',e);return false;}
}

// ── START ──
initDefaults();
doLoad();
navTo(0);
</script>
