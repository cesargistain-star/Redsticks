<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>RedSticks v15 · RFEH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f0f2f5;color:#1a1a2e;font-family:'Barlow Condensed',sans-serif;font-size:14px;min-height:100vh}
button,select,input{font-family:'Barlow Condensed',sans-serif;-webkit-appearance:none;appearance:none}
button{cursor:pointer}
select option{background:#fff;color:#1a1a2e}

/* HEADER - dark for contrast */
#hdr{background:#1a1a2e;padding:7px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.logo{font-size:18px;font-weight:900;letter-spacing:3px;color:#fff}
.logo em{color:#e63030;font-style:normal}
.scoreboard{display:flex;align-items:center;gap:6px;background:#0d0d1a;border:1px solid #3a3a5a;border-radius:8px;padding:5px 10px}
.score-num{font-size:28px;font-weight:800;width:32px;text-align:center;font-variant-numeric:tabular-nums;color:#fff;font-family:'JetBrains Mono',monospace}
.score-dash{font-size:18px;color:#555;margin:0 3px}
.score-lbl{font-size:8px;color:#ccc;letter-spacing:2px;width:34px;font-weight:700}
.sbtn{background:#2a2a4a;border:1px solid #3a3a5a;color:#aaa;width:34px;height:34px;border-radius:6px;font-size:18px;display:flex;align-items:center;justify-content:center}
.sbtn-g{background:#0a2a0a;border-color:#2a5a2a;color:#4ade80}
.timer-block{display:flex;flex-direction:column;align-items:center;padding:4px 12px;background:#0d0d1a;border:1px solid #3a3a5a;border-radius:8px}
.timer{font-size:30px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#4ade80;letter-spacing:2px;line-height:1;transition:color 0.3s}
.timer-lbl{font-size:8px;color:#ccc;letter-spacing:1px;margin-top:2px;font-weight:700}
.qpips{display:flex;gap:3px;margin-top:3px}
.qpip{font-size:7px;padding:2px 5px;border-radius:3px;font-weight:700;background:#2a2a2a;color:#888}
.qpip-a{background:#e63030;color:#fff}
.qpip-done{background:#16a34a;color:#fff}
.nav{display:flex;gap:3px;margin-left:auto;flex-wrap:wrap}
.nbtn{background:none;border:1px solid #3a3a5a;color:#ccc;padding:7px 10px;font-size:8px;letter-spacing:1.5px;border-radius:6px;min-height:36px;font-weight:700}
.nbtn-a{border-color:#e63030;color:#fff;background:#C8102E}

/* SYSTEM ALERTS */
#cover-warn{display:none;background:#fff0f0;border-bottom:2px solid #e63030;padding:6px 14px;color:#C8102E;font-size:9px;letter-spacing:2px;font-weight:700}
#cards-bar{display:none;padding:6px 14px;border-bottom:1px solid #e8e8f0;flex-wrap:wrap;gap:5px;background:#fffbeb}
.cpill{display:flex;align-items:center;gap:5px;padding:4px 10px;border:2px solid;border-radius:16px;font-size:11px;font-weight:700}
#toast-stack{position:fixed;top:74px;right:10px;z-index:600;display:flex;flex-direction:column;gap:4px;max-width:320px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:10px;font-size:11px;pointer-events:all;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,0.15)}

/* CHANGE BANNERS */
#change-banners{position:fixed;bottom:0;left:0;right:0;z-index:500;display:flex;flex-direction:column;gap:3px;padding:6px;pointer-events:none}
.cbanner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;pointer-events:all;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:slideUp 0.3s ease}
.cb-now{background:#C8102E;border:none;color:#fff}
.cb-soon{background:#d97706;border:none;color:#fff}
.cb-out{font-size:12px;font-weight:700;opacity:0.9}
.cb-in{font-size:14px;font-weight:800}
.cb-secs{font-size:10px;opacity:0.8;margin-top:1px}
.cb-btn{background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.7);color:#fff;padding:11px 18px;border-radius:8px;font-size:14px;font-weight:800;min-height:48px;min-width:68px}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* SHIFT PANEL */
#shift-panel{position:fixed;bottom:0;left:0;right:0;z-index:450;background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,0.15);padding:16px;transform:translateY(100%);transition:transform 0.3s ease;max-height:72vh;overflow-y:auto;border-top:2px solid #e8e8f0}
#shift-panel.open{transform:translateY(0)}
.sp-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px}

/* CARD DECISION */
#card-decision{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:800;background:#fff;border:2px solid #e8e8f0;border-radius:14px;padding:18px;width:92%;max-width:460px;display:none;box-shadow:0 20px 60px rgba(0,0,0,0.2)}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:calc(100vh - 54px)}
@media (orientation:landscape){
  #match-layout{display:flex;flex:1;overflow:hidden}
  #left-panel{width:190px;flex-shrink:0;background:#fff;border-right:2px solid #e8e8f0;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:7px}
  #center-panel{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;min-width:0;overflow-y:auto}
  #right-panel{width:174px;flex-shrink:0;background:#fff;border-left:2px solid #e8e8f0;padding:8px;overflow-y:auto}
  #portrait-tabs{display:none}
  #hockey-field{width:100%;aspect-ratio:91.4/55;border-radius:10px;overflow:visible;position:relative}
}
@media (orientation:portrait){
  #match-layout{display:flex;flex-direction:column;flex:1;overflow:hidden}
  #left-panel{display:none}
  #right-panel{display:none}
  #center-panel{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;min-width:0;overflow-y:auto}
  #portrait-tabs{display:flex;border-bottom:2px solid #e8e8f0;background:#fff;overflow-x:auto}
  .ptab{background:none;border:none;border-bottom:3px solid transparent;color:#aaa;padding:10px 14px;font-size:9px;letter-spacing:2px;white-space:nowrap;min-height:42px;font-weight:700}
  .ptab-a{border-bottom-color:#e63030;color:#1a1a2e}
  #hockey-field{width:100%;aspect-ratio:91.4/55;border-radius:10px;overflow:visible;position:relative}
}

/* SECTION LABEL */
.slbl{font-size:7px;letter-spacing:3px;color:#aaa;font-weight:700;text-transform:uppercase;margin-bottom:6px}

/* BUTTONS - larger for iPad */
.btn-primary{background:#C8102E;border:none;color:#fff;padding:12px 20px;font-size:11px;letter-spacing:2px;font-weight:700;border-radius:8px;min-height:48px}
.btn-secondary{background:#f8f8fc;border:2px solid #e8e8f0;color:#555;padding:9px 13px;font-size:10px;font-weight:700;border-radius:8px;min-height:44px}
.btn-success{background:#f0fdf4;border:2px solid #16a34a;color:#16a34a;padding:11px 16px;font-size:11px;font-weight:800;border-radius:8px;min-height:48px}
.btn-danger{background:#fff0f0;border:2px solid #fca5a5;color:#C8102E;padding:9px 13px;font-size:10px;font-weight:700;border-radius:8px;min-height:44px}
.btn-del{background:#fff0f0;border:1px solid #fca5a5;color:#C8102E;padding:7px 11px;border-radius:7px;font-size:14px;min-height:40px;min-width:40px}

/* LEFT PANEL CONTROLS */
.cbtn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;border:2px solid;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;text-align:left;min-height:46px;width:100%}
.cbtn-play{background:#f0fdf4;border-color:#16a34a;color:#16a34a}
.cbtn-pause{background:#fffbeb;border-color:#d97706;color:#d97706}
.cbtn-end{background:#fff0f0;border-color:#e63030;color:#C8102E}
.cbtn-var{background:#faf5ff;border-color:#7c3aed;color:#7c3aed}
.cbtn-baja{background:#f8f8fc;border-color:#ccc;color:#666}
.event-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.evbtn{padding:9px 5px;border-radius:9px;border:2px solid;font-size:11px;font-weight:800;cursor:pointer;text-align:center;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:100%}
.ev-pc-p{background:#eff6ff;border-color:#3b82f6;color:#2563eb}
.ev-pc-n{background:#fffbeb;border-color:#f59e0b;color:#d97706}
.ev-gol-p{background:#f0fdf4;border-color:#16a34a;color:#16a34a}
.ev-gol-n{background:#fff0f0;border-color:#e63030;color:#C8102E}
.ev-sub{font-size:7px;opacity:0.6;font-weight:500}
.card-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.cardbtn{padding:8px 4px;border-radius:8px;border:2px solid;font-size:10px;font-weight:800;cursor:pointer;text-align:center;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.tag-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.tagbtn{padding:8px 5px;border-radius:8px;border:2px solid;font-size:10px;font-weight:700;cursor:pointer;text-align:center;min-height:42px;display:flex;align-items:center;justify-content:center;gap:5px;width:100%}
.tag-add{width:100%;margin-top:4px;background:none;border:1px dashed #ddd;color:#bbb;padding:7px;border-radius:7px;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;min-height:38px}

/* FIELD */
.player-token{position:absolute;width:60px;height:52px;border-radius:9px;border:2px solid;box-shadow:0 3px 10px rgba(0,0,0,0.2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3px;touch-action:none;user-select:none;transition:transform 0.1s,box-shadow 0.1s}
.tok-field{background:#16a34a;border-color:#15803d;color:#fff}
.tok-gk{background:#7c3aed;border-color:#6d28d9;color:#fff}
.tok-leaving{background:#b91c1c;border-color:#991b1b;color:#fff;animation:pulse 0.7s ease infinite}
.tok-sel{box-shadow:0 0 0 3px #fff,0 0 0 5px #2563eb!important;transform:scale(1.1);z-index:50}
.tok-dragging{opacity:0.5;transform:scale(0.95)}
.tok-drop-target{box-shadow:0 0 0 3px #fff,0 0 0 5px #16a34a!important;transform:scale(1.08)}
.tok-num{font-size:15px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.tok-name{font-size:7px;font-weight:700;line-height:1.1;max-width:56px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tok-time{font-size:7px;opacity:0.7;margin-top:1px;font-family:'JetBrains Mono',monospace}

/* BENCH PANEL */
#right-panel{background:#fff}
.bench-tile{display:flex;align-items:center;gap:7px;padding:8px 9px;border:2px solid #ea580c;border-radius:9px;background:#fff7ed;margin-bottom:5px;cursor:grab;touch-action:none}
.bench-num{font-size:14px;font-weight:800;color:#e63030;min-width:28px;font-family:'JetBrains Mono',monospace}
.bench-name{font-size:11px;font-weight:700;color:#1a1a2e}
.bench-cd{font-size:8px;color:#d97706;font-weight:700;margin-top:1px}
.bench-tile-dragging{opacity:0.4}

/* PENALTY BOX */
#penalty-box{position:absolute;right:3px;top:50%;transform:translateY(-50%);width:70px;background:rgba(220,38,38,0.1);border:2px solid rgba(220,38,38,0.4);border-radius:8px;padding:4px;z-index:20;min-height:50px}
.pb-label{font-size:7px;color:#C8102E;letter-spacing:1px;font-weight:700;text-align:center;margin-bottom:3px}
.pb-token{width:62px;border-radius:7px;border:2px solid #e63030;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;background:#fff0f0;margin-bottom:3px;cursor:pointer;animation:pulse 1s ease infinite}
.pb-num{font-size:13px;font-weight:800;color:#C8102E;line-height:1;font-family:'JetBrains Mono',monospace}
.pb-name{font-size:7px;color:#C8102E;font-weight:600}
.pb-cd{font-size:9px;font-weight:800;color:#d97706;font-family:'JetBrains Mono',monospace;margin-top:1px}

/* DROP CONFIRM BANNER */
#drop-confirm{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:700;background:#1a1a2e;color:#fff;padding:12px 18px;border-radius:12px;display:none;align-items:center;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,0.3);min-width:280px}
.dc-names{flex:1}
.dc-out{font-size:12px;color:#f87171;font-weight:700}
.dc-in{font-size:14px;color:#4ade80;font-weight:800}
.dc-yes{background:#16a34a;border:none;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:800;min-height:44px;font-family:'Barlow Condensed',sans-serif}
.dc-no{background:none;border:2px solid #555;color:#aaa;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:700;min-height:44px;font-family:'Barlow Condensed',sans-serif}

/* TABS */
.tabs{display:flex;border-bottom:2px solid #e8e8f0;overflow-x:auto;background:#fff;border-radius:10px 10px 0 0;flex-shrink:0}
.tab{background:none;border:none;border-bottom:3px solid transparent;color:#aaa;padding:10px 13px;font-size:8px;letter-spacing:2px;white-space:nowrap;min-height:44px;font-weight:700;margin-bottom:-2px}
.tab-a{border-bottom-color:#e63030;color:#1a1a2e}

/* COVERAGE */
.cov-strip{display:flex;gap:3px;flex-wrap:wrap}
.covpill{padding:3px 7px;border-radius:5px;font-size:8px;font-weight:700;letter-spacing:1px}
.cov-ok{background:#f0fdf4;color:#16a34a;border:1px solid #16a34a}
.cov-bad{background:#fff0f0;color:#C8102E;border:1px solid #e63030;animation:pulse 1s ease infinite}

/* NON-MATCH */
#content{padding:12px 14px;padding-bottom:100px;flex:1;overflow-y:auto}
.sec-title{font-size:9px;letter-spacing:3px;color:#aaa;margin-bottom:10px;font-weight:700;text-transform:uppercase}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:8px}
.ptile{padding:11px;border-radius:10px;background:#fff;border:2px solid #e8e8f0;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.ptile-on{border-color:#16a34a;background:#f0fdf4}
.ptile-bench{border-color:#ea580c;background:#fff7ed}
.pnum{font-size:19px;font-weight:800;color:#e63030;font-family:'JetBrains Mono',monospace}
.ppos{font-size:7px;color:#aaa;letter-spacing:2px;font-weight:700}
.pname{font-size:13px;color:#333;font-weight:700;margin:3px 0}
.rtags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.rtag{font-size:7px;padding:2px 5px;border:1px solid #e8e8f0;border-radius:4px;color:#aaa;font-weight:600}
.rtag-r1{border-color:#f59e0b;color:#d97706;background:#fffbeb}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:7px;margin-top:8px}
.rbox{display:flex;align-items:center;gap:8px;padding:11px 13px;border:2px solid #dcfce7;border-radius:9px;background:#f0fdf4}
.rbox-bad{border-color:#fecaca;background:#fff0f0}
.fbox{background:#fff;border:1px solid #e8e8f0;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.flbl{font-size:8px;letter-spacing:2px;color:#aaa;width:60px;flex-shrink:0;font-weight:700}
.finp{background:#f8f8fc;border:1.5px solid #e8e8f0;color:#1a1a2e;padding:11px 13px;font-size:13px;border-radius:8px;flex:1;min-height:46px;font-family:'Barlow Condensed',sans-serif}
.gblock{border:2px solid #e8e8f0;border-radius:10px;overflow:hidden;margin-bottom:8px;background:#fff}
.ghdr{display:flex;align-items:center;gap:8px;padding:10px 13px;background:#f8f8fc;border-bottom:1px solid #eee}
.prow{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid #f5f5f5}
.qtabs{display:flex;gap:4px;margin-bottom:11px}
.qtab{padding:9px 16px;border:2px solid #e8e8f0;border-radius:8px;background:#fff;color:#888;font-size:10px;font-weight:700;letter-spacing:1px;min-height:40px}
.qtab-a{border-color:#C8102E;color:#C8102E;background:#fff0f0}
.team-card{padding:13px 16px;border:2px solid #e8e8f0;border-radius:10px;background:#fff;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.team-card-a{border-color:#C8102E;background:#fff0f0}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.rep-card{padding:11px 13px;border:2px solid #e8e8f0;border-radius:10px;background:#fff}
.rbar{height:4px;background:#eee;border-radius:4px;margin:5px 0;overflow:hidden}
.rfill{height:100%;background:linear-gradient(90deg,#e63030,#16a34a);border-radius:4px}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px}
.ltile{padding:10px;border-radius:9px;background:#fff;border:2px solid #e8e8f0}
.ltile-bench{border-color:#ea580c;background:#fff7ed}
.upnext{font-size:8px;color:#d97706;background:#fffbeb;padding:3px 6px;border-radius:4px;display:inline-block;margin-top:3px;font-weight:700}
.empty{color:#ccc;font-size:11px;padding:16px 0;text-align:center}
.ev-log-row{font-size:9px;color:#888;padding:5px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:700;padding:16px}
.modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-title{font-size:13px;font-weight:800;letter-spacing:2px;color:#1a1a2e;margin-bottom:14px;text-transform:uppercase}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* PC VARIANT PANEL */
#pc-variant-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:800;background:#fff;border-radius:16px;padding:20px;width:92%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);border:2px solid #e8e8f0}

</style>
</head>
<body>
<div id="toast-stack"></div>
<div id="change-banners"></div>
<div id="pc-variant-panel"></div>
<div id="shift-panel"><div class="sp-handle"></div><div id="sp-content"></div></div>
<div id="card-decision"></div>
<div id="drop-confirm">
  <div class="dc-names">
    <div class="dc-out" id="dc-out-txt"></div>
    <div class="dc-in" id="dc-in-txt"></div>
  </div>
  <button class="dc-yes" id="dc-yes">✓ OK</button>
  <button class="dc-no" onclick="cancelDrop()">✕</button>
</div>

// Fatigue thresholds (minutes continuous on field)
let FATIGUE_WARN = 10; // yellow
let FATIGUE_HIGH = 14; // orange

function getPCVariants() { return teamPCVariants[activeTeamId] || []; }

function getAvailableVariants() {
  const onField = getCurrentOnField();
  return getPCVariants().filter(v =>
    v.playerIds.every(pid => onField.includes(pid))
  );
}

// ── FATIGUE UTILS ──
function getContinuousMinutes(id) {
  // How long has this player been on field continuously since last sub or start
  const onField = getCurrentOnField();
  if (!onField.includes(id)) return 0;
  const subs = S.changeLog.filter(e => e.type === "sub").sort((a,b) => b.sec - a.sec);
  const lastEntry = subs.find(e => e.inId === id);
  const startSec = lastEntry ? lastEntry.sec : 0;
  return Math.floor((S.matchTime - startSec) / 60);
}

function getFatigueColor(mins) {
  if (mins >= FATIGUE_HIGH) return "#ea580c"; // orange
  if (mins >= FATIGUE_WARN) return "#d97706"; // yellow
  return null; // normal
}

// ── BENCH TIME UTILS ──
function getBenchTime(id) {
  // Total seconds spent on bench this match
  const played = getPlayedTime(id);
  return Math.max(0, S.matchTime - played);
}

function getShiftCount(id) {
  const subs = S.changeLog.filter(e => e.type === "sub");
  const entries = subs.filter(e => e.inId === id).length;
  const exits = subs.filter(e => e.outId === id).length;
  return {entries, exits, total: entries + exits};
}

// ── NUMERIC SITUATION ──
function getNumericSituation() {
  const active = activeSanctions();
  const reds = S.cards.filter(c => !c.isRival && c.type === "red").length;
  const rivalActive = S.cards.filter(c => c.isRival && cardActive(c) && c.type !== "red").length;
  const rivalReds = S.cards.filter(c => c.isRival && c.type === "red").length;
  const ourOut = active.length + reds;
  const theirOut = rivalActive + rivalReds;
  if (ourOut > theirOut) return "inf"; // inferioridad
  if (ourOut < theirOut) return "sup"; // superioridad
  return "eq"; // igualdad
}

function getNumericLabel() {
  const sit = getNumericSituation();
  if (sit === "sup") return "⬆ SUPERIORIDAD";
  if (sit === "inf") return "⬇ INFERIORIDAD";
  return "= IGUALDAD";
}

// ── UTILS ──
function ft(s){if(s==null||s<0)s=0;return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
function cdQ(){return ft(Math.max(0,QD-S.quarterElapsed));}
function minCD(min){
  if(min===60)return"INICIO Q2";
  if(min===61)return"INICIO Q3";
  if(min===62)return"INICIO Q4";
  return ft(Math.max(0,QD-(min%15)*60));
}
function teamPlayers(){return pool.filter(p=>p.teamId===activeTeamId);}
function squadPlayers(){return pool.filter(p=>p.teamId===activeTeamId&&S.squad.includes(p.id));}
function getPlayer(id){return pool.find(p=>p.id===id);}
function getTags(){return teamTags[activeTeamId]||[];}
function espCode(){return"ESP";}
function rivalCode(){return S.rival?.code||"RIV";}

function buildGrid(){
  const sp=squadPlayers();const fs=new Set(S.initialOnField);const g={};
  sp.forEach(p=>{g[p.id]=new Array(TOTAL_MINS).fill(false);});
  for(let m=0;m<TOTAL_MINS;m++){
    // Handle quarter start pairs: Q2=m0, Q3=m30... map special minutes
    const qStartMap={60:15,61:30,62:45}; // special minute → actual minute
    S.pairs.filter(s=>{
      if(s.minute===m)return true;
      if(qStartMap[s.minute]===m)return true;
      return false;
    }).filter(s=>s.outId&&s.inId).forEach(s=>{fs.delete(s.outId);fs.add(s.inId);});
    fs.forEach(id=>{if(g[id])g[id][m]=true;});
  }
  return g;
}

function checkCoverage(ids){
  const on=pool.filter(p=>ids.includes(p.id));const cov={};
  getCriticalRoles().forEach(r=>{cov[r.id]=on.filter(p=>p.roles&&p.roles[r.id]!==undefined).sort((a,b)=>a.roles[r.id]-b.roles[r.id]);});
  const miss=getCriticalRoles().filter(r=>!cov[r.id]||cov[r.id].length===0).map(r=>r.id);
  return{cov,miss};
}

function getCurrentOnField(){
  const g=buildGrid();const m=Math.min(Math.floor(S.matchTime/60),59);
  return squadPlayers().filter(p=>g[p.id]&&g[p.id][m]&&!S.penaltyBox.includes(p.id)).map(p=>p.id);
}

function getPendingByMinute(){
  const cur=Math.floor(S.matchTime/60);
  // Filter out quarter-start pairs (60/61/62) from live pending - handled separately
  const pending=S.pairs.filter(p=>!S.executedPairIds.has(p.id)&&p.minute>=cur&&p.minute<60).sort((a,b)=>a.minute-b.minute);
  const byMin={};pending.forEach(p=>{if(!byMin[p.minute])byMin[p.minute]=[];byMin[p.minute].push(p);});
  return byMin;
}
function getQuarterStartPairs(qNum){
  // qNum: 2,3,4 → minute: 60,61,62
  const specialMin={2:60,3:61,4:62}[qNum];
  if(!specialMin)return[];
  return S.pairs.filter(p=>p.minute===specialMin&&!S.executedPairIds.has(p.id));
}

function isQPhase(){return["q1","q2","q3","q4"].includes(S.phase);}
function isBreak(){return S.phase.startsWith("break");}
function qIdx(){return["q1","q2","q3","q4"].indexOf(S.phase);}
function cardRemaining(c){if(!c.dur)return null;return Math.max(0,c.dur-(S.matchTime-c.issuedMatchTime));}
function cardActive(c){if(c.type==="red")return true;if(!c.dur)return false;return cardRemaining(c)>0;}
function activeSanctions(){return S.cards.filter(c=>!c.isRival&&c.type!=="red"&&cardActive(c));}
function expectedOnField(){return 11-activeSanctions().length-S.cards.filter(c=>!c.isRival&&c.type==="red").length;}
function getPlayedTime(id){
  let played=0,inF=S.changeLog.find(e=>e.type==="initial")?.onField?.includes(id)??false,lastT=0;
  S.changeLog.filter(e=>e.type==="sub").forEach(ev=>{if(ev.outId===id&&inF){played+=ev.sec-lastT;inF=false;lastT=ev.sec;}if(ev.inId===id&&!inF){inF=true;lastT=ev.sec;}});
  if(inF)played+=S.matchTime-lastT;
  return played;
}

function pushAlert(text,level="warn"){
  const id=Date.now()+Math.random();APP.alerts.push({id,text,level});renderToasts();
  setTimeout(()=>{APP.alerts=APP.alerts.filter(a=>a.id!==id);renderToasts();},level==="urgent"?25000:9000);
}
function renderToasts(){
  const el=document.getElementById("toast-stack");if(!el)return;
  el.innerHTML=APP.alerts.map(a=>{
    const col=a.level==="ok"?"#16a34a":a.level==="urgent"?"#C8102E":a.level==="info"?"#2563eb":"#d97706";
    const bg=a.level==="ok"?"#f0fdf4":a.level==="urgent"?"#fff0f0":a.level==="info"?"#eff6ff":"#fffbeb";
    return `<div class="toast" style="background:${bg};border:2px solid ${col};color:${col}">
      <span style="font-size:14px">${a.level==="ok"?"✓":a.level==="urgent"?"⚑":"●"}</span>
      <span style="flex:1">${a.text}</span>
      <button onclick="dismissAlert(${a.id})" style="background:none;border:none;color:${col};font-size:16px;padding:2px 6px">✕</button>
    </div>`;
  }).join("");
}
function dismissAlert(id){APP.alerts=APP.alerts.filter(a=>a.id!==id);renderToasts();}

// ── CHANGE BANNERS ──
function renderChangeBanners(){
  const el=document.getElementById("change-banners");if(!el)return;
  if(APP.screen!=="match"||!isQPhase()){el.innerHTML="";return;}
  const byMin=getPendingByMinute();const curMin=Math.floor(S.matchTime/60);
  const banners=[];
  Object.keys(byMin).map(Number).sort((a,b)=>a-b).forEach(min=>{
    const secInQ=(min%15)*60;const secsToChange=secInQ-S.quarterElapsed;
    const isNow=min<=curMin||secsToChange<=0;const isSoon=!isNow&&secsToChange<=50;
    if(isNow||isSoon)byMin[min].forEach(pair=>{
      const pO=getPlayer(pair.outId),pI=getPlayer(pair.inId);
      banners.push({pair,pO,pI,isNow,secs:Math.max(0,secsToChange)});
    });
  });
  el.innerHTML=banners.map(b=>`
    <div class="cbanner ${b.isNow?"cb-now":"cb-soon"}">
      <div style="font-size:20px">${b.isNow?"🔴":"⏱"}</div>
      <div style="flex:1">
        <div class="cb-out">↑ SALE: #${b.pO?.number} ${b.pO?.name}</div>
        <div class="cb-in">↓ ENTRA: #${b.pI?.number} ${b.pI?.name}</div>
        ${!b.isNow?`<div class="cb-secs">En ${b.secs}s</div>`:""}
      </div>
      <button class="cb-btn" onclick="executePairById(${b.pair.id})">✓ OK</button>
    </div>`).join("");
}

// ── SCORE ──
function chScore(t,d){S.score[t]=Math.max(0,S.score[t]+d);document.getElementById("sc-"+t).textContent=S.score[t];}

// ── NAVIGATION ──
function goScreen(scr){
  APP.screen=scr;APP.selTok=null;closeShiftPanel();cancelDrop();
  document.querySelectorAll(".nbtn").forEach((b,i)=>{b.classList.toggle("nbtn-a",["teams","setup","plan","match","report"][i]===scr);});
  const isMatch=scr==="match";
  document.getElementById("scoreboard").style.display=isMatch?"flex":"none";
  document.getElementById("timer-block").style.display=isMatch?"flex":"none";
  document.getElementById("content").style.display=isMatch?"none":"block";
  document.getElementById("match-layout").style.display=isMatch?"flex":"none";
  if(isMatch)renderMatchLayout();else renderContent();
  renderChangeBanners();renderHeader();
}

// ── HEADER ──
function renderHeader(){
  const lh=document.getElementById("lbl-home"),la=document.getElementById("lbl-away");
  if(lh)lh.textContent=espCode();if(la)la.textContent=rivalCode();
  const el=document.getElementById("timer");if(!el)return;
  let disp=S.stopActive&&S.stopIsAuto?ft(S.stopCountdown):isBreak()?ft(S.breakCountdown):cdQ();
  el.textContent=disp;
  let col="#4ade80";
  if(S.stopActive)col=S.stopReason==="var"?"#c084fc":"#60a5fa";
  else if(isBreak())col="#60a5fa";
  else if(!S.running&&S.phase!=="pre")col="#fbbf24";
  el.style.color=col;
  let lbl="PRE-PARTIDO";
  if(S.phase==="ended")lbl="FINALIZADO";
  else if(S.phase==="break12")lbl="DESCANSO 2'";
  else if(S.phase==="break23")lbl="MEDIO TIEMPO";
  else if(S.phase==="break34")lbl="DESCANSO 2'";
  else if(S.stopActive){const sr={pc_p:"⏸ PC+",pc_n:"⏸ PC−",gol_p:"⏸ GOL+",gol_n:"⏸ GOL−",var:"⏸ VAR"};lbl=sr[S.stopReason]||"⏸ PARADO";}
  else if(isQPhase())lbl="Q"+(qIdx()+1)+(S.running?" · EN JUEGO":" · PARADO");
  document.getElementById("phase-lbl").textContent=lbl;
  const pips=document.getElementById("qpips");
  if(pips)pips.innerHTML=[1,2,3,4].map(q=>{const done=S.quarterLog.find(ql=>ql.num===q);const active=S.phase===["q1","q2","q3","q4"][q-1];return`<div class="qpip ${done?"qpip-done":active?"qpip-a":""}">${q}</div>`;}).join("");
  const cur=getCurrentOnField();const{miss}=checkCoverage(cur);
  const expected=expectedOnField();const actual=cur.length;
  const cw=document.getElementById("cover-warn");
  if(cw&&APP.screen==="match"){
    if(actual>expected){cw.style.display="block";cw.textContent="⚑⚑ DEMASIADOS EN CAMPO ("+actual+") — REVISA";}
    else if(actual<expected){cw.style.display="block";cw.textContent="⚑⚑ FALTAN JUGADORES EN CAMPO ("+actual+"/"+expected+")";}
    else if(miss.length>0){cw.style.display="block";cw.textContent="⚠ SIN COBERTURA PC: "+miss.map(r=>getRoles().find(x=>x.id===r)?.label).join(" · ");}
    else cw.style.display="none";
  }else if(cw)cw.style.display="none";
  renderCardsBar();
}

function renderCardsBar(){
  const bar=document.getElementById("cards-bar");if(!bar)return;
  const active=S.cards.filter(c=>cardActive(c));
  if(active.length>0&&APP.screen==="match"){
    bar.style.display="flex";
    bar.innerHTML=active.map(c=>{
      const ct=CARD_TYPES.find(x=>x.id===c.type);const rem=cardRemaining(c);
      const p=getPlayer(c.playerId);const em=c.type==="green"?"🟢":c.type==="yellow"?"🟡":"🔴";
      const nm=c.isRival?rivalCode()+":#"+(c.rivalNum||"?"):"#"+p?.number+" "+p?.name?.split(" ")[0];
      return `<div class="cpill" style="border-color:${ct.color};background:${ct.bg};color:${ct.color}">
        <span>${em}</span><span>${nm}</span>
        ${rem!=null?`<span style="font-family:'JetBrains Mono',monospace">${ft(rem)}</span>`:`<span>EXPULSADO</span>`}
        ${c.type==="yellow"&&!c.extended&&rem>60?`<button onclick="extYellow(${c.id})" style="background:none;border:1px solid ${ct.color};color:${ct.color};padding:2px 5px;font-size:8px;border-radius:4px">+5'</button>`:""}
        <button onclick="removeCard(${c.id})" style="background:none;border:none;color:${ct.color};font-size:14px;padding:2px 6px">✕</button>
      </div>`;
    }).join("");
  }else bar.style.display="none";
}
function extYellow(id){S.cards=S.cards.map(c=>c.id===id?{...c,dur:10*60,extended:true}:c);}
function removeCard(id){const c=S.cards.find(x=>x.id===id);if(c)S.penaltyBox=S.penaltyBox.filter(p=>p!==c.playerId);S.cards=S.cards.filter(x=>x.id!==id);renderCardsBar();if(APP.screen==="match"){renderCenterPanel();renderHeader();}}

// ── TIMER ──
function startTimer(){
  clearInterval(timerInt);if(!S.running||S.stopActive)return;
  timerInt=setInterval(()=>{
    if(isBreak()){S.breakCountdown--;if(S.breakCountdown<=0){S.running=false;S.breakCountdown=0;}}
    else if(isQPhase()){S.quarterElapsed++;S.matchTime++;if(S.quarterElapsed>=QD){autoEndQ();return;}checkSubAlerts();checkCardReturns();}
    renderHeader();renderChangeBanners();
  },1000);
}
function stopTimer(){clearInterval(timerInt);}
function autoEndQ(){stopTimer();S.running=false;S.quarterLog.push({num:qIdx()+1,startSec:S.matchTime-QD,endSec:S.matchTime});const next={q1:"break12",q2:"break23",q3:"break34",q4:"ended"}[S.phase];if(next==="ended"){S.phase="ended";goScreen("report");return;}S.breakCountdown=BREAKS[next];S.phase=next;S.quarterElapsed=0;renderHeader();if(APP.screen==="match")renderMatchLayout();}
function manualEndQ(){stopTimer();S.running=false;if(S.stopActive)forceResume();S.quarterLog.push({num:qIdx()+1,startSec:S.matchTime-S.quarterElapsed,endSec:S.matchTime});const next={q1:"break12",q2:"break23",q3:"break34",q4:"ended"}[S.phase];if(next==="ended"){S.phase="ended";goScreen("report");return;}S.breakCountdown=BREAKS[next];S.phase=next;S.quarterElapsed=0;renderHeader();if(APP.screen==="match")renderMatchLayout();}
function startNextQ(){
  const nq={pre:"q1",break12:"q2",break23:"q3",break34:"q4"}[S.phase];if(!nq)return;
  if(S.phase==="pre")S.changeLog=[{type:"initial",onField:[...S.initialOnField],sec:0}];
  S.phase=nq;S.quarterElapsed=0;S.running=true;
  // Auto-execute quarter start pairs
  const qNum={q1:1,q2:2,q3:3,q4:4}[nq];
  const startPairs=getQuarterStartPairs(qNum);
  if(startPairs.length>0){
    startPairs.forEach(pair=>executePair(pair));
    pushAlert("✓ "+startPairs.length+" cambio"+( startPairs.length>1?"s":"")+" de inicio Q"+qNum+" ejecutados","ok");
  }
  startTimer();renderHeader();if(APP.screen==="match")renderMatchLayout();
}
function pausePlay(){S.running=false;stopTimer();renderHeader();if(APP.screen==="match")renderLeftPanel();}
function resumePlay(){S.running=true;startTimer();renderHeader();if(APP.screen==="match")renderLeftPanel();}
function triggerManualStop(reason){if(!isQPhase())return;stopTimer();S.running=false;S.stopActive=true;S.stopReason=reason;S.stopIsAuto=false;S.stopLog.push({reason,at:S.matchTime,dur:null});renderHeader();if(APP.screen==="match")renderLeftPanel();}
function triggerAutoStop(reason,dur){if(!isQPhase())return;stopTimer();S.running=false;S.stopActive=true;S.stopReason=reason;S.stopIsAuto=true;S.stopCountdown=dur;S.stopLog.push({reason,at:S.matchTime,dur});clearInterval(stopInt);stopInt=setInterval(()=>{S.stopCountdown--;if(S.stopCountdown<=0){resumeStop();return;}renderHeader();},1000);renderHeader();if(APP.screen==="match")renderLeftPanel();}
function resumeStop(){clearInterval(stopInt);S.stopActive=false;S.stopReason=null;S.stopCountdown=0;S.stopIsAuto=false;S.running=true;startTimer();renderHeader();if(APP.screen==="match")renderLeftPanel();}
function forceResume(){clearInterval(stopInt);S.stopActive=false;S.stopReason=null;S.stopCountdown=0;S.stopIsAuto=false;}

// ── PC / GOL ──
function triggerPC(side){
  if(S.stopActive)forceResume();
  triggerManualStop(side==="p"?"pc_p":"pc_n");
  recordEvent(side==="p"?`PC_${espCode()}`:`PC_${rivalCode()}`,side==="p"?"pc_p":"pc_n",0,2,side==="p");
  // Show PC variants panel immediately for PC+ (our corner)
  if(side==="p") setTimeout(()=>openPCVariantPanel(), 150);
}
function triggerGOL(side){
  triggerAutoStop(side==="p"?"gol_p":"gol_n",GOL_STOP);
  // Update score automatically
  if(side==="p"){S.score.home++;document.getElementById("sc-home").textContent=S.score.home;}
  else{S.score.away++;document.getElementById("sc-away").textContent=S.score.away;}
  recordEvent(side==="p"?`GOL_${espCode()}`:`GOL_${rivalCode()}`,side==="p"?"gol_p":"gol_n",5,5,side==="p");
}
function recordEvent(label,code,pre,post,askPlayer){
  const start=Math.max(0,S.matchTime-pre);const end=S.matchTime+post;
  if(!askPlayer){S.events.push({id:Date.now(),label,code,start,end,playerId:null});pushAlert("◉ "+label,"info");return;}
  const curOnField=getCurrentOnField();
  const pOpts=curOnField.map(id=>{const p=getPlayer(id);return`<option value="${id}">#${p?.number} ${p?.name}</option>`;}).join("");
  const q=code==="gol_p"?"¿Quién marcó?":code==="pc_p"?"¿Quién generó el PC?":"¿Quién provocó el PC?";
  openModal(`<div class="modal-title">${label}</div>
    <div style="font-size:12px;color:#888;margin-bottom:12px">${q}</div>
    <select class="finp" id="ev-player" style="margin-bottom:14px"><option value="">— opcional —</option>${pOpts}</select>
    <div style="display:flex;gap:10px">
      <button class="btn-primary" style="margin-top:0" onclick="confirmEvent('${label}','${code}',${start},${end})">CONFIRMAR</button>
      <button class="btn-secondary" onclick="confirmEvent('${label}','${code}',${start},${end},true)">SIN JUGADOR</button>
    </div>`);
}
function confirmEvent(label,code,start,end,skip){
  const pid=skip?null:(parseInt(document.getElementById("ev-player")?.value)||null);
  S.events.push({id:Date.now(),label,code,start,end,playerId:pid});
  const p=pid?getPlayer(pid):null;
  pushAlert("◉ "+label+(p?" · "+p.name.split(" ")[0]:""),"info");
  closeModal();if(APP.screen==="match")renderRightPanel();
}
function triggerTag(tagId){
  const tag=getTags().find(t=>t.id===tagId);if(!tag)return;
  const start=Math.max(0,S.matchTime-tag.pre);const end=S.matchTime+tag.post;
  S.events.push({id:Date.now(),label:tag.label,code:"tag_"+tagId,start,end,playerId:null,color:tag.color});
  pushAlert("◉ "+tag.label,"info");if(APP.screen==="match")renderRightPanel();
}

// ── CARDS ──
function issueCard(type,playerId,isRival,rivalNum){
  const ct=CARD_TYPES.find(c=>c.id===type);const cardId=Date.now();
  S.cards.push({id:cardId,playerId,type,issuedMatchTime:S.matchTime,dur:ct.dur,extended:false,isRival,rivalNum,decision:null,substituteId:null});
  if(!isRival&&type!=="red"){
    S.penaltyBox.push(playerId);
    const p=getPlayer(playerId);
    pushAlert((type==="green"?"🟢":"🟡")+" #"+p?.number+" "+p?.name+" → PENALTI BOX","urgent");
    const cur=getCurrentOnField();const{miss}=checkCoverage(cur);
    if(miss.length>0)pushAlert("⚠ SIN COBERTURA: "+miss.map(r=>getRoles().find(x=>x.id===r)?.label).join(", "),"urgent");
    showCardDecision(cardId);
  }else if(!isRival&&type==="red"){
    S.unavailable.push(playerId);const p=getPlayer(playerId);
    pushAlert("🔴 EXPULSIÓN: #"+p?.number+" "+p?.name,"urgent");
  }else pushAlert("◉ Tarjeta "+type+" rival","info");
  renderCardsBar();if(APP.screen==="match"){renderCenterPanel();renderHeader();}
}

function showCardDecision(cardId){
  const card=S.cards.find(c=>c.id===cardId);if(!card)return;
  const p=getPlayer(card.playerId);const ct=CARD_TYPES.find(c=>c.id===card.type);
  const curMin=Math.floor(S.matchTime/60);
  const nextPair=S.pairs.filter(pr=>pr.outId===card.playerId&&!S.executedPairIds.has(pr.id)&&pr.minute>=curMin).sort((a,b)=>a.minute-b.minute)[0];
  const bench=squadPlayers().filter(p2=>!getCurrentOnField().includes(p2.id)&&!S.penaltyBox.includes(p2.id)&&!S.unavailable.includes(p2.id)&&p2.id!==card.playerId);
  const secsToPair=nextPair?((nextPair.minute%15)*60-S.quarterElapsed):null;
  const recChange=secsToPair!=null&&secsToPair<CARD_RETURN_THRESHOLD;
  const defaultSub=nextPair?getPlayer(nextPair.inId):null;
  const benchOpts=bench.map(b=>`<option value="${b.id}" ${defaultSub&&b.id===defaultSub.id?"selected":""}>#${b.number} ${b.name}</option>`).join("");
  const panel=document.getElementById("card-decision");
  panel.innerHTML=`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div style="width:44px;height:44px;border-radius:10px;background:${ct.bg};border:2px solid ${ct.color};display:flex;align-items:center;justify-content:center;font-size:18px">${card.type==="green"?"🟢":"🟡"}</div>
    <div><div style="font-size:15px;font-weight:800;color:#1a1a2e">#${p?.number} ${p?.name}</div><div style="font-size:11px;color:#888">${ct.dur/60}' en penalti box</div></div>
  </div>
  <div style="font-size:9px;letter-spacing:2px;color:#aaa;font-weight:700;margin-bottom:10px">¿QUÉ HACE AL TERMINAR LA SANCIÓN?</div>
  ${nextPair?`<div style="padding:9px 11px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;margin-bottom:12px;font-size:11px;color:#2563eb"><b>Cambio planificado:</b> ${minCD(nextPair.minute)} Q${Math.floor(nextPair.minute/15)+1} → #${getPlayer(nextPair.inId)?.number} ${getPlayer(nextPair.inId)?.name}${recChange?` <b style="color:#d97706">(recomendado)</b>`:""}</div>`:""}
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn-success" style="flex:1" onclick="setCardDecision(${cardId},'return')">↩ VOLVER AL CAMPO</button>
    <button class="btn-primary" style="flex:1;background:${recChange?"#C8102E":"#555"}" onclick="setCardDecision(${cardId},'change')">↔ REALIZAR CAMBIO</button>
  </div>
  <div id="card-sub-sel" style="display:none;margin-top:8px">
    <div class="slbl" style="margin-bottom:8px">SUSTITUTO</div>
    <select class="finp" id="card-sub" style="margin-bottom:12px"><option value="">— seleccionar —</option>${benchOpts}</select>
    <button class="btn-primary" style="width:100%" onclick="confirmCardChange(${cardId})">CONFIRMAR CAMBIO</button>
  </div>
  <button onclick="document.getElementById('card-decision').style.display='none'" style="width:100%;margin-top:10px;background:none;border:1px solid #e8e8f0;color:#aaa;padding:9px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;min-height:40px">DECIDIR MÁS TARDE</button>`;
  panel.style.display="block";
}
function setCardDecision(cardId,decision){
  S.cards=S.cards.map(c=>c.id===cardId?{...c,decision}:c);
  if(decision==="return"){document.getElementById("card-decision").style.display="none";pushAlert("↩ Volverá al campo al terminar la sanción","info");}
  else document.getElementById("card-sub-sel").style.display="block";
}
function confirmCardChange(cardId){
  const subId=parseInt(document.getElementById("card-sub")?.value);if(!subId)return pushAlert("Selecciona un sustituto","warn");
  S.cards=S.cards.map(c=>c.id===cardId?{...c,substituteId:subId}:c);
  document.getElementById("card-decision").style.display="none";
  const card=S.cards.find(c=>c.id===cardId);const p=getPlayer(card.playerId),sub=getPlayer(subId);
  pushAlert("✓ Al terminar: #"+p?.number+" banquillo → #"+sub?.number+" "+sub?.name,"ok");
}
function checkCardReturns(){
  S.cards.filter(c=>!c.isRival&&(c.type==="green"||c.type==="yellow")&&S.penaltyBox.includes(c.playerId)).forEach(c=>{
    const rem=cardRemaining(c);
    if(rem<=0){
      S.penaltyBox=S.penaltyBox.filter(id=>id!==c.playerId);const p=getPlayer(c.playerId);
      if(c.decision==="change"&&c.substituteId){
        S.changeLog.push({type:"sub",outId:c.playerId,inId:c.substituteId,sec:S.matchTime});
        if(S.fieldPositions[c.playerId])S.fieldPositions[c.substituteId]={...S.fieldPositions[c.playerId]};
        const sub=getPlayer(c.substituteId);
        pushAlert("✓ #"+p?.number+" banquillo → #"+sub?.number+" "+sub?.name+" al campo","ok");
      }else pushAlert("✓ #"+p?.number+" "+p?.name+" vuelve al campo","ok");
      APP.activeTab="field";if(APP.screen==="match"){renderCenterPanel();renderRightPanel();renderHeader();}
    }else if(rem<=30&&!c._warned30){c._warned30=true;const p=getPlayer(c.playerId);pushAlert("⏱ #"+p?.number+" "+p?.name+" sale en 30s","warn");if(!c.decision)showCardDecision(c.id);}
  });
}

// ── SUBS ──
function executePair(pair){
  const numSit = getNumericSituation();
  S.changeLog.push({type:"sub",outId:pair.outId,inId:pair.inId,sec:S.matchTime,numSit});
  S.executedPairIds.add(pair.id);
  if(S.fieldPositions[pair.outId])S.fieldPositions[pair.inId]={...S.fieldPositions[pair.outId]};
  const pO=getPlayer(pair.outId),pI=getPlayer(pair.inId);
  const sitLabel=numSit==="sup"?"⬆ SUP":numSit==="inf"?"⬇ INF":"= IGU";
  pushAlert("✓ #"+pO?.number+" "+pO?.name+" → #"+pI?.number+" "+pI?.name+" · "+sitLabel,"ok");
  APP.activeTab="field";
  renderChangeBanners();if(APP.screen==="match"){renderCenterPanel();renderRightPanel();}
}
function executePairById(id){const p=S.pairs.find(x=>x.id===id);if(p)executePair(p);}
function executeGroup(min){(getPendingByMinute()[min]||[]).forEach(p=>executePair(p));}
function executeManualSub(outId,inId){const np={id:Date.now(),minute:Math.floor(S.matchTime/60),outId,inId};S.pairs.push(np);executePair(np);}

function checkSubAlerts(){
  const byMin=getPendingByMinute();const curMin=Math.floor(S.matchTime/60);
  Object.keys(byMin).map(Number).forEach(min=>{
    const secInQ=(min%15)*60;const secsToChange=secInQ-S.quarterElapsed;
    const k50="50-"+min+"-q"+(qIdx()+1);
    if(!alertedSecs.has(k50)&&secsToChange>0&&secsToChange<=50){alertedSecs.add(k50);const ns=byMin[min].map(p=>"#"+getPlayer(p.outId)?.number+"→#"+getPlayer(p.inId)?.number).join(", ");pushAlert("⏱ CAMBIO EN "+secsToChange+"s · "+ns,"warn");}
    const k0="0-"+min+"-q"+(qIdx()+1);
    if(!alertedSecs.has(k0)&&(min<=curMin||secsToChange<=0)){alertedSecs.add(k0);const ns=byMin[min].map(p=>getPlayer(p.outId)?.name?.split(" ")[0]+"→"+getPlayer(p.inId)?.name?.split(" ")[0]).join(", ");pushAlert("⚑⚑ ¡CAMBIO AHORA! "+ns,"urgent");}
  });
}
function applyContingency(id,reason){
  S.unavailable.push(id);S.penaltyBox=S.penaltyBox.filter(p=>p!==id);
  S.pairs=S.pairs.filter(p=>p.outId!==id&&p.inId!==id);
  const p=getPlayer(id);pushAlert("⚠ BAJA: #"+p?.number+" "+p?.name,"urgent");
  closeModal();if(APP.screen==="match")renderMatchLayout();else renderContent();
}

function renderCenterPanel(){
  const el=document.getElementById("center-panel");if(!el)return;
  const curOnField=getCurrentOnField();const{miss}=checkCoverage(curOnField);const g=buildGrid();const curMin=Math.floor(S.matchTime/60);
  const expected=expectedOnField();const actual=curOnField.length;
  const countOk=actual===expected;
  // Break countdown banner
  const breakBanner = isBreak() ? `<div style="background:#eff6ff;border:2px solid #3b82f6;border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px">
    <div style="font-size:13px;font-weight:800;color:#2563eb">${S.phase==="break23"?"⏸ MEDIO TIEMPO":"⏸ DESCANSO"}</div>
    <div style="font-size:36px;font-weight:900;color:#2563eb;font-family:'JetBrains Mono',monospace;letter-spacing:2px">${ft(S.breakCountdown)}</div>
    <div style="flex:1;font-size:11px;color:#2563eb;opacity:0.7">Prepara jugadores para Q${["break12","break23","break34"].indexOf(S.phase)+2}</div>
    <button class="btn-primary" style="background:#2563eb" onclick="startNextQ()">▶ Q${["break12","break23","break34"].indexOf(S.phase)+2}</button>
  </div>` : "";

  const covHTML=`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
    <div class="cov-strip">${getCriticalRoles().map(r=>{const ok=!miss.includes(r.id);return`<div class="covpill ${ok?"cov-ok":"cov-bad"}">${r.label}${ok?"✓":"✗"}</div>`;}).join("")}</div>
    <div style="margin-left:auto;font-size:11px;font-weight:800;color:${countOk?"#16a34a":"#C8102E"};font-family:'JetBrains Mono',monospace">${actual}/${expected}</div>
  </div>`;
  const tabsDef=[["field","CAMPO"],["next","CAMBIOS"],["bench","BANQUILLO"],["roles","ROLES"],["grid","GRID"],["log","LOG"]];
  const tabsHTML=`<div class="tabs">${tabsDef.map(([t,l])=>`<button class="tab ${APP.activeTab===t?"tab-a":""}" onclick="setMatchTab('${t}')">${l}</button>`).join("")}</div>`;
  let tabContent="";
  if(APP.activeTab==="field")tabContent=buildFieldHTML(curOnField,curMin);
  else if(APP.activeTab==="next"){
    const byMin=getPendingByMinute();const mwp=Object.keys(byMin).map(Number).sort((a,b)=>a-b);
    if(mwp.length===0)tabContent=`<div class="empty" style="padding:30px">${S.pairs.length===0?"Sin cambios planificados":"✓ Todos ejecutados"}</div>`;
    else tabContent=mwp.map(min=>{
      const grp=byMin[min];const secInQ=(min%15)*60;const secsToChange=secInQ-S.quarterElapsed;
      const cd=ft(Math.max(0,QD-secInQ));const qNum=Math.floor(min/15)+1;
      const isNow=min<=curMin||secsToChange<=0;const isSoon=!isNow&&secsToChange<=60;
      return `<div class="gblock" style="border-color:${isNow?"#fca5a5":isSoon?"#fde68a":"#e8e8f0"};background:${isNow?"#fff0f0":isSoon?"#fffbeb":"#fff"};margin-bottom:8px">

  }else if(APP.activeTab==="roles"){
    const{cov}=checkCoverage(curOnField);
    tabContent=`<div class="rgrid">${getCriticalRoles().map(r=>{const h=cov[r.id]||[];const ok=h.length>0;return`<div class="rbox ${ok?"":"rbox-bad"}" style="flex-direction:column;align-items:flex-start;gap:4px;padding:11px"><div style="display:flex;gap:7px;align-items:center"><span style="font-size:18px">${ok?"✅":"❌"}</span><span style="font-weight:800;font-size:12px;color:${ok?"#16a34a":"#C8102E"}">${r.label}</span><span style="font-size:9px;color:#aaa">${r.desc}</span></div>${h.map(p=>`<div style="font-size:11px;color:#666"><span style="color:#d97706;font-weight:700;margin-right:4px">R${p.roles[r.id]}</span>#${p.number} ${p.name.split(" ")[0]}</div>`).join("")}${!ok?`<div style="font-size:10px;color:#C8102E;font-weight:700">⚠ Sin cobertura</div>`:""}</div>`;}).join("")}</div>`;
  }else if(APP.activeTab==="grid")tabContent=buildGridHTML(g,curMin,true);
  else{const subs=S.changeLog.filter(e=>e.type==="sub");tabContent=`<div class="sec-title">CAMBIOS REALIZADOS</div>${subs.length===0?`<div class="empty">Sin cambios</div>`:""}${subs.map(ev=>{const pO=getPlayer(ev.outId),pI=getPlayer(ev.inId);const qNum=Math.floor(ev.sec/QD)+1;const cd=ft(Math.max(0,QD-(ev.sec%QD)));const sitCol=ev.numSit==="sup"?"#16a34a":ev.numSit==="inf"?"#C8102E":"#555";const sitLbl=ev.numSit==="sup"?"⬆":ev.numSit==="inf"?"⬇":"=";return`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #f5f5f5;background:#fff;border-radius:7px;margin-bottom:3px"><span style="font-size:10px;color:#C8102E;min-width:56px;font-weight:800;font-family:'JetBrains Mono',monospace">${cd} Q${qNum}</span><div style="flex:1"><div style="font-size:12px;color:#C8102E;font-weight:700">↑ #${pO?.number} ${pO?.name}</div><div style="font-size:12px;color:#16a34a;font-weight:700">↓ #${pI?.number} ${pI?.name}</div></div><span style="font-size:12px;font-weight:800;color:${sitCol};min-width:20px;text-align:center">${sitLbl}</span></div>`;}).join("")}`;}
  el.innerHTML=breakBanner+covHTML+tabsHTML+`<div id="match-tab">${tabContent}</div>`;
  if(APP.activeTab==="field")setupFieldDrag();
}

// ─────────────────────────────────────
// FIELD HTML & DRAG SYSTEM
// The key fix: use a GLOBAL touch tracker on document
// so drags can cross element boundaries
// ─────────────────────────────────────
function buildFieldHTML(curOnField,curMin){
  const byMin=getPendingByMinute();
  const leavingIds=new Set();Object.values(byMin).forEach(grp=>grp.forEach(p=>leavingIds.add(p.outId)));
  const fc=FIELD_COLORS[S.fieldColor]||"#2d7a2d";
  const tokens=curOnField.map(id=>{
    const p=getPlayer(id);if(!p)return"";
    const pos=S.fieldPositions[id]||{x:50,y:50};
    const isGK=p.position==="GK";const isLeaving=leavingIds.has(id);const isSel=APP.selTok===id;
    const played=getPlayedTime(id);
    const contMins=getContinuousMinutes(id);
    const fatigueCol=getFatigueColor(contMins);
    const baseStyle=isLeaving?"background:#b91c1c;border-color:#991b1b":isGK?"background:#7c3aed;border-color:#6d28d9":fatigueCol?`background:${fatigueCol};border-color:${fatigueCol}`:"background:#16a34a;border-color:#15803d";
    return `<div class="player-token ${isSel?"tok-sel":""}" 
      id="tok-${id}" data-field-id="${id}"
      style="left:calc(${pos.x}% - 30px);top:calc(${pos.y}% - 26px);${baseStyle};${isLeaving?"animation:pulse 0.7s ease infinite":""}">
      <div class="tok-num">#${p.number}</div>
      <div class="tok-name">${p.name.split(" ")[0]}</div>
      <div class="tok-time">${ft(played)}</div>
      ${fatigueCol&&!isLeaving?`<div style="font-size:6px;color:rgba(255,255,255,0.85);font-weight:700">${contMins}'</div>`:""}
    </div>`;
  }).join("");
  const pbTokens=S.penaltyBox.map(id=>{
    const p=getPlayer(id);if(!p)return"";
    const card=S.cards.find(c=>c.playerId===id&&cardActive(c)&&c.type!=="red");
    const rem=card?cardRemaining(card):0;
    return `<div class="pb-token" onclick="openPBOptions(${id})">
      <div class="pb-num">#${p.number}</div>
      <div class="pb-name">${p.name.split(" ")[0]}</div>
      <div class="pb-cd">${ft(rem)}</div>
    </div>`;
  }).join("");
  return `<div id="hockey-field" style="background:${fc}">
    ${drawField(fc)}${tokens}
    ${S.penaltyBox.length>0?`<div id="penalty-box"><div class="pb-label">🟨 PB</div>${pbTokens}</div>`:""}
  </div>
  <div style="margin-top:5px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap">
    <span style="font-size:8px;color:#aaa">Toca → shifts · Arrastra → cambio</span>
    <span style="display:flex;align-items:center;gap:4px;font-size:8px;color:#16a34a;font-weight:700"><span style="width:10px;height:10px;background:#16a34a;border-radius:3px;display:inline-block"></span>Normal</span>
    <span style="display:flex;align-items:center;gap:4px;font-size:8px;color:#d97706;font-weight:700"><span style="width:10px;height:10px;background:#d97706;border-radius:3px;display:inline-block"></span>Fatiga (+${FATIGUE_WARN}')</span>
    <span style="display:flex;align-items:center;gap:4px;font-size:8px;color:#ea580c;font-weight:700"><span style="width:10px;height:10px;background:#ea580c;border-radius:3px;display:inline-block"></span>Alta (+${FATIGUE_HIGH}')</span>
  </div>`;
}

function drawField(fc){
  const W=100,H=60;const l="rgba(255,255,255,0.85)";const d="rgba(255,255,255,0.45)";const s="rgba(255,255,255,0.03)";
  return `<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <rect width="${W}" height="${H}" fill="${fc}"/>
    ${[0,1,2,3,4,5].map(i=>`<rect x="${i*16.6}" y="0" width="8.3" height="${H}" fill="${s}"/>`).join("")}
    <rect x="1" y="1" width="${W-2}" height="${H-2}" fill="none" stroke="${l}" stroke-width="0.6"/>
    <line x1="${W/2}" y1="1" x2="${W/2}" y2="${H-1}" stroke="${l}" stroke-width="0.4"/>
    <line x1="25" y1="1" x2="25" y2="${H-1}" stroke="${l}" stroke-width="0.4"/>
    <line x1="75" y1="1" x2="75" y2="${H-1}" stroke="${l}" stroke-width="0.4"/>
    <clipPath id="cL"><rect x="1" y="1" width="24" height="${H-2}"/></clipPath>
    <circle cx="1" cy="${H/2}" r="18" fill="none" stroke="${l}" stroke-width="0.5" clip-path="url(#cL)"/>
    <circle cx="1" cy="${H/2}" r="22" fill="none" stroke="${d}" stroke-width="0.4" stroke-dasharray="1.5,1.5" clip-path="url(#cL)"/>
    <circle cx="9" cy="${H/2}" r="0.5" fill="${l}"/>
    <clipPath id="cR"><rect x="75" y="1" width="24" height="${H-2}"/></clipPath>
    <circle cx="${W-1}" cy="${H/2}" r="18" fill="none" stroke="${l}" stroke-width="0.5" clip-path="url(#cR)"/>
    <circle cx="${W-1}" cy="${H/2}" r="22" fill="none" stroke="${d}" stroke-width="0.4" stroke-dasharray="1.5,1.5" clip-path="url(#cR)"/>
    <circle cx="${W-9}" cy="${H/2}" r="0.5" fill="${l}"/>
    <rect x="1" y="${H/2-3.3}" width="2.4" height="6.6" fill="rgba(255,255,255,0.15)" stroke="${l}" stroke-width="0.5"/>
    <rect x="${W-3.4}" y="${H/2-3.3}" width="2.4" height="6.6" fill="rgba(255,255,255,0.15)" stroke="${l}" stroke-width="0.5"/>
    <circle cx="${W/2}" cy="${H/2}" r="0.5" fill="${l}"/>
  </svg>`;
}

// ─────────────────────────────────────
// GLOBAL DRAG SYSTEM
// Works across element boundaries on iOS
// ─────────────────────────────────────
let GD = {
  active: false,
  type: null,      // 'field' or 'bench'
  id: null,
  startX: 0, startY: 0,
  moved: false,
  el: null,        // ghost element
  sourceEl: null,
};
const DRAG_MIN = 8;

function getElAtPoint(x, y, excludeEl) {
  if (excludeEl) excludeEl.style.pointerEvents = 'none';
  const el = document.elementFromPoint(x, y);
  if (excludeEl) excludeEl.style.pointerEvents = '';
  return el;
}

function getFieldToken(x, y, ghostEl) {
  const el = getElAtPoint(x, y, ghostEl);
  if (!el) return null;
  const tok = el.closest('[data-field-id]');
  return tok ? parseInt(tok.dataset.fieldId) : null;
}

function isOverField(x, y, ghostEl) {
  const field = document.getElementById('hockey-field');
  if (!field) return false;
  const r = field.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

function isOverRightPanel(x, y, ghostEl) {
  const rp = document.getElementById('right-panel');
  if (!rp) return false;
  const r = rp.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

// Create ghost element for visual drag feedback
function createGhost(sourceEl, x, y) {
  const ghost = sourceEl.cloneNode(true);
  ghost.style.position = 'fixed';
  ghost.style.width = sourceEl.offsetWidth + 'px';
  ghost.style.height = sourceEl.offsetHeight + 'px';
  ghost.style.left = (x - sourceEl.offsetWidth/2) + 'px';
  ghost.style.top = (y - sourceEl.offsetHeight/2) + 'px';
  ghost.style.opacity = '0.85';
  ghost.style.zIndex = '9999';
  ghost.style.pointerEvents = 'none';
  ghost.style.transform = 'scale(1.1)';
  ghost.style.boxShadow = '0 8px 24px rgba(0,0,0,0.4)';
  ghost.style.borderRadius = '10px';
  ghost.removeAttribute('id');
  document.body.appendChild(ghost);
  return ghost;
}

function moveGhost(ghost, x, y) {
  if (!ghost) return;
  ghost.style.left = (x - ghost.offsetWidth/2) + 'px';
  ghost.style.top = (y - ghost.offsetHeight/2) + 'px';
}

function removeGhost(ghost) {
  if (ghost && ghost.parentNode) ghost.parentNode.removeChild(ghost);
}

// Clear all drop target highlights
function clearDropTargets() {
  document.querySelectorAll('.tok-drop-target').forEach(e => e.classList.remove('tok-drop-target'));
}

// ── FIELD TOKEN DRAG SETUP ──
function setupFieldDrag() {
  document.querySelectorAll('[data-field-id]').forEach(tok => {
    tok.addEventListener('touchstart', onFieldTokTouchStart, {passive: false});
    tok.addEventListener('mousedown', onFieldTokMouseDown);
  });
}

function onFieldTokTouchStart(e) {
  e.preventDefault();
  const id = parseInt(this.dataset.fieldId);
  const t = e.touches[0];
  GD = {active:true, type:'field', id, startX:t.clientX, startY:t.clientY, moved:false, el:null, sourceEl:this};
  document.addEventListener('touchmove', onGlobalTouchMove, {passive:false});
  document.addEventListener('touchend', onGlobalTouchEnd, {passive:false});
}

function onFieldTokMouseDown(e) {
  e.preventDefault();
  const id = parseInt(this.dataset.fieldId);
  GD = {active:true, type:'field', id, startX:e.clientX, startY:e.clientY, moved:false, el:null, sourceEl:this};
  document.addEventListener('mousemove', onGlobalMouseMove);
  document.addEventListener('mouseup', onGlobalMouseUp);
}

// ── BENCH TILE DRAG SETUP ──
function setupBenchDrag() {
  document.querySelectorAll('[data-bench-id]').forEach(tile => {
    tile.addEventListener('touchstart', onBenchTileTouchStart, {passive:false});
    tile.addEventListener('mousedown', onBenchTileMouseDown);
  });
}

function onBenchTileTouchStart(e) {
  e.preventDefault();
  const id = parseInt(this.dataset.benchId);
  const t = e.touches[0];
  GD = {active:true, type:'bench', id, startX:t.clientX, startY:t.clientY, moved:false, el:null, sourceEl:this};
  document.addEventListener('touchmove', onGlobalTouchMove, {passive:false});
  document.addEventListener('touchend', onGlobalTouchEnd, {passive:false});
}

function onBenchTileMouseDown(e) {
  e.preventDefault();
  const id = parseInt(this.dataset.benchId);
  GD = {active:true, type:'bench', id, startX:e.clientX, startY:e.clientY, moved:false, el:null, sourceEl:this};
  document.addEventListener('mousemove', onGlobalMouseMove);
  document.addEventListener('mouseup', onGlobalMouseUp);
}

// ── GLOBAL MOVE ──
function onGlobalTouchMove(e) {
  e.preventDefault();
  if (!GD.active) return;
  const t = e.touches[0];
  handleDragMove(t.clientX, t.clientY);
}
function onGlobalMouseMove(e) {
  if (!GD.active) return;
  handleDragMove(e.clientX, e.clientY);
}

function handleDragMove(x, y) {
  const dx = Math.abs(x - GD.startX), dy = Math.abs(y - GD.startY);
  if (!GD.moved && (dx > DRAG_MIN || dy > DRAG_MIN)) {
    GD.moved = true;
    if (GD.sourceEl) {
      GD.el = createGhost(GD.sourceEl, x, y);
      GD.sourceEl.classList.add('tok-dragging');
    }
  }
  if (!GD.moved) return;
  moveGhost(GD.el, x, y);

  // Highlight drop targets
  clearDropTargets();
  if (GD.type === 'bench') {
    // Bench → highlight field tokens as potential targets
    const targetId = getFieldToken(x, y, GD.el);
    if (targetId) {
      const tok = document.getElementById('tok-' + targetId);
      if (tok) tok.classList.add('tok-drop-target');
    }
  } else if (GD.type === 'field') {
    // Field token → can move within field (repositioning)
    // If moved to right panel → show bench highlight
    if (isOverRightPanel(x, y, GD.el)) {
      const rp = document.getElementById('right-panel');
      if (rp) rp.style.background = '#f0fdf4';
    } else {
      const rp = document.getElementById('right-panel');
      if (rp) rp.style.background = '#fff';
      // Move token on field
      const field = document.getElementById('hockey-field');
      if (field && isOverField(x, y, GD.el)) {
        const r = field.getBoundingClientRect();
        const px = Math.max(2, Math.min(98, (x-r.left)/r.width*100));
        const py = Math.max(2, Math.min(98, (y-r.top)/r.height*100));
        S.fieldPositions[GD.id] = {x:px, y:py};
        const tok = document.getElementById('tok-' + GD.id);
        if (tok) { tok.style.left = `calc(${px}% - 30px)`; tok.style.top = `calc(${py}% - 26px)`; }
      }
    }
  }
}

// ── GLOBAL END ──
function onGlobalTouchEnd(e) {
  e.preventDefault();
  const t = e.changedTouches[0];
  handleDragEnd(t.clientX, t.clientY);
  document.removeEventListener('touchmove', onGlobalTouchMove);
  document.removeEventListener('touchend', onGlobalTouchEnd);
}
function onGlobalMouseUp(e) {
  handleDragEnd(e.clientX, e.clientY);
  document.removeEventListener('mousemove', onGlobalMouseMove);
  document.removeEventListener('mouseup', onGlobalMouseUp);
}

function handleDragEnd(x, y) {
  if (!GD.active) return;
  clearDropTargets();
  const rp = document.getElementById('right-panel');
  if (rp) rp.style.background = '#fff';
  removeGhost(GD.el);
  if (GD.sourceEl) GD.sourceEl.classList.remove('tok-dragging');

  if (!GD.moved) {
    // It was a tap
    if (GD.type === 'field') openShiftPanelFor(GD.id);
    GD = {active:false};
    return;
  }

  if (GD.type === 'bench') {
    // Check if dropped on a field token
    const targetId = getFieldToken(x, y, null);
    if (targetId && getCurrentOnField().includes(targetId)) {
      // Show drop confirm
      showDropConfirm(GD.id, targetId); // inId=bench, outId=field
    } else if (isOverField(x, y, null)) {
      // Dropped on field but not on a specific token - pick who goes out
      openSelectOutModal(GD.id);
    }
    // else: dropped back on bench, ignore
  } else if (GD.type === 'field') {
    // If dropped over right panel → remove from field
    if (isOverRightPanel(x, y, null)) {
      openSelectInModal(GD.id);
    }
    // else: already repositioned during move
  }

  GD = {active:false};
}

function buildGridHTML(g,curMin,isMatch){
  const CW=11,LW=120,RH=17;
  let h=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:9px;border:1px solid #e8e8f0">`;
  h+=`<div style="display:flex;margin-left:${LW}px;background:#f8f8fc">`;

  h+=`</div><div style="display:flex;margin-left:${LW}px;border-bottom:1px solid #eee">`;
  for(let m=0;m<TOTAL_MINS;m++){const cdSec=QD-(m%15)*60;const lbl=(m%5===0)?String(Math.ceil(cdSec/60)):"";h+=`<div style="width:${CW}px;text-align:center;font-size:5px;color:${m%5===0?"#aaa":"#e0e0e0"};border-left:${m%15===0?"1px solid #e8e8f0":"none"}">${lbl}</div>`;}
  h+=`</div>`;
  squadPlayers().forEach(p=>{const isU=S.unavailable.includes(p.id);const tm=g[p.id]?.filter(Boolean).length??0;
    h+=`<div style="display:flex;align-items:center;border-bottom:1px solid #f5f5f5"><div style="width:${LW}px;flex-shrink:0;padding:0 7px;display:flex;align-items:center;gap:3px;opacity:${isU?0.3:1}"><span style="font-size:9px;color:#e63030;font-weight:800;min-width:20px;font-family:'JetBrains Mono',monospace">#${p.number}</span><span style="font-size:9px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:68px;font-weight:600">${p.name.split(" ")[0]}</span><span style="font-size:7px;color:#aaa;margin-left:auto;font-weight:700">${p.position}</span></div>`;
    for(let m=0;m<TOTAL_MINS;m++){const pl=g[p.id]?.[m]??false;const pv=m>0?(g[p.id]?.[m-1]??false):pl;const si=pl&&!pv&&m>0,so=!pl&&pv&&m>0;const ic=isMatch&&m===curMin;h+=`<div style="width:${CW}px;height:${RH}px;flex-shrink:0;position:relative;background:${isU?"#f9f9f9":ic?"#bfdbfe":pl?"#bbf7d0":"#f9f9f9"};border-left:${m%15===0?"1px solid #e8e8f0":"1px solid #f0f0f0"}">`;if((si||so)&&!isU)h+=`<div style="position:absolute;top:0;left:0;width:2px;height:100%;background:${si?"#16a34a":"#e63030"}"></div>`;if(ic)h+=`<div style="position:absolute;top:0;left:0;width:100%;height:2px;background:#2563eb"></div>`;h+=`</div>`;}
    h+=`<div style="width:26px;text-align:right;padding-right:4px;font-size:8px;color:${isU?"#e63030":"#aaa"};flex-shrink:0;font-weight:700;font-family:'JetBrains Mono',monospace">${isU?"—":tm+"'"}</div></div>`;
  });
  const cvs=Array(TOTAL_MINS).fill(0).map((_,m)=>{const on=squadPlayers().filter(p=>g[p.id]?.[m]);const{miss}=checkCoverage(on.map(p=>p.id));return{miss:miss.length>0,cnt:on.length};});

  h+=`</div></div>`;return h;
}

function toggleNewRoleCrit(){window._newRoleCrit=!window._newRoleCrit;const btn=document.getElementById("nr-crit-btn");if(btn){btn.textContent=window._newRoleCrit?"🔔 Sí":"🔕 No";btn.style.background=window._newRoleCrit?"#fff0f0":"#f0fdf4";btn.style.borderColor=window._newRoleCrit?"#fca5a5":"#bbf7d0";btn.style.color=window._newRoleCrit?"#C8102E":"#16a34a";}}

function addRole(){const label=document.getElementById("nr-label")?.value?.trim().toUpperCase();const desc=document.getElementById("nr-desc")?.value?.trim()||"";if(!label)return pushAlert("Añade una etiqueta","warn");if(!teamRoles[activeTeamId])teamRoles[activeTeamId]=[];teamRoles[activeTeamId].push({id:"r_"+(++nextRoleId),label,desc,critical:window._newRoleCrit!==false});openRoleEditor();}

function renderPlan(el){
  const g=buildGrid();
  const tabHtml=["pairs","grid","summary"].map(t=>`<button class="btn-secondary" style="${APP.planTab===t?"border-color:#16a34a;color:#16a34a":""}" onclick="setPlanTab('${t}')">${t.toUpperCase()}</button>`).join("");
  let body="";
  if(APP.planTab==="pairs"){
    const qTabHtml=[1,2,3,4].map(q=>`<button class="qtab ${APP.planQ===q?"qtab-a":""}" onclick="setPlanQ(${q})">Q${q}</button>`).join("");
    const qS=(APP.planQ-1)*15,qE=APP.planQ*15-1;
    const qPairs=S.pairs.filter(p=>p.minute>=qS&&p.minute<=qE);
    const byMin=qPairs.reduce((a,p)=>{if(!a[p.minute])a[p.minute]=[];a[p.minute].push(p);return a;},{});
    const copyFrom=APP.planQ===3?1:APP.planQ===4?2:null;const copyTo=APP.planQ===1?3:APP.planQ===2?4:null;
    const copyBtns=(copyFrom?`<button class="btn-secondary" onclick="copyQPairs(${copyFrom},${APP.planQ})" style="font-size:10px">⬇ Copiar Q${copyFrom}</button>`:"")+(copyTo?`<button class="btn-secondary" onclick="copyQPairs(${APP.planQ},${copyTo})" style="font-size:10px">⬆ → Q${copyTo}</button>`:"");
    // Show INICIO Q pair at top if exists
    const specialMin=58+APP.planQ;
    const inicioPairs=S.pairs.filter(p=>p.minute===specialMin);
    const inicioHTML=APP.planQ>1&&inicioPairs.length>0?`<div style="background:#fff0f0;border:2px solid #C8102E;border-radius:10px;padding:10px 12px;margin-bottom:10px">
      <div style="font-size:10px;letter-spacing:2px;color:#C8102E;font-weight:800;margin-bottom:8px">⚑ INICIO Q${APP.planQ} — SE EJECUTA AUTOMÁTICAMENTE</div>
      ${inicioPairs.map((pair,i)=>{const pO=getPlayer(pair.outId),pI=getPlayer(pair.inId);return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #fecaca"><span style="font-size:10px;color:#ccc;min-width:18px">${i+1}.</span><div style="flex:1"><div style="font-size:13px;color:#C8102E;font-weight:700">↑ #${pO?.number} ${pO?.name}</div><div style="font-size:13px;color:#16a34a;font-weight:700">↓ #${pI?.number} ${pI?.name}</div></div><button class="btn-del" onclick="removePair(${pair.id})">✕</button></div>`;}).join("")}
    </div>`:APP.planQ>1?`<div style="background:#f8f8fc;border:1px dashed #e8e8f0;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:11px;color:#aaa;text-align:center">Sin cambio en INICIO Q${APP.planQ} — selecciona "⚑ INICIO Q${APP.planQ}" en el selector de tiempo para añadir</div>`:"";

    const groups=Object.keys(byMin).map(Number).sort((a,b)=>a-b).map(min=>{
      const cd=minCD(min);const grp=byMin[min];
      const sf=(()=>{const s=new Set(S.initialOnField);S.pairs.filter(p=>p.minute<=min&&p.outId&&p.inId).sort((a,b)=>a.minute-b.minute).forEach(p=>{s.delete(p.outId);s.add(p.inId);});return[...s];})();
      const{miss}=checkCoverage(sf);
      return `<div class="gblock" style="border-color:${miss.length?"#fca5a5":"#e8e8f0"}"><div class="ghdr"><span style="font-size:15px;font-weight:800;color:#C8102E;min-width:68px;font-family:'JetBrains Mono',monospace">${cd}</span><span style="font-size:10px;color:#aaa">Q${APP.planQ} · ${grp.length} cambio${grp.length>1?"s":""}</span>${miss.length?`<span style="font-size:9px;color:#C8102E;margin-left:8px;font-weight:700">⚠</span>`:""}</div>${grp.map((pair,i)=>{const pO=getPlayer(pair.outId),pI=getPlayer(pair.inId);return`<div class="prow"><span style="font-size:11px;color:#ccc;min-width:20px">${i+1}.</span><div style="flex:1"><div style="font-size:13px;color:#C8102E;font-weight:700">↑ #${pO?.number} ${pO?.name}</div><div style="font-size:13px;color:#16a34a;font-weight:700">↓ #${pI?.number} ${pI?.name}</div></div><button class="btn-del" onclick="removePair(${pair.id})">✕</button></div>`;}).join("")}</div>`;
    }).join("");
    body=`<div class="qtabs">${qTabHtml}</div><div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">${copyBtns}</div>
    <div class="fbox"><div class="sec-title" style="margin-bottom:10px">NUEVO CAMBIO · Q${APP.planQ}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:none"><label class="flbl" style="width:auto">TIEMPO Q</label><select class="finp" id="form-min" style="width:112px;margin-top:5px" onchange="updatePairSelects()">${APP.planQ>1?`<option value="${58+APP.planQ}" style="font-weight:800;color:#C8102E">⚑ INICIO Q${APP.planQ}</option>`:""}
            ${Array.from({length:15},(_,i)=>{const minAbs=(APP.planQ-1)*15+(14-i);const cd=ft(Math.max(0,QD-(14-i)*60));return`<option value="${minAbs}">${cd}</option>`;}).join("")}</select></div>
        <div style="flex:1;min-width:130px"><label class="flbl" style="width:auto">SALE ↑</label><select class="finp" id="form-out" style="color:#C8102E;margin-top:5px"><option value="">— sale —</option></select></div>
        <div style="flex:1;min-width:130px"><label class="flbl" style="width:auto">ENTRA ↓</label><select class="finp" id="form-in" style="color:#16a34a;margin-top:5px"><option value="">— entra —</option></select></div>
        <button class="btn-primary" style="margin-top:0;padding:11px 16px" onclick="addPair()">+ ADD</button>
      </div>
    </div>
    <div style="padding:11px;background:#eff6ff;border-radius:9px;margin-bottom:12px;font-size:11px;color:#2563eb;font-weight:600">💡 También puedes planificar tocando jugadores en el CAMPO durante el partido</div>
    ${inicioHTML}${groups||`<div class="empty">Sin cambios durante Q${APP.planQ}</div>`}`;
  }else if(APP.planTab==="grid"){body=buildGridHTML(g,-1,false);}
  else{const ph=squadPlayers().map(p=>{const m=g[p.id]?.filter(Boolean).length??0;const isU=S.unavailable.includes(p.id);return`<div style="padding:7px 10px;border:2px solid #e8e8f0;border-radius:9px;background:#fff"><div style="font-size:9px;color:#aaa">#${p.number} ${p.name.split(" ")[0]}</div><div style="font-size:16px;font-weight:800;color:${isU?"#C8102E":m>=45?"#16a34a":m>=30?"#555":"#d97706"};font-family:'JetBrains Mono',monospace">${isU?"BAJA":m+"'"}</div></div>`;}).join("");body=`<div style="display:flex;flex-wrap:wrap;gap:6px">${ph}</div>`;}
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><div class="sec-title">PLAN · vs ${rivalCode()}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${tabHtml}<button class="btn-danger" onclick="openContingency()">⚠ BAJA</button></div></div>${body}<button class="btn-primary" style="margin-top:16px" onclick="goScreen('match')">▶ IR AL PARTIDO</button>`;
  updatePairSelects();
}
function setPlanTab(t){APP.planTab=t;renderContent();}
function setPlanQ(q){APP.planQ=q;renderContent();}
function removePair(id){S.pairs=S.pairs.filter(p=>p.id!==id);renderContent();}
function copyQPairs(fQ,tQ){
  const fs=(fQ-1)*15,ts=(tQ-1)*15;
  const fromSpecial=58+fQ; // e.g. INICIO Q1=59(unused), Q2=60, Q3=61, Q4=62
  const toSpecial=58+tQ;
  // Count existing pairs in target Q (including INICIO)
  const ex=S.pairs.filter(p=>(p.minute>=(tQ-1)*15&&p.minute<=tQ*15-1)||p.minute===toSpecial);
  if(ex.length>0&&!confirm(`Q${tQ} tiene ${ex.length} cambios. ¿Reemplazar?`))return;
  // Remove all target Q pairs
  S.pairs=S.pairs.filter(p=>p.minute<(tQ-1)*15&&p.minute!==toSpecial||p.minute>tQ*15-1&&p.minute!==toSpecial);
  // Copy regular pairs
  const copies=S.pairs.filter(p=>p.minute>=fs&&p.minute<=fQ*15-1).map(p=>({...p,id:Date.now()+Math.random(),minute:p.minute+(ts-fs)}));
  // Copy INICIO pair if exists
  const inicioCopies=S.pairs.filter(p=>p.minute===fromSpecial).map(p=>({...p,id:Date.now()+Math.random(),minute:toSpecial}));
  S.pairs=[...S.pairs,...copies,...inicioCopies];
  APP.planQ=tQ;renderContent();
  pushAlert(`✓ Q${fQ} → Q${tQ} (${copies.length+inicioCopies.length} cambios)`,"ok");
}
function updatePairSelects(){const ms=document.getElementById("form-min"),os=document.getElementById("form-out"),is=document.getElementById("form-in");if(!os||!is||!ms)return;const mv=parseInt(ms.value)||0;const fs=new Set(S.initialOnField);S.pairs.filter(p=>p.minute<=mv&&p.outId&&p.inId).sort((a,b)=>a.minute-b.minute).forEach(p=>{fs.delete(p.outId);fs.add(p.inId);});const fa=[...fs];os.innerHTML=`<option value="">— sale —</option>`+squadPlayers().filter(p=>fa.includes(p.id)&&!S.unavailable.includes(p.id)).map(p=>`<option value="${p.id}">#${p.number} ${p.name}</option>`).join("");is.innerHTML=`<option value="">— entra —</option>`+squadPlayers().filter(p=>!fa.includes(p.id)&&!S.unavailable.includes(p.id)).map(p=>`<option value="${p.id}">#${p.number} ${p.name}</option>`).join("");}
function addPair(){const min=parseInt(document.getElementById("form-min")?.value);const outId=parseInt(document.getElementById("form-out")?.value);const inId=parseInt(document.getElementById("form-in")?.value);if(isNaN(min)||!outId||!inId)return pushAlert("Rellena todos los campos","warn");S.pairs.push({id:Date.now(),minute:min,outId,inId});renderContent();}

function renderReport(el){
  const cards=squadPlayers().map(p=>{const played=getPlayedTime(p.id);const pct=S.matchTime>0?Math.round(played/S.matchTime*100):0;const isU=S.unavailable.includes(p.id);const pCards=S.cards.filter(c=>c.playerId===p.id);
    return `<div class="rep-card" style="opacity:${isU?0.45:1}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-weight:800;font-size:12px">#${p.number} ${p.name}</span><div style="display:flex;gap:3px;align-items:center">${isU?`<span style="font-size:8px;color:#C8102E;font-weight:700">BAJA</span>`:""}${pCards.map(c=>`<span>${c.type==="green"?"🟢":c.type==="yellow"?"🟡":"🔴"}</span>`).join("")}<span style="font-size:8px;color:#aaa;font-weight:700">${p.position}</span></div></div><div class="rbar"><div class="rfill" style="width:${pct}%"></div></div><div style="display:flex;justify-content:space-between;font-size:11px;color:#888;font-weight:700"><span style="color:#16a34a">▶ ${ft(played)}</span><span>${pct}%</span><span>⏸ ${ft(S.matchTime-played)}</span></div></div>`;}).join("");
  el.innerHTML=`<div class="sec-title">${espCode()} ${S.score.home}–${S.score.away} ${rivalCode()} · ${ft(S.matchTime)}</div><div class="rep-grid">${cards}</div><button class="btn-primary" style="margin-top:18px" onclick="downloadXML()">↓ EXPORTAR XML · Angles/Fulcrum</button>`;
}

function downloadXML(){
  let iid=1;const lines=[`<?xml version='1.0' encoding='utf-8'?>`,`<file>`,`  <ALL_INSTANCES>`];
  squadPlayers().forEach(p=>{let inF=S.changeLog.find(e=>e.type==="initial")?.onField?.includes(p.id)??false,seg=inF?0:null;const segs=[];S.changeLog.filter(e=>e.type==="sub").forEach(ev=>{if(ev.outId===p.id&&inF){segs.push({s:seg,e:ev.sec});inF=false;seg=null;}if(ev.inId===p.id&&!inF){inF=true;seg=ev.sec;}});if(inF&&seg!=null)segs.push({s:seg,e:S.matchTime});segs.forEach(sg=>lines.push(`    <instance><ID>${iid++}</ID><start>${sg.s}</start><end>${sg.e}</end><code>${p.name}</code></instance>`));});
  S.events.forEach(ev=>{const p=ev.playerId?getPlayer(ev.playerId):null;lines.push(`    <instance><ID>${iid++}</ID><start>${ev.start}</start><end>${ev.end}</end><code>${ev.label}${p?" "+p.name.split(" ")[0]:""}</code></instance>`);});
  S.quarterLog.forEach(q=>lines.push(`    <instance><ID>${iid++}</ID><start>${q.startSec}</start><end>${q.endSec}</end><code>Quarters_Time</code></instance>`));
  for(let i=0;i<S.quarterLog.length-1;i++){const e=S.quarterLog[i].endSec,s=S.quarterLog[i+1]?.startSec;if(s>e)lines.push(`    <instance><ID>${iid++}</ID><start>${e}</start><end>${s}</end><code>Quarter_Stop</code></instance>`);}
  lines.push(`  </ALL_INSTANCES>`,`</file>`);
  const blob=new Blob([lines.join("\n")],{type:"application/xml"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Logs-${new Date().toISOString().slice(0,10)}_${espCode()}-${rivalCode()}.xml`;a.click();URL.revokeObjectURL(url);
}

// ── FATIGUE CONFIG ──
function openFatigueConfig(){
  openModal(`<div class="modal-title">CONFIGURAR FATIGA</div>
    <div style="font-size:11px;color:#aaa;margin-bottom:14px">Minutos continuos en campo para activar aviso visual en el token</div>
    <div class="frow"><label class="flbl" style="color:#d97706">🟡 AVISO</label><input class="finp" type="number" id="ft-warn" value="${FATIGUE_WARN}" min="1" max="30" style="max-width:80px;flex:none"><span style="font-size:11px;color:#aaa;margin-left:8px">minutos continuos</span></div>
    <div class="frow"><label class="flbl" style="color:#ea580c">🟠 ALTA</label><input class="finp" type="number" id="ft-high" value="${FATIGUE_HIGH}" min="1" max="30" style="max-width:80px;flex:none"><span style="font-size:11px;color:#aaa;margin-left:8px">minutos continuos</span></div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn-primary" style="margin-top:0" onclick="saveFatigueConfig()">GUARDAR</button>
      <button class="btn-secondary" onclick="closeModal()">CANCELAR</button>
    </div>`);
}
function saveFatigueConfig(){
  const w=parseInt(document.getElementById("ft-warn")?.value);
  const h=parseInt(document.getElementById("ft-high")?.value);
  if(w&&h&&w<h){FATIGUE_WARN=w;FATIGUE_HIGH=h;closeModal();pushAlert("✓ Umbrales de fatiga actualizados","ok");}
  else pushAlert("El aviso debe ser menor que alta","warn");
}

// Make fatigue constants mutable
let FATIGUE_WARN_val = 10, FATIGUE_HIGH_val = 14;

// ── INIT ──
setInterval(()=>{renderCardsBar();},1000);
goScreen("match");
</script>
