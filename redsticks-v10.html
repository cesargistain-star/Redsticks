function toggleField(id){if(S.initialOnField.includes(id)){S.initialOnField=S.initialOnField.filter(x=>x!==id);S.pairs=[];}else{if(S.initialOnField.length>=11)return pushAlert("Ya hay 11","warn");S.initialOnField.push(id);S.pairs=[];}renderContent();}
function openSquadSelector(){const tp=teamPlayers();openModal(`<div class="modal-title">SELECCIÓN PARTIDO</div><div style="font-size:11px;color:#555;margin-bottom:10px">Sel: <span id="sq-cnt">${S.squad.length}</span> · Rec: 16+2</div><div style="max-height:50vh;overflow-y:auto;margin-bottom:12px;border:1px solid var(--border2);border-radius:8px">${tp.map(p=>{const inS=S.squad.includes(p.id);return`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:${inS?"#0a1f0a":"transparent"};cursor:pointer" onclick="toggleSquad(${p.id},this)"><div style="width:22px;height:22px;border-radius:5px;border:2px solid ${inS?"#16a34a":"var(--border2)"};background:${inS?"#16a34a":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#fff">${inS?"✓":""}</div><span style="font-weight:800;color:var(--red);min-width:26px;font-family:'JetBrains Mono',monospace">#${p.number}</span><span style="font-weight:700;flex:1;color:#fff">${p.name}</span><span style="font-size:9px;color:#555;background:var(--border);padding:2px 6px;border-radius:4px">${p.position}</span></div>`;}).join("")}</div><button class="btn-primary" onclick="closeModal();renderContent()">CONFIRMAR</button>`);}
function toggleSquad(id,row){if(S.squad.includes(id)){S.squad=S.squad.filter(x=>x!==id);S.initialOnField=S.initialOnField.filter(x=>x!==id);row.style.background="transparent";row.querySelector("div").style.borderColor="var(--border2)";row.querySelector("div").style.background="transparent";row.querySelector("div").textContent="";}else{S.squad.push(id);row.style.background="#0a1f0a";row.querySelector("div").style.borderColor="#16a34a";row.querySelector("div").style.background="#16a34a";row.querySelector("div").textContent="✓";}const c=document.getElementById("sq-cnt");if(c)c.textContent=S.squad.length;}
function openAddPlayer(){openModal(`<div class="modal-title">NUEVO JUGADOR</div><div class="frow"><label class="flbl">NOMBRE</label><input class="finp" id="np-name" placeholder="Nombre completo"></div><div class="frow"><label class="flbl">DORSAL</label><input class="finp" type="number" id="np-num" placeholder="1-99" style="max-width:88px;flex:none"></div><div class="frow"><label class="flbl">POS</label><select class="finp" id="np-pos" style="max-width:108px;flex:none">${["GK","DEF","MID","FWD"].map(p=>`<option>${p}</option>`).join("")}</select></div><div style="display:flex;gap:10px;margin-top:14px"><button class="btn-primary" style="margin-top:0" onclick="addPlayer()">AÑADIR</button><button class="btn-secondary" onclick="closeModal()">CANCELAR</button></div>`);}
function addPlayer(){const name=document.getElementById("np-name")?.value?.trim();const num=parseInt(document.getElementById("np-num")?.value);const pos=document.getElementById("np-pos")?.value||"MID";if(!name||!num)return;const id=++nextPlayerId;pool.push({id,teamId:activeTeamId,name,number:num,position:pos,roles:{}});S.squad.push(id);S.fieldPositions[id]={x:50,y:50};closeModal();renderContent();}
function openEditPlayer(id){const p=getPlayer(id);const rh=ROLES.map(r=>{const has=p.roles[r.id]!==undefined;return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><button onclick="toggleRole(${id},'${r.id}')" style="background:${has?"#0a1f0a":"#0a0c12"};border:2px solid ${has?"#16a34a":"var(--border2)"};color:${has?"#4ade80":"#444"};padding:6px 10px;font-size:9px;border-radius:6px;width:54px;min-height:34px;font-weight:700">${r.short}</button><span style="font-size:10px;color:#888;flex:1">${r.label}</span>${has?`<input type="number" min="1" max="9" value="${p.roles[r.id]||1}" onchange="setRoleRank(${id},'${r.id}',this.value)" style="background:#0a0c12;border:1.5px solid var(--border2);color:#fff;padding:7px;font-size:12px;border-radius:7px;width:50px;text-align:center;font-weight:700">`:`<div style="width:50px"></div>`}</div>`;}).join("");openModal(`<div class="modal-title">EDITAR · #${p.number}</div><div class="frow"><label class="flbl">NOMBRE</label><input class="finp" id="ep-name" value="${p.name}"></div><div class="frow"><label class="flbl">DORSAL</label><input class="finp" type="number" id="ep-num" value="${p.number}" style="max-width:88px;flex:none"></div><div class="frow"><label class="flbl">POS</label><select class="finp" id="ep-pos" style="max-width:108px;flex:none">${["GK","DEF","MID","FWD"].map(pos=>`<option ${p.position===pos?"selected":""}>${pos}</option>`).join("")}</select></div><div style="margin-top:12px"><div class="slbl">ROLES</div>${rh}</div><div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap"><button class="btn-primary" style="margin-top:0" onclick="savePlayer(${id})">GUARDAR</button><button class="btn-secondary" onclick="closeModal()">CANCELAR</button><button class="btn-danger" style="margin-left:auto" onclick="deletePlayer(${id})">ELIMINAR</button></div>`);}
function toggleRole(pid,rid){const p=getPlayer(pid);if(p.roles[rid]!==undefined)delete p.roles[rid];else p.roles[rid]=1;openEditPlayer(pid);}
function setRoleRank(pid,rid,val){const p=getPlayer(pid);p.roles[rid]=parseInt(val)||1;}
function savePlayer(id){const p=getPlayer(id);p.name=document.getElementById("ep-name")?.value||p.name;p.number=parseInt(document.getElementById("ep-num")?.value)||p.number;p.position=document.getElementById("ep-pos")?.value||p.position;closeModal();renderContent();}
function deletePlayer(id){pool=pool.filter(p=>p.id!==id);S.squad=S.squad.filter(x=>x!==id);S.initialOnField=S.initialOnField.filter(x=>x!==id);S.pairs=S.pairs.filter(p=>p.outId!==id&&p.inId!==id);closeModal();renderContent();}

function renderPlan(el){
  const g=buildGrid();
  const tabHtml=["pairs","grid","summary"].map(t=>`<button class="btn-secondary" style="${APP.planTab===t?"border-color:#4ade80;color:#4ade80":""}" onclick="setPlanTab('${t}')">${t.toUpperCase()}</button>`).join("");
  let body="";
  if(APP.planTab==="pairs"){
    const qTabHtml=[1,2,3,4].map(q=>`<button class="qtab ${APP.planQ===q?"qtab-a":""}" onclick="setPlanQ(${q})">Q${q}</button>`).join("");
    const qS=(APP.planQ-1)*15,qE=APP.planQ*15-1;
    const qPairs=S.pairs.filter(p=>p.minute>=qS&&p.minute<=qE);
    const byMin=qPairs.reduce((a,p)=>{if(!a[p.minute])a[p.minute]=[];a[p.minute].push(p);return a;},{});
    const copyFrom=APP.planQ===3?1:APP.planQ===4?2:null;const copyTo=APP.planQ===1?3:APP.planQ===2?4:null;
    const copyBtns=(copyFrom?`<button class="btn-secondary" onclick="copyQPairs(${copyFrom},${APP.planQ})" style="font-size:9px">⬇ Copiar Q${copyFrom}</button>`:"")+(copyTo?`<button class="btn-secondary" onclick="copyQPairs(${APP.planQ},${copyTo})" style="font-size:9px">⬆ → Q${copyTo}</button>`:"");
    const groups=Object.keys(byMin).map(Number).sort((a,b)=>a-b).map(min=>{
      const cd=ft(Math.max(0,QD-(min%15)*60));const grp=byMin[min];
      const sf=(()=>{const s=new Set(S.initialOnField);S.pairs.filter(p=>p.minute<=min&&p.outId&&p.inId).sort((a,b)=>a.minute-b.minute).forEach(p=>{s.delete(p.outId);s.add(p.inId);});return[...s];})();
      const{miss}=checkCoverage(sf);
      return `<div class="gblock" style="border-color:${miss.length?"#4a1a1a":"var(--border2)"}"><div class="ghdr"><span style="font-size:14px;font-weight:800;color:var(--red);min-width:68px;font-family:'JetBrains Mono',monospace">${cd}</span><span style="font-size:9px;color:#444">Q${APP.planQ} · ${grp.length} cambio${grp.length>1?"s":""}</span>${miss.length?`<span style="font-size:9px;color:#f87171;margin-left:8px;font-weight:700">⚠</span>`:""}</div>${grp.map((pair,i)=>{const pO=getPlayer(pair.outId),pI=getPlayer(pair.inId);return`<div class="prow"><span style="font-size:10px;color:#333;min-width:18px">${i+1}.</span><div style="flex:1"><div style="font-size:12px;color:#f87171;font-weight:700">↑ #${pO?.number} ${pO?.name}</div><div style="font-size:12px;color:#4ade80;font-weight:700">↓ #${pI?.number} ${pI?.name}</div></div><button class="btn-del" onclick="removePair(${pair.id})">✕</button></div>`;}).join("")}</div>`;
    }).join("");
    body=`<div class="qtabs">${qTabHtml}</div><div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">${copyBtns}</div>
    <div class="fbox"><div class="sec-title" style="margin-bottom:10px">NUEVO CAMBIO · Q${APP.planQ}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:none"><label class="flbl" style="width:auto">TIEMPO Q</label><select class="finp" id="form-min" style="width:108px;margin-top:4px" onchange="updatePairSelects()">${Array.from({length:15},(_,i)=>{const minAbs=(APP.planQ-1)*15+(14-i);const cd=ft(Math.max(0,QD-(14-i)*60));return`<option value="${minAbs}">${cd}</option>`;}).join("")}</select></div>
        <div style="flex:1;min-width:130px"><label class="flbl" style="width:auto">SALE ↑</label><select class="finp" id="form-out" style="color:#f87171;margin-top:4px"><option value="">— sale —</option></select></div>
        <div style="flex:1;min-width:130px"><label class="flbl" style="width:auto">ENTRA ↓</label><select class="finp" id="form-in" style="color:#4ade80;margin-top:4px"><option value="">— entra —</option></select></div>
        <button class="btn-primary" style="margin-top:0;padding:10px 14px" onclick="addPair()">+ ADD</button>
      </div>
    </div>
    ${groups||`<div class="empty">Sin cambios en Q${APP.planQ}</div>`}`;
  }else if(APP.planTab==="grid"){body=buildGridHTML(g,-1,false);}
  else{const ph=squadPlayers().map(p=>{const m=g[p.id]?.filter(Boolean).length??0;const isU=S.unavailable.includes(p.id);return`<div style="padding:5px 9px;border:2px solid var(--border2);border-radius:8px;background:var(--bg3)"><div style="font-size:9px;color:#444">#${p.number} ${p.name.split(" ")[0]}</div><div style="font-size:15px;font-weight:800;color:${isU?"#f87171":m>=45?"#4ade80":m>=30?"#888":"#fbbf24"};font-family:'JetBrains Mono',monospace">${isU?"BAJA":m+"'"}</div></div>`;}).join("");body=`<div style="display:flex;flex-wrap:wrap;gap:6px">${ph}</div>`;}
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><div class="sec-title">PLAN DE CAMBIOS · vs ${rivalCode()}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${tabHtml}<button class="btn-danger" onclick="openContingency()">⚠ BAJA</button></div></div>${body}<button class="btn-primary" style="margin-top:16px" onclick="goScreen('match')">▶ IR AL PARTIDO</button>`;
  updatePairSelects();
}
function setPlanTab(t){APP.planTab=t;renderContent();}
function setPlanQ(q){APP.planQ=q;renderContent();}
function removePair(id){S.pairs=S.pairs.filter(p=>p.id!==id);renderContent();}
function copyQPairs(fQ,tQ){const fs=(fQ-1)*15,ts=(tQ-1)*15;const ex=S.pairs.filter(p=>p.minute>=(tQ-1)*15&&p.minute<=tQ*15-1);if(ex.length>0&&!confirm(`Q${tQ} tiene ${ex.length} cambios. ¿Reemplazar?`))return;S.pairs=S.pairs.filter(p=>p.minute<(tQ-1)*15||p.minute>tQ*15-1);const copies=S.pairs.filter(p=>p.minute>=fs&&p.minute<=fQ*15-1).map(p=>({...p,id:Date.now()+Math.random(),minute:p.minute+(ts-fs)}));S.pairs=[...S.pairs,...copies];APP.planQ=tQ;renderContent();pushAlert(`✓ Q${fQ} → Q${tQ}`,"ok");}
function updatePairSelects(){const ms=document.getElementById("form-min"),os=document.getElementById("form-out"),is=document.getElementById("form-in");if(!os||!is||!ms)return;const mv=parseInt(ms.value)||0;const fs=new Set(S.initialOnField);S.pairs.filter(p=>p.minute<=mv&&p.outId&&p.inId).sort((a,b)=>a.minute-b.minute).forEach(p=>{fs.delete(p.outId);fs.add(p.inId);});const fa=[...fs];os.innerHTML=`<option value="">— sale —</option>`+squadPlayers().filter(p=>fa.includes(p.id)&&!S.unavailable.includes(p.id)).map(p=>`<option value="${p.id}">#${p.number} ${p.name}</option>`).join("");is.innerHTML=`<option value="">— entra —</option>`+squadPlayers().filter(p=>!fa.includes(p.id)&&!S.unavailable.includes(p.id)).map(p=>`<option value="${p.id}">#${p.number} ${p.name}</option>`).join("");}
function addPair(){const min=parseInt(document.getElementById("form-min")?.value);const outId=parseInt(document.getElementById("form-out")?.value);const inId=parseInt(document.getElementById("form-in")?.value);if(isNaN(min)||!outId||!inId)return pushAlert("Rellena todos los campos","warn");S.pairs.push({id:Date.now(),minute:min,outId,inId});renderContent();}

function openContingency(){const ph=squadPlayers().map(p=>`<button onclick="selCont(${p.id},this)" style="background:var(--bg3);border:2px solid var(--border2);color:#888;padding:8px 12px;font-size:10px;border-radius:8px;margin:3px;min-height:38px;font-weight:700">#${p.number} ${p.name.split(" ")[0]}</button>`).join("");openModal(`<div class="modal-title">⚠ BAJA</div><div style="display:flex;flex-wrap:wrap;margin-bottom:14px">${ph}</div><div id="cont-detail"></div><div style="display:flex;gap:10px;margin-top:16px"><button id="cont-apply" style="display:none" class="btn-primary" onclick="applyContFromModal()">APLICAR</button><button class="btn-secondary" onclick="closeModal()">CANCELAR</button></div>`);}
function selCont(id,btn){_contId=id;document.querySelectorAll("#modal-body button").forEach(b=>{if(b.textContent.startsWith("#")){b.style.borderColor="var(--border2)";b.style.color="#888";b.style.background="var(--bg3)";}});btn.style.borderColor="var(--red)";btn.style.color="#f87171";btn.style.background="#1a0000";const rh=[["injury","🤕 Lesión"],["red","🔴 Expulsión"],["other","⚠ Otro"]].map(([v,l])=>`<button onclick="setContR('${v}',this)" style="background:${_contReason===v?"#1a1000":"var(--bg3)"};border:2px solid ${_contReason===v?"#f59e0b":"var(--border2)"};color:${_contReason===v?"#fbbf24":"#888"};padding:8px 12px;font-size:10px;border-radius:8px;min-height:38px;font-weight:700">${l}</button>`).join("");document.getElementById("cont-detail").innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap">${rh}</div>`;document.getElementById("cont-apply").style.display="inline-block";}
function setContR(v,btn){_contReason=v;document.querySelectorAll("#cont-detail button").forEach(b=>{b.style.borderColor="var(--border2)";b.style.color="#888";b.style.background="var(--bg3)";});btn.style.borderColor="#f59e0b";btn.style.color="#fbbf24";btn.style.background="#1a1000";}
function applyContFromModal(){if(_contId)applyContingency(_contId,_contReason||"injury");}

function openTagEditor(){const tags=getTags();const colors=["#3b82f6","#a855f7","#eab308","#22c55e","#e63030","#f97316","#06b6d4","#ec4899"];window._tagColor="#3b82f6";const colBtns=colors.map(c=>`<button onclick="window._tagColor='${c}';this.parentElement.querySelectorAll('button').forEach(b=>b.style.outline='none');this.style.outline='3px solid #fff'" style="width:28px;height:28px;border-radius:5px;background:${c};border:none"></button>`).join("");openModal(`<div class="modal-title">TAGS</div><div style="max-height:180px;overflow-y:auto;margin-bottom:14px">${tags.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="width:8px;height:30px;border-radius:3px;background:${t.color};flex-shrink:0"></div><span style="flex:1;font-weight:700;color:#fff;font-size:12px">${t.label}</span><span style="font-size:9px;color:#444">${t.pre}s·${t.post}s</span><button onclick="deleteTag(${t.id})" style="background:none;border:none;color:#444;font-size:16px;padding:2px 6px">✕</button></div>`).join("")||`<div class="empty">Sin tags</div>`}</div><div class="frow"><label class="flbl">NOMBRE</label><input class="finp" id="nt-lbl" placeholder="Nombre del tag" style="font-size:12px"></div><div class="frow"><label class="flbl">COLOR</label><div style="display:flex;gap:5px;flex-wrap:wrap">${colBtns}</div></div><div style="display:flex;gap:8px;margin-top:8px"><div style="flex:1"><label class="flbl" style="width:auto">PRE (s)</label><input class="finp" type="number" id="nt-pre" value="5" style="font-size:12px;margin-top:4px"></div><div style="flex:1"><label class="flbl" style="width:auto">POST (s)</label><input class="finp" type="number" id="nt-post" value="10" style="font-size:12px;margin-top:4px"></div></div><button class="btn-primary" style="margin-top:12px" onclick="addTag()">+ AÑADIR</button>`);}
function addTag(){const lbl=document.getElementById("nt-lbl")?.value?.trim();const pre=parseInt(document.getElementById("nt-pre")?.value)||5;const post=parseInt(document.getElementById("nt-post")?.value)||10;if(!lbl)return;if(!teamTags[activeTeamId])teamTags[activeTeamId]=[];teamTags[activeTeamId].push({id:++nextTagId,label:lbl,color:window._tagColor||"#3b82f6",pre,post});closeModal();if(APP.screen==="match")renderLeftPanel();}
function deleteTag(id){if(!teamTags[activeTeamId])return;teamTags[activeTeamId]=teamTags[activeTeamId].filter(t=>t.id!==id);openTagEditor();}

function renderReport(el){
  const cards=squadPlayers().map(p=>{let played=0,inF=S.changeLog.find(e=>e.type==="initial")?.onField?.includes(p.id)??false,lastT=0;S.changeLog.filter(e=>e.type==="sub").forEach(ev=>{if(ev.outId===p.id&&inF){played+=ev.sec-lastT;inF=false;lastT=ev.sec;}if(ev.inId===p.id&&!inF){inF=true;lastT=ev.sec;}});if(inF)played+=S.matchTime-lastT;const pct=S.matchTime>0?Math.round(played/S.matchTime*100):0;const isU=S.unavailable.includes(p.id);const pCards=S.cards.filter(c=>c.playerId===p.id);return`<div class="rep-card" style="opacity:${isU?0.45:1}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-weight:800;font-size:12px">#${p.number} ${p.name}</span><div style="display:flex;gap:3px;align-items:center">${isU?`<span style="font-size:8px;color:#f87171;font-weight:700">BAJA</span>`:""}${pCards.map(c=>`<span>${c.type==="green"?"🟢":c.type==="yellow"?"🟡":"🔴"}</span>`).join("")}<span style="font-size:8px;color:#444;font-weight:700">${p.position}</span></div></div><div class="rbar"><div class="rfill" style="width:${pct}%"></div></div><div style="display:flex;justify-content:space-between;font-size:11px;color:#555;font-weight:700"><span style="color:#4ade80">▶ ${ft(played)}</span><span>${pct}%</span><span>⏸ ${ft(S.matchTime-played)}</span></div></div>`;}).join("");
  el.innerHTML=`<div class="sec-title">${espCode()} ${S.score.home}–${S.score.away} ${rivalCode()} · ${ft(S.matchTime)}</div><div class="rep-grid">${cards}</div><button class="btn-primary" style="margin-top:18px" onclick="downloadXML()">↓ EXPORTAR XML · Angles/Fulcrum</button>`;
}

function downloadXML(){
  let iid=1;const lines=[`<?xml version='1.0' encoding='utf-8'?>`,`<file>`,`  <ALL_INSTANCES>`];
  squadPlayers().forEach(p=>{let inF=S.changeLog.find(e=>e.type==="initial")?.onField?.includes(p.id)??false,seg=inF?0:null;const segs=[];S.changeLog.filter(e=>e.type==="sub").forEach(ev=>{if(ev.outId===p.id&&inF){segs.push({s:seg,e:ev.sec});inF=false;seg=null;}if(ev.inId===p.id&&!inF){inF=true;seg=ev.sec;}});if(inF&&seg!=null)segs.push({s:seg,e:S.matchTime});segs.forEach(sg=>lines.push(`    <instance><ID>${iid++}</ID><start>${sg.s}</start><end>${sg.e}</end><code>${p.name}</code></instance>`));});
  S.events.forEach(ev=>{const p=ev.playerId?getPlayer(ev.playerId):null;const code=p?ev.code+"_"+p.name.split(" ").map(w=>w[0]).join(""):ev.code;lines.push(`    <instance><ID>${iid++}</ID><start>${ev.start}</start><end>${ev.end}</end><code>${ev.label}</code></instance>`);});
  S.quarterLog.forEach(q=>lines.push(`    <instance><ID>${iid++}</ID><start>${q.startSec}</start><end>${q.endSec}</end><code>Quarters_Time</code></instance>`));
  for(let i=0;i<S.quarterLog.length-1;i++){const e=S.quarterLog[i].endSec,s=S.quarterLog[i+1]?.startSec;if(s>e)lines.push(`    <instance><ID>${iid++}</ID><start>${e}</start><end>${s}</end><code>Quarter_Stop</code></instance>`);}
  lines.push(`  </ALL_INSTANCES>`,`</file>`);
  const blob=new Blob([lines.join("\n")],{type:"application/xml"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Logs-${new Date().toISOString().slice(0,10)}_${espCode()}-${rivalCode()}.xml`;a.click();URL.revokeObjectURL(url);
}

// ── INIT ──
setInterval(()=>{renderCardsBar();},1000);
goScreen("match");
</script>
