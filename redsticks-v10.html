<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>RedSticks v10 · RFEH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f1117;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
button,select,input{font-family:'Barlow Condensed',sans-serif;-webkit-appearance:none;appearance:none}
button{cursor:pointer}
select option{background:#13151f;color:#fff}
:root{--red:#e63030;--green:#16a34a;--amber:#d97706;--blue:#2563eb;--purple:#7c3aed;--bg:#0f1117;--bg2:#0a0c12;--bg3:#13151f;--border:#1e2030;--border2:#2a2d3e}

#hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(0,0,0,0.5)}
.logo{font-size:18px;font-weight:900;letter-spacing:3px;color:#fff}
.logo em{color:var(--red);font-style:normal}
.logosub{font-size:7px;color:#444;letter-spacing:2px}
.scoreboard{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:4px 10px}
.score-num{font-size:28px;font-weight:800;width:32px;text-align:center;font-family:'JetBrains Mono',monospace;color:#fff}
.score-dash{font-size:18px;color:#333;margin:0 2px}
.score-lbl{font-size:8px;color:#ccc;letter-spacing:2px;width:32px;font-weight:700}
.sbtn{background:var(--bg3);border:1px solid var(--border2);color:#888;width:30px;height:30px;border-radius:6px;font-size:16px;display:flex;align-items:center;justify-content:center}
.sbtn-g{background:#0a1f0a;border-color:#1a4a1a;color:#4ade80}
.timer-block{display:flex;flex-direction:column;align-items:center;padding:4px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px}
.timer{font-size:30px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#4ade80;letter-spacing:2px;line-height:1;transition:color 0.3s}
.timer-lbl{font-size:7px;color:#ccc;letter-spacing:2px;margin-top:2px;font-weight:700}
.qpips{display:flex;gap:3px;margin-top:3px}
.qpip{font-size:7px;padding:2px 5px;border-radius:3px;font-weight:700;background:#1e2030;color:#666}
.qpip-a{background:var(--red);color:#fff}
.qpip-done{background:var(--green);color:#fff}
.nav{display:flex;gap:3px;margin-left:auto;flex-wrap:wrap}
.nbtn{background:none;border:1px solid var(--border2);color:#888;padding:6px 10px;font-size:8px;letter-spacing:1.5px;border-radius:6px;min-height:34px;font-weight:700}
.nbtn-a{border-color:var(--red);color:#fff;background:#c02020}

#cover-warn{display:none;background:#1a0000;border-bottom:2px solid var(--red);padding:5px 14px;color:#f87171;font-size:9px;letter-spacing:2px;font-weight:700}
#cards-bar{display:none;padding:5px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:5px;background:#0d0d0d}
.cpill{display:flex;align-items:center;gap:5px;padding:3px 9px;border:2px solid;border-radius:16px;font-size:10px;font-weight:700}
#toast-stack{position:fixed;top:74px;right:10px;z-index:600;display:flex;flex-direction:column;gap:4px;max-width:320px;pointer-events:none}
.toast{display:flex;align-items:center;gap:7px;padding:9px 12px;border-radius:8px;font-size:11px;pointer-events:all;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,0.4)}

#change-banners{position:fixed;bottom:0;left:0;right:0;z-index:500;display:flex;flex-direction:column;gap:3px;padding:6px;pointer-events:none}
.cbanner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;pointer-events:all;box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:slideUp 0.3s ease}
.cb-now{background:#1a0000;border:2px solid var(--red)}
.cb-soon{background:#1a0d00;border:2px solid #f59e0b}
.cb-out{font-size:12px;font-weight:700;color:#f87171}
.cb-in{font-size:14px;font-weight:800;color:#4ade80}
.cb-secs{font-size:10px;color:#f59e0b;margin-top:1px;font-weight:600}
.cb-btn{background:var(--red);border:none;color:#fff;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:800;min-height:46px;min-width:64px}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* SHIFT PANEL */
#shift-panel{position:fixed;bottom:0;left:0;right:0;z-index:450;background:#13151f;border-radius:16px 16px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,0.6);padding:16px;transform:translateY(100%);transition:transform 0.3s ease;max-height:72vh;overflow-y:auto;-webkit-overflow-scrolling:touch;border-top:2px solid var(--border2)}
#shift-panel.open{transform:translateY(0)}
.sp-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}

/* CARD DECISION MODAL - appears immediately on card issue */
#card-decision{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:800;background:#13151f;border:2px solid var(--border2);border-radius:14px;padding:18px;width:92%;max-width:460px;display:none;box-shadow:0 20px 60px rgba(0,0,0,0.8)}

/* PENALTY BOX */
#penalty-box{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:72px;background:rgba(180,20,20,0.15);border:2px solid rgba(230,48,48,0.5);border-radius:8px;padding:4px;display:flex;flex-direction:column;gap:3px;min-height:60px;z-index:20}
.pb-label{font-size:7px;color:#f87171;letter-spacing:1px;font-weight:700;text-align:center;margin-bottom:2px}
.pb-token{width:62px;border-radius:7px;border:2px solid #e63030;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px;background:#1a0000;cursor:grab;animation:pulse 0.8s ease infinite}
.pb-num{font-size:13px;font-weight:800;color:#f87171;line-height:1;font-family:'JetBrains Mono',monospace}
.pb-name{font-size:7px;color:#f87171;opacity:0.8;font-weight:600}
.pb-cd{font-size:9px;font-weight:800;color:#fbbf24;font-family:'JetBrains Mono',monospace;margin-top:1px}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:calc(100vh - 54px)}
@media (orientation:landscape){
  #match-layout{display:flex;flex:1;overflow:hidden}
  #left-panel{width:186px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:7px}
  #center-panel{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;min-width:0;overflow-y:auto}
  #right-panel{width:170px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);padding:8px;overflow-y:auto}
  #portrait-tabs{display:none}
  #hockey-field{width:100%;aspect-ratio:91.4/55;border-radius:10px;overflow:hidden;position:relative;touch-action:none}
}
@media (orientation:portrait){
  #match-layout{display:flex;flex-direction:column;flex:1;overflow:hidden}
  #left-panel{display:none}
  #right-panel{display:none}
  #center-panel{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;min-width:0;overflow-y:auto}
  #portrait-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto}
  .ptab{background:none;border:none;border-bottom:2px solid transparent;color:#555;padding:8px 14px;font-size:9px;letter-spacing:2px;white-space:nowrap;min-height:38px;font-weight:700}
  .ptab-a{border-bottom-color:var(--red);color:#fff}
  #hockey-field{width:100%;aspect-ratio:91.4/55;border-radius:10px;overflow:hidden;position:relative;touch-action:none}
}

.slbl{font-size:7px;letter-spacing:3px;color:#333;font-weight:700;text-transform:uppercase;margin-bottom:5px}
.cbtn{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;border:1px solid;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;text-align:left;min-height:38px;width:100%}
.cbtn-play{background:#0a1f0a;border-color:var(--green);color:#4ade80}
.cbtn-pause{background:#1a1400;border-color:var(--amber);color:#fbbf24}
.cbtn-end{background:#1a0000;border-color:var(--red);color:#f87171}
.cbtn-var{background:#1a0d2e;border-color:var(--purple);color:#c084fc}
.cbtn-baja{background:#1a0000;border-color:#666;color:#aaa}
.event-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.evbtn{padding:7px 4px;border-radius:8px;border:2px solid;font-size:10px;font-weight:800;cursor:pointer;text-align:center;min-height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;width:100%}
.ev-pc-p{background:#0d1a2e;border-color:#3b82f6;color:#60a5fa}
.ev-pc-n{background:#1a1000;border-color:#f59e0b;color:#fbbf24}
.ev-gol-p{background:#0a1f0a;border-color:var(--green);color:#4ade80}
.ev-gol-n{background:#1a0000;border-color:var(--red);color:#f87171}
.ev-sub{font-size:7px;opacity:0.55;font-weight:500;margin-top:1px}
.card-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.cardbtn{padding:6px 3px;border-radius:7px;border:2px solid;font-size:9px;font-weight:800;cursor:pointer;text-align:center;min-height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.tag-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.tagbtn{padding:6px 4px;border-radius:7px;border:2px solid;font-size:9px;font-weight:700;cursor:pointer;text-align:center;min-height:34px;display:flex;align-items:center;justify-content:center;gap:4px;width:100%}
.tag-add{width:100%;margin-top:3px;background:none;border:1px dashed var(--border2);color:#333;padding:5px;border-radius:6px;font-size:8px;font-weight:700;letter-spacing:1px;cursor:pointer}

.player-token{position:absolute;width:58px;height:50px;border-radius:9px;border:2px solid;box-shadow:0 3px 10px rgba(0,0,0,0.5);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3px;touch-action:none;user-select:none;transition:box-shadow 0.15s,transform 0.1s}
.player-token:active{transform:scale(1.08);z-index:100}
.tok-field{background:#16a34a;border-color:#15803d}
.tok-gk{background:#7c3aed;border-color:#6d28d9}
.tok-leaving{background:#b91c1c;border-color:#991b1b;animation:pulse 0.7s ease infinite}
.tok-sel{box-shadow:0 0 0 3px #fff,0 0 0 5px #2563eb!important;transform:scale(1.1);z-index:50}
.tok-num{font-size:14px;font-weight:800;color:#fff;line-height:1;font-family:'JetBrains Mono',monospace}
.tok-name{font-size:7px;color:rgba(255,255,255,0.92);font-weight:700;line-height:1.1;max-width:54px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tok-time{font-size:7px;color:rgba(255,255,255,0.6);margin-top:1px;font-family:'JetBrains Mono',monospace}

/* BENCH ZONE (drag target) */
#bench-drop-zone{background:rgba(234,88,12,0.08);border:2px dashed rgba(234,88,12,0.3);border-radius:8px;padding:4px;margin-top:6px;min-height:40px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#444;letter-spacing:1px;font-weight:700}
#bench-drop-zone.drag-over{background:rgba(234,88,12,0.2);border-color:#ea580c;color:#ea580c}
#field-drop-zone{position:absolute;inset:0;z-index:5;display:none}

.bench-tile{display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid #ea580c;border-radius:8px;background:#150900;margin-bottom:4px;cursor:grab}
.bench-num{font-size:13px;font-weight:800;color:var(--red);min-width:26px;font-family:'JetBrains Mono',monospace}
.bench-name{font-size:11px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bench-cd{font-size:8px;color:#f59e0b;font-weight:700;margin-top:1px}
.ev-log-row{font-size:9px;color:#444;padding:4px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cov-strip{display:flex;gap:3px;flex-wrap:wrap}
.covpill{padding:2px 6px;border-radius:5px;font-size:8px;font-weight:700;letter-spacing:1px}
.cov-ok{background:#0a1f0a;color:#4ade80;border:1px solid #16a34a}
.cov-bad{background:#1a0000;color:#f87171;border:1px solid var(--red);animation:pulse 1s ease infinite}
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg2);border-radius:8px 8px 0 0;flex-shrink:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#444;padding:8px 12px;font-size:8px;letter-spacing:2px;white-space:nowrap;min-height:38px;font-weight:700;margin-bottom:-1px}
.tab-a{border-bottom-color:var(--red);color:#fff}

/* NON-MATCH */
#content{padding:12px 14px;padding-bottom:100px;flex:1;overflow-y:auto}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}
.ptile{padding:10px;border-radius:10px;background:var(--bg3);border:2px solid var(--border2)}
.ptile-on{border-color:var(--green);background:#0a1f0a}
.ptile-bench{border-color:#ea580c;background:#150900}
.pnum{font-size:18px;font-weight:800;color:var(--red);font-family:'JetBrains Mono',monospace}
.ppos{font-size:7px;color:#444;letter-spacing:2px;font-weight:700}
.pname{font-size:12px;color:#ccc;font-weight:700;margin:3px 0}
.rtags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.rtag{font-size:7px;padding:2px 5px;border:1px solid var(--border2);border-radius:4px;color:#555;font-weight:600}
.rtag-r1{border-color:#92400e;color:#f59e0b;background:#1a0d00}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px;margin-top:8px}
.rbox{display:flex;align-items:center;gap:8px;padding:10px 12px;border:2px solid #1a4a1a;border-radius:8px;background:#0a1f0a}
.rbox-bad{border-color:#4a1a1a;background:#1a0000}
.fbox{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:12px}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.flbl{font-size:8px;letter-spacing:2px;color:#444;width:58px;flex-shrink:0;font-weight:700}
.finp{background:#0a0c12;border:1.5px solid var(--border2);color:#fff;padding:10px 12px;font-size:13px;border-radius:8px;flex:1;min-height:42px;font-family:'Barlow Condensed',sans-serif}
.gblock{border:2px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:8px;background:var(--bg3)}
.ghdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0a0c12;border-bottom:1px solid var(--border)}
.prow{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border)}
.btn-primary{background:#c02020;border:none;color:#fff;padding:10px 18px;font-size:10px;letter-spacing:2px;font-weight:700;border-radius:8px;min-height:42px}
.btn-secondary{background:var(--bg3);border:2px solid var(--border2);color:#aaa;padding:8px 12px;font-size:9px;font-weight:700;border-radius:8px;min-height:36px}
.btn-success{background:#0a1f0a;border:2px solid #16a34a;color:#4ade80;padding:10px 16px;font-size:10px;font-weight:800;border-radius:8px;min-height:42px;letter-spacing:1px}
.btn-danger{background:#1a0000;border:2px solid #4a1a1a;color:#f87171;padding:8px 12px;font-size:9px;font-weight:700;border-radius:8px;min-height:36px}
.btn-del{background:#1a0000;border:1px solid #4a1a1a;color:#f87171;padding:5px 9px;border-radius:6px;font-size:13px;min-height:36px;min-width:36px}
.qtabs{display:flex;gap:4px;margin-bottom:10px}
.qtab{padding:7px 14px;border:2px solid var(--border2);border-radius:8px;background:var(--bg3);color:#555;font-size:10px;font-weight:700;letter-spacing:1px;min-height:36px}
.qtab-a{border-color:var(--red);color:var(--red);background:#1a0000}
.team-card{padding:12px 16px;border:2px solid var(--border2);border-radius:10px;background:var(--bg3);margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
.team-card-a{border-color:var(--red);background:#1a0000}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.rep-card{padding:10px 12px;border:2px solid var(--border2);border-radius:10px;background:var(--bg3)}
.rbar{height:3px;background:var(--border2);border-radius:3px;margin:5px 0;overflow:hidden}
.rfill{height:100%;background:linear-gradient(90deg,var(--red),var(--green));border-radius:3px}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:6px}
.ltile{padding:9px;border-radius:9px;background:var(--bg3);border:2px solid var(--border2)}
.ltile-bench{border-color:#ea580c;background:#150900}
.upnext{font-size:8px;color:#f59e0b;background:#1a0d00;padding:2px 5px;border-radius:4px;display:inline-block;margin-top:3px;font-weight:700}
.empty{color:#333;font-size:11px;padding:16px 0;text-align:center}
.sec-title{font-size:9px;letter-spacing:3px;color:#333;margin-bottom:10px;font-weight:700;text-transform:uppercase}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:700;padding:16px}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.modal-title{font-size:13px;font-weight:800;letter-spacing:2px;color:#fff;margin-bottom:14px;text-transform:uppercase}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body>
<div id="toast-stack"></div>
<div id="change-banners"></div>
<div id="shift-panel"><div class="sp-handle"></div><div id="sp-content"></div></div>
<div id="card-decision"></div>

<header id="hdr">
  <div style="display:flex;flex-direction:column">
    <span class="logo">◈ RED<em>STICKS</em></span>
    <span class="logosub">RFEH · v10</span>
  </div>
  <div id="scoreboard" style="display:none" class="scoreboard">
    <div style="display:flex;align-items:center;gap:4px">
      <span class="score-lbl" id="lbl-home">ESP</span>
      <button class="sbtn" onclick="chScore('home',-1)">−</button>
      <span class="score-num" id="sc-home">0</span>
      <button class="sbtn sbtn-g" onclick="chScore('home',1)">+</button>
    </div>
    <span class="score-dash">–</span>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="sbtn" onclick="chScore('away',-1)">−</button>
      <span class="score-num" id="sc-away">0</span>
      <button class="sbtn sbtn-g" onclick="chScore('away',1)">+</button>
      <span class="score-lbl" id="lbl-away">RIV</span>
    </div>
  </div>
  <div id="timer-block" style="display:none" class="timer-block">
    <div class="timer" id="timer">15:00</div>
    <div class="timer-lbl" id="phase-lbl">PRE-PARTIDO</div>
    <div class="qpips" id="qpips"></div>
  </div>
  <nav class="nav">
    <button class="nbtn" onclick="goScreen('teams')">EQUIPOS</button>
    <button class="nbtn" onclick="goScreen('setup')">PLANTILLA</button>
    <button class="nbtn" onclick="goScreen('plan')">PLAN</button>
    <button class="nbtn nbtn-a" onclick="goScreen('match')">PARTIDO</button>
    <button class="nbtn" onclick="goScreen('report')">INFORME</button>
  </nav>
</header>

<div id="cover-warn"></div>
<div id="cards-bar"></div>

<div id="app">
  <div id="content" style="display:none"></div>
  <div id="match-layout" style="display:none;flex:1;overflow:hidden">
    <div id="portrait-tabs">
      <button class="ptab ptab-a" onclick="setPortraitTab('field')">CAMPO</button>
      <button class="ptab" onclick="setPortraitTab('controls')">CONTROLES</button>
      <button class="ptab" onclick="setPortraitTab('bench')">BANQUILLO</button>
    </div>
    <div id="left-panel"></div>
    <div id="center-panel"></div>
    <div id="right-panel"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-body"></div>
</div>

<script>
// ── FIH RIVALS ──
const FIH_RIVALS=[
  {code:"NED",name:"Países Bajos"},{code:"BEL",name:"Bélgica"},{code:"AUS",name:"Australia"},

// ── UTILS ──
function ft(s){if(s==null||s<0)s=0;return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
function cdQ(){return ft(Math.max(0,QD-S.quarterElapsed));}
function minCD(min){return ft(Math.max(0,QD-(min%15)*60));}
function teamPlayers(){return pool.filter(p=>p.teamId===activeTeamId);}
function squadPlayers(){return pool.filter(p=>p.teamId===activeTeamId&&S.squad.includes(p.id));}
function getPlayer(id){return pool.find(p=>p.id===id);}
function getTags(){return teamTags[activeTeamId]||[];}
function rivalCode(){return S.rival?.code||"RIV";}
function espCode(){return "ESP";}

// ── CARD / PENALTY BOX UTILS ──
function cardRemaining(c){
  if(!c.dur)return null;
  return Math.max(0,c.dur-(S.matchTime-c.issuedMatchTime));
}
function cardActive(c){if(c.type==="red")return true;if(!c.dur)return false;return cardRemaining(c)>0;}
function activeSanctions(){return S.cards.filter(c=>!c.isRival&&c.type!=="red"&&cardActive(c));}
function activeReds(){return S.cards.filter(c=>!c.isRival&&c.type==="red");}
function playersInPenaltyBox(){return S.penaltyBox;}
function expectedOnField(){return 11-activeSanctions().length-activeReds().length;}

function buildGrid(){
  const sp=squadPlayers();const fs=new Set(S.initialOnField);const g={};
  sp.forEach(p=>{g[p.id]=new Array(TOTAL_MINS).fill(false);});
  for(let m=0;m<TOTAL_MINS;m++){
    S.pairs.filter(s=>s.minute===m&&s.outId&&s.inId).forEach(s=>{fs.delete(s.outId);fs.add(s.inId);});
    fs.forEach(id=>{if(g[id])g[id][m]=true;});
  }
  return g;
}

function checkCoverage(ids){
  const on=pool.filter(p=>ids.includes(p.id));const cov={};
  ROLES.forEach(r=>{cov[r.id]=on.filter(p=>p.roles[r.id]!==undefined).sort((a,b)=>a.roles[r.id]-b.roles[r.id]);});
  const miss=ROLES.filter(r=>r.critical&&cov[r.id].length===0).map(r=>r.id);
  return{cov,miss};
}

function getCurrentOnField(){
  const g=buildGrid();const m=Math.min(Math.floor(S.matchTime/60),59);
  // exclude penalty box players
  return squadPlayers().filter(p=>g[p.id]&&g[p.id][m]&&!S.penaltyBox.includes(p.id)).map(p=>p.id);
}

function getPendingByMinute(){
  const cur=Math.floor(S.matchTime/60);
  const pending=S.pairs.filter(p=>!S.executedPairIds.has(p.id)&&p.minute>=cur).sort((a,b)=>a.minute-b.minute);
  const byMin={};pending.forEach(p=>{if(!byMin[p.minute])byMin[p.minute]=[];byMin[p.minute].push(p);});
  return byMin;
}

function isQPhase(){return["q1","q2","q3","q4"].includes(S.phase);}
function isBreak(){return S.phase.startsWith("break");}
function qIdx(){return["q1","q2","q3","q4"].indexOf(S.phase);}

// ── CHANGE BANNERS ──
function renderChangeBanners(){
  const el=document.getElementById("change-banners");if(!el)return;
  if(APP.screen!=="match"||!isQPhase()){el.innerHTML="";return;}
  const byMin=getPendingByMinute();const curMin=Math.floor(S.matchTime/60);
  const banners=[];
  Object.keys(byMin).map(Number).sort((a,b)=>a-b).forEach(min=>{
    const secInQ=(min%15)*60;const secsToChange=secInQ-S.quarterElapsed;
    const isNow=min<=curMin||secsToChange<=0;const isSoon=!isNow&&secsToChange<=50;
    if(isNow||isSoon)byMin[min].forEach(pair=>{
      const pO=getPlayer(pair.outId),pI=getPlayer(pair.inId);
      banners.push({pair,pO,pI,isNow,secs:Math.max(0,secsToChange)});
    });
  });
  el.innerHTML=banners.map(b=>`
    <div class="cbanner ${b.isNow?"cb-now":"cb-soon"}">
      <div style="font-size:20px">${b.isNow?"🔴":"⏱"}</div>
      <div style="flex:1">
        <div class="cb-out">↑ SALE: #${b.pO?.number} ${b.pO?.name}</div>
        <div class="cb-in">↓ ENTRA: #${b.pI?.number} ${b.pI?.name}</div>
        ${!b.isNow?`<div class="cb-secs">En ${b.secs}s</div>`:""}
      </div>
      <button class="cb-btn" style="background:${b.isNow?"#c02020":"#d97706"}" onclick="executePairById(${b.pair.id})">✓ OK</button>
    </div>`).join("");
}

// ── HEADER ──
function renderHeader(){
  // Update rival labels
  const lh=document.getElementById("lbl-home"),la=document.getElementById("lbl-away");
  if(lh)lh.textContent=espCode();if(la)la.textContent=rivalCode();
  const el=document.getElementById("timer");if(!el)return;
  let disp=S.stopActive&&S.stopIsAuto?ft(S.stopCountdown):isBreak()?ft(S.breakCountdown):cdQ();
  el.textContent=disp;
  let col="#4ade80";
  if(S.stopActive)col=S.stopReason==="var"?"#c084fc":"#60a5fa";
  else if(isBreak())col="#60a5fa";
  else if(!S.running&&S.phase!=="pre")col="#fbbf24";
  el.style.color=col;
  let lbl="PRE-PARTIDO";
  if(S.phase==="ended")lbl="FINALIZADO";
  else if(S.phase==="break12")lbl="DESCANSO 2'";
  else if(S.phase==="break23")lbl="MEDIO TIEMPO";
  else if(S.phase==="break34")lbl="DESCANSO 2'";
  else if(S.stopActive){
    const sr={pc_p:"⏸ PC+",pc_n:"⏸ PC−",gol_p:"⏸ GOL+",gol_n:"⏸ GOL−",var:"⏸ VAR"};
    lbl=sr[S.stopReason]||"⏸ PARADO";
  }else if(isQPhase())lbl="Q"+(qIdx()+1)+(S.running?" · EN JUEGO":" · PARADO");
  document.getElementById("phase-lbl").textContent=lbl;
  const pips=document.getElementById("qpips");
  if(pips)pips.innerHTML=[1,2,3,4].map(q=>{
    const done=S.quarterLog.find(ql=>ql.num===q);const active=S.phase===["q1","q2","q3","q4"][q-1];
    return `<div class="qpip ${done?"qpip-done":active?"qpip-a":""}">${q}</div>`;
  }).join("");
  // Coverage + player count warning
  const curOnField=getCurrentOnField();const{miss}=checkCoverage(curOnField);
  const expected=expectedOnField();const actual=curOnField.length;
  const cw=document.getElementById("cover-warn");
  if(cw&&APP.screen==="match"){
    if(actual>expected+0){cw.style.display="block";cw.textContent="⚑⚑ DEMASIADOS JUGADORES EN CAMPO ("+actual+") — REVISA";}
    else if(actual<expected){cw.style.display="block";cw.textContent="⚑⚑ FALTAN JUGADORES EN CAMPO ("+actual+"/"+expected+")";}
    else if(miss.length>0){cw.style.display="block";cw.textContent="⚠ SIN COBERTURA: "+miss.map(r=>ROLES.find(x=>x.id===r)?.short).join(" · ");}
    else cw.style.display="none";
  }
  renderCardsBar();
}

function renderCardsBar(){
  const bar=document.getElementById("cards-bar");if(!bar)return;
  const active=S.cards.filter(c=>cardActive(c));
  if(active.length>0&&APP.screen==="match"){
    bar.style.display="flex";
    bar.innerHTML=active.map(c=>{
      const ct=CARD_TYPES.find(x=>x.id===c.type);
      const rem=cardRemaining(c);
      const p=getPlayer(c.playerId);
      const em=c.type==="green"?"🟢":c.type==="yellow"?"🟡":"🔴";
      const nm=c.isRival?rivalCode()+":#"+(c.rivalNum||"?"):"#"+p?.number+" "+p?.name?.split(" ")[0];
      return `<div class="cpill" style="border-color:${ct.color};background:${ct.bg};color:${ct.color}">
        <span>${em}</span><span>${nm}</span>
        ${rem!=null?`<span style="font-family:'JetBrains Mono',monospace">${ft(rem)}</span>`:`<span>EXPULSADO</span>`}
        ${c.type==="yellow"&&!c.extended&&rem>60?`<button onclick="extYellow(${c.id})" style="background:none;border:1px solid ${ct.color};color:${ct.color};padding:2px 5px;font-size:8px;border-radius:4px">+5'</button>`:""}
        <button onclick="removeCard(${c.id})" style="background:none;border:none;color:${ct.color};font-size:14px;padding:2px 6px">✕</button>
      </div>`;
    }).join("");
  }else bar.style.display="none";
}
function extYellow(id){S.cards=S.cards.map(c=>c.id===id?{...c,dur:10*60,extended:true}:c);}
function removeCard(id){
  const c=S.cards.find(x=>x.id===id);
  if(c)S.penaltyBox=S.penaltyBox.filter(pid=>pid!==c.playerId);
  S.cards=S.cards.filter(x=>x.id!==id);
  renderCardsBar();if(APP.screen==="match")renderCenterPanel();
}

// ── TIMER ──
function startTimer(){
  clearInterval(timerInt);if(!S.running||S.stopActive)return;
  timerInt=setInterval(()=>{
    if(isBreak()){S.breakCountdown--;if(S.breakCountdown<=0){S.running=false;S.breakCountdown=0;}}
    else if(isQPhase()){S.quarterElapsed++;S.matchTime++;if(S.quarterElapsed>=QD){autoEndQ();return;}checkSubAlerts();checkCardReturns();}
    renderHeader();renderChangeBanners();
  },1000);
}
function stopTimer(){clearInterval(timerInt);}
function autoEndQ(){stopTimer();S.running=false;S.quarterLog.push({num:qIdx()+1,startSec:S.matchTime-QD,endSec:S.matchTime});const next={q1:"break12",q2:"break23",q3:"break34",q4:"ended"}[S.phase];if(next==="ended"){S.phase="ended";goScreen("report");return;}S.breakCountdown=BREAKS[next];S.phase=next;S.quarterElapsed=0;renderHeader();if(APP.screen==="match")renderMatchLayout();}
function manualEndQ(){stopTimer();S.running=false;if(S.stopActive)forceResume();S.quarterLog.push({num:qIdx()+1,startSec:S.matchTime-S.quarterElapsed,endSec:S.matchTime});const next={q1:"break12",q2:"break23",q3:"break34",q4:"ended"}[S.phase];if(next==="ended"){S.phase="ended";goScreen("report");return;}S.breakCountdown=BREAKS[next];S.phase=next;S.quarterElapsed=0;renderHeader();if(APP.screen==="match")renderMatchLayout();}
function startNextQ(){const nq={pre:"q1",break12:"q2",break23:"q3",break34:"q4"}[S.phase];if(!nq)return;if(S.phase==="pre")S.changeLog=[{type:"initial",onField:[...S.initialOnField],sec:0}];S.phase=nq;S.quarterElapsed=0;S.running=true;startTimer();renderHeader();if(APP.screen==="match")renderMatchLayout();}
function pausePlay(){S.running=false;stopTimer();renderHeader();if(APP.screen==="match")renderLeftPanel();}
function resumePlay(){S.running=true;startTimer();renderHeader();if(APP.screen==="match")renderLeftPanel();}
function triggerManualStop(reason){if(!isQPhase())return;stopTimer();S.running=false;S.stopActive=true;S.stopReason=reason;S.stopIsAuto=false;S.stopLog.push({reason,at:S.matchTime,dur:null});renderHeader();if(APP.screen==="match")renderLeftPanel();}
function triggerAutoStop(reason,dur){if(!isQPhase())return;stopTimer();S.running=false;S.stopActive=true;S.stopReason=reason;S.stopIsAuto=true;S.stopCountdown=dur;S.stopLog.push({reason,at:S.matchTime,dur});clearInterval(stopInt);stopInt=setInterval(()=>{S.stopCountdown--;if(S.stopCountdown<=0){resumeStop();return;}renderHeader();},1000);renderHeader();if(APP.screen==="match")renderLeftPanel();}
function resumeStop(){clearInterval(stopInt);S.stopActive=false;S.stopReason=null;S.stopCountdown=0;S.stopIsAuto=false;S.running=true;startTimer();renderHeader();if(APP.screen==="match")renderLeftPanel();}
function forceResume(){clearInterval(stopInt);S.stopActive=false;S.stopReason=null;S.stopCountdown=0;S.stopIsAuto=false;}

// ── PC / GOL ──
function triggerPC(side){
  if(S.stopActive)forceResume();
  triggerManualStop(side==="p"?"pc_p":"pc_n");
  recordEventWithPlayer(side==="p"?`PC_${espCode()}`:`PC_${rivalCode()}`,side==="p"?"pc_p":"pc_n",0,2);
}
function triggerGOL(side){
  triggerAutoStop(side==="p"?"gol_p":"gol_n",GOL_STOP);
  if(side==="p"){S.score.home++;document.getElementById("sc-home").textContent=S.score.home;}
  else{S.score.away++;document.getElementById("sc-away").textContent=S.score.away;}
  recordEventWithPlayer(side==="p"?`GOL_${espCode()}`:`GOL_${rivalCode()}`,side==="p"?"gol_p":"gol_n",5,5);
}
function recordEventWithPlayer(label,code,pre,post){
  const start=Math.max(0,S.matchTime-pre);const end=S.matchTime+post;
  const needsPlayer=code==="pc_p"||code==="pc_n"||code==="gol_p";
  if(!needsPlayer){S.events.push({id:Date.now(),label,code,start,end,playerId:null});pushAlert("◉ "+label,"info");return;}
  const curOnField=getCurrentOnField();
  const pOpts=curOnField.map(id=>{const p=getPlayer(id);return`<option value="${id}">#${p?.number} ${p?.name}</option>`;}).join("");
  const q=code==="gol_p"?"¿Quién marcó?":code==="pc_p"?"¿Quién generó el PC?":"¿Quién provocó el PC?";
  openModal(`<div class="modal-title">${label}</div>
    <div style="font-size:11px;color:#888;margin-bottom:12px">${q}</div>
    <select class="finp" id="ev-player" style="margin-bottom:14px"><option value="">— opcional —</option>${pOpts}</select>
    <div style="display:flex;gap:10px">
      <button class="btn-primary" style="margin-top:0" onclick="confirmEvent('${label}','${code}',${start},${end})">CONFIRMAR</button>
      <button class="btn-secondary" onclick="confirmEvent('${label}','${code}',${start},${end},true)">SIN JUGADOR</button>
    </div>`);
}
function confirmEvent(label,code,start,end,skipPlayer){
  const pid=skipPlayer?null:(parseInt(document.getElementById("ev-player")?.value)||null);
  S.events.push({id:Date.now(),label,code,start,end,playerId:pid});
  const p=pid?getPlayer(pid):null;
  pushAlert("◉ "+label+(p?" · "+p.name.split(" ")[0]:""),"info");
  closeModal();if(APP.screen==="match")renderRightPanel();
}

function triggerTag(tagId){
  const tag=getTags().find(t=>t.id===tagId);if(!tag)return;
  const start=Math.max(0,S.matchTime-tag.pre);const end=S.matchTime+tag.post;
  S.events.push({id:Date.now(),label:tag.label,code:"tag_"+tagId,start,end,playerId:null,color:tag.color});
  pushAlert("◉ "+tag.label,"info");
  if(APP.screen==="match")renderRightPanel();
}

// CARD SYSTEM WITH PENALTY BOX

function issueCard(type,playerId,isRival,rivalNum){
  const ct=CARD_TYPES.find(c=>c.id===type);
  const cardId=Date.now();
  const card={id:cardId,playerId,type,issuedMatchTime:S.matchTime,dur:ct.dur,extended:false,isRival,rivalNum:rivalNum||null,decision:null,substituteId:null};
  S.cards.push(card);

  if(!isRival&&type!=="red"){
    // Move player to penalty box
    S.penaltyBox.push(playerId);
    const p=getPlayer(playerId);
    pushAlert("🟨 #"+p?.number+" "+p?.name+" → PENALTI BOX ("+ct.dur/60+"')","urgent");
    // Check role coverage with penalty box player out
    const curOnField=getCurrentOnField();
    const{miss}=checkCoverage(curOnField);
    if(miss.length>0)pushAlert("⚠ SIN COBERTURA: "+miss.map(r=>ROLES.find(x=>x.id===r)?.short).join(", "),"urgent");
    // Show decision panel immediately
    showCardDecisionPanel(cardId);
  }else if(!isRival&&type==="red"){
    S.unavailable.push(playerId);
    const p=getPlayer(playerId);
    pushAlert("🔴 EXPULSIÓN: #"+p?.number+" "+p?.name+" — FUERA DEFINITIVO","urgent");
  }else{
    pushAlert("◉ Tarjeta "+type+" rival registrada","info");
  }
  renderCardsBar();if(APP.screen==="match"){renderCenterPanel();renderHeader();}
}

function showCardDecisionPanel(cardId){
  const card=S.cards.find(c=>c.id===cardId);if(!card)return;
  const p=getPlayer(card.playerId);const ct=CARD_TYPES.find(c=>c.id===card.type);
  // Find next planned shift for this player
  const curMin=Math.floor(S.matchTime/60);
  const nextPair=S.pairs.filter(pr=>pr.outId===card.playerId&&!S.executedPairIds.has(pr.id)&&pr.minute>=curMin).sort((a,b)=>a.minute-b.minute)[0];
  const bench=squadPlayers().filter(p2=>!getCurrentOnField().includes(p2.id)&&!S.penaltyBox.includes(p2.id)&&!S.unavailable.includes(p2.id)&&p2.id!==card.playerId);
  // Recommend: if next shift < CARD_RETURN_THRESHOLD seconds away or no shift left
  const secsToPair=nextPair?((nextPair.minute%15)*60-S.quarterElapsed):null;
  const recommendChange=secsToPair!=null&&secsToPair<CARD_RETURN_THRESHOLD;
  const defaultSub=nextPair?getPlayer(nextPair.inId):null;
  const benchOpts=bench.map(b=>`<option value="${b.id}" ${defaultSub&&b.id===defaultSub.id?"selected":""}>#${b.number} ${b.name}</option>`).join("");

  const panel=document.getElementById("card-decision");
  panel.innerHTML=`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div style="width:42px;height:42px;border-radius:9px;background:${ct.color}22;border:2px solid ${ct.color};display:flex;align-items:center;justify-content:center;font-size:16px">${card.type==="green"?"🟢":"🟡"}</div>
    <div><div style="font-size:15px;font-weight:800;color:#fff">#${p?.number} ${p?.name}</div><div style="font-size:11px;color:#888">${ct.dur/60}' en PENALTI BOX · ${ft(ct.dur)} restantes</div></div>
  </div>
  <div style="font-size:9px;letter-spacing:2px;color:#444;font-weight:700;margin-bottom:10px">¿QUÉ HACE AL TERMINAR LA SANCIÓN?</div>
  ${nextPair?`<div style="padding:8px 10px;background:#0d1a2e;border:1px solid #1a3a5a;border-radius:8px;margin-bottom:10px;font-size:10px;color:#60a5fa"><b>Cambio planificado:</b> ${minCD(nextPair.minute)} Q${Math.floor(nextPair.minute/15)+1} → #${getPlayer(nextPair.inId)?.number} ${getPlayer(nextPair.inId)?.name}${recommendChange?` <span style="color:#fbbf24;font-weight:800">(recomendado: realizar cambio)</span>`:""}</div>`:""}
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn-success" style="flex:1" onclick="setCardDecision(${cardId},'return')">↩ VOLVER AL CAMPO</button>
    <button class="btn-primary" style="${recommendChange?"background:#c02020":"background:#555"};flex:1" onclick="setCardDecision(${cardId},'change')">↔ REALIZAR CAMBIO</button>
  </div>
  <div id="card-sub-selector" style="display:none;margin-top:8px">
    <div style="font-size:9px;letter-spacing:2px;color:#444;font-weight:700;margin-bottom:8px">SUSTITUTO</div>
    <select class="finp" id="card-sub-player" style="margin-bottom:10px"><option value="">— seleccionar —</option>${benchOpts}</select>
    <button class="btn-primary" style="width:100%" onclick="confirmCardChange(${cardId})">CONFIRMAR CAMBIO</button>
  </div>
  <button onclick="document.getElementById('card-decision').style.display='none'" style="width:100%;margin-top:8px;background:none;border:1px solid #2a2d3e;color:#444;padding:7px;border-radius:7px;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer">DECIDIR MÁS TARDE</button>`;
  panel.style.display="block";
}

function setCardDecision(cardId,decision){
  S.cards=S.cards.map(c=>c.id===cardId?{...c,decision}:c);
  if(decision==="return"){
    document.getElementById("card-decision").style.display="none";
    pushAlert("↩ Volverá al campo al terminar la sanción","info");
  }else{
    // Show sub selector
    document.getElementById("card-sub-selector").style.display="block";
    document.querySelectorAll("#card-decision .btn-success,#card-decision .btn-primary").forEach(b=>{if(!b.onclick.toString().includes("confirmCardChange"))b.style.opacity="0.4";});
  }
}

function confirmCardChange(cardId){
  const subId=parseInt(document.getElementById("card-sub-player")?.value);
  if(!subId)return pushAlert("Selecciona un sustituto","warn");
  S.cards=S.cards.map(c=>c.id===cardId?{...c,substituteId:subId}:c);
  document.getElementById("card-decision").style.display="none";
  const card=S.cards.find(c=>c.id===cardId);
  const p=getPlayer(card.playerId),sub=getPlayer(subId);
  pushAlert("✓ Al terminar sanción: #"+p?.number+" al banquillo, entra #"+sub?.number+" "+sub?.name,"ok");
}

function checkCardReturns(){
  S.cards.filter(c=>!c.isRival&&(c.type==="green"||c.type==="yellow")&&S.penaltyBox.includes(c.playerId)).forEach(c=>{
    const rem=cardRemaining(c);
    if(rem<=0){
      // Sanction over
      S.penaltyBox=S.penaltyBox.filter(id=>id!==c.playerId);
      const p=getPlayer(c.playerId);
      if(c.decision==="change"&&c.substituteId){
        // Execute the change
        S.changeLog.push({type:"sub",outId:c.playerId,inId:c.substituteId,sec:S.matchTime});
        const sub=getPlayer(c.substituteId);
        if(S.fieldPositions[c.playerId])S.fieldPositions[c.substituteId]={...S.fieldPositions[c.playerId]};
        pushAlert("✓ SANCIÓN CUMPLIDA: #"+p?.number+" banquillo → #"+sub?.number+" "+sub?.name+" al campo","ok");
      }else{
        // Return to field
        pushAlert("✓ SANCIÓN CUMPLIDA: #"+p?.number+" "+p?.name+" VUELVE AL CAMPO","ok");
      }
      if(APP.screen==="match"){renderCenterPanel();renderRightPanel();renderHeader();}
    }else if(rem<=30&&!c._warned30){
      c._warned30=true;
      const p=getPlayer(c.playerId);
      pushAlert("⏱ #"+p?.number+" "+p?.name+" sale de penalti box en 30s","warn");
      if(!c.decision)showCardDecisionPanel(c.id);
    }
  });
}

// ── SUBS ──
function executePair(pair){
  S.changeLog.push({type:"sub",outId:pair.outId,inId:pair.inId,sec:S.matchTime});
  S.executedPairIds.add(pair.id);
  if(S.fieldPositions[pair.outId])S.fieldPositions[pair.inId]={...S.fieldPositions[pair.outId]};
  const pO=getPlayer(pair.outId),pI=getPlayer(pair.inId);
  pushAlert("✓ #"+pO?.number+" "+pO?.name+" → #"+pI?.number+" "+pI?.name,"ok");
  renderChangeBanners();if(APP.screen==="match"){renderCenterPanel();renderRightPanel();}
}
function executePairById(id){const p=S.pairs.find(x=>x.id===id);if(p)executePair(p);}
function executeGroup(min){(getPendingByMinute()[min]||[]).forEach(p=>executePair(p));}

// Manual drag substitution
function executeManualSub(outId,inId){
  const newPair={id:Date.now(),minute:Math.floor(S.matchTime/60),outId,inId};
  S.pairs.push(newPair);executePair(newPair);
}

function checkSubAlerts(){
  const byMin=getPendingByMinute();const curMin=Math.floor(S.matchTime/60);
  Object.keys(byMin).map(Number).forEach(min=>{
    const secInQ=(min%15)*60;const secsToChange=secInQ-S.quarterElapsed;
    const k50="50-"+min+"-q"+(qIdx()+1);
    if(!alertedSecs.has(k50)&&secsToChange>0&&secsToChange<=50){alertedSecs.add(k50);const ns=byMin[min].map(p=>"#"+getPlayer(p.outId)?.number+"→#"+getPlayer(p.inId)?.number).join(", ");pushAlert("⏱ CAMBIO EN "+secsToChange+"s · "+ns,"warn");}
    const k0="0-"+min+"-q"+(qIdx()+1);
    if(!alertedSecs.has(k0)&&(min<=curMin||secsToChange<=0)){alertedSecs.add(k0);const ns=byMin[min].map(p=>getPlayer(p.outId)?.name?.split(" ")[0]+"→"+getPlayer(p.inId)?.name?.split(" ")[0]).join(", ");pushAlert("⚑⚑ ¡CAMBIO AHORA! "+ns,"urgent");}
  });
}

function applyContingency(id,reason){
  S.unavailable.push(id);S.penaltyBox=S.penaltyBox.filter(pid=>pid!==id);
  S.pairs=S.pairs.filter(p=>p.outId!==id&&p.inId!==id);
  const p=getPlayer(id);pushAlert("⚠ BAJA: #"+p?.number+" "+p?.name,"urgent");
  closeModal();if(APP.screen==="match")renderMatchLayout();else renderContent();
}

function renderCenterPanel(){
  const el=document.getElementById("center-panel");if(!el)return;
  const curOnField=getCurrentOnField();const{miss}=checkCoverage(curOnField);const g=buildGrid();const curMin=Math.floor(S.matchTime/60);
  const expected=expectedOnField();const actual=curOnField.length;
  let countColor="#4ade80";if(actual!==expected)countColor="#f87171";
  const covHTML=`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
    <div class="cov-strip">${ROLES.map(r=>{const ok=!miss.includes(r.id);return`<div class="covpill ${ok?"cov-ok":"cov-bad"}">${r.short}${ok?"✓":"✗"}</div>`;}).join("")}</div>
    <div style="margin-left:auto;font-size:10px;font-weight:800;color:${countColor};font-family:'JetBrains Mono',monospace">${actual}/${expected} EN CAMPO</div>
  </div>`;
  const tabsDef=[["field","CAMPO"],["next","CAMBIOS"],["bench","BANQUILLO"],["roles","ROLES"],["grid","GRID"],["log","LOG"]];
  const tabsHTML=`<div class="tabs">${tabsDef.map(([t,l])=>`<button class="tab ${APP.activeTab===t?"tab-a":""}" onclick="setMatchTab('${t}')">${l}</button>`).join("")}</div>`;
  let tabContent="";
  if(APP.activeTab==="field")tabContent=buildFieldHTML(curOnField,curMin);
  else if(APP.activeTab==="next"){
    const byMin=getPendingByMinute();const mwp=Object.keys(byMin).map(Number).sort((a,b)=>a-b);
    if(mwp.length===0)tabContent=`<div class="empty" style="padding:30px">${S.pairs.length===0?"Sin cambios planificados":"✓ Todos ejecutados"}</div>`;
    else tabContent=mwp.map(min=>{
      const grp=byMin[min];const secInQ=(min%15)*60;const secsToChange=secInQ-S.quarterElapsed;
      const cd=ft(Math.max(0,QD-secInQ));const qNum=Math.floor(min/15)+1;
      const isNow=min<=curMin||secsToChange<=0;const isSoon=!isNow&&secsToChange<=60;
      return `<div class="gblock" style="border-color:${isNow?"#4a1a1a":isSoon?"#4a3a00":""};background:${isNow?"#1a0000":isSoon?"#1a1000":""};margin-bottom:8px">
        <div class="ghdr"><span style="font-size:14px;font-weight:800;color:${isNow?"#f87171":isSoon?"#fbbf24":"#888"};min-width:70px;font-family:'JetBrains Mono',monospace">${isNow?"¡AHORA!":cd+" Q"+qNum}</span><span style="font-size:9px;color:#444">${grp.length} cambio${grp.length>1?"s":""}</span><button class="btn-primary" style="margin:0;padding:5px 12px;font-size:9px;margin-left:auto;background:${isNow?"#c02020":isSoon?"#d97706":"#555"}" onclick="executeGroup(${min})">✓ TODOS</button></div>

      </div>`;
    }).join("");

    const bench=squadPlayers().filter(p=>!curOnField.includes(p.id)&&!S.penaltyBox.includes(p.id));
    tabContent=`<div class="lgrid">${bench.map(p=>{const isU=S.unavailable.includes(p.id);const nxt=S.pairs.filter(pl=>pl.inId===p.id&&pl.minute>curMin&&!S.executedPairIds.has(pl.id)).sort((a,b)=>a.minute-b.minute)[0];const cd=nxt?ft(Math.max(0,QD-(nxt.minute%15)*60)):"";return`<div class="ltile ${isU?"":"ltile-bench"}"><div style="display:flex;align-items:center;gap:5px"><span class="pnum">#${p.number}</span><span class="ppos">${p.position}</span></div><div class="pname">${p.name}</div>${isU?`<div style="font-size:8px;color:#f87171;font-weight:700;margin-top:3px">⚠ BAJA</div>`:""}${!isU&&nxt?`<div class="upnext">${cd} Q${Math.floor(nxt.minute/15)+1}</div>`:""}</div>`;}).join("")}</div>`;

  el.innerHTML=covHTML+tabsHTML+`<div id="match-tab">${tabContent}</div>`;
  if(APP.activeTab==="field")initDrag();
}

  ${evLog.map(ev=>{const p=ev.playerId?getPlayer(ev.playerId):null;const cd=ft(Math.max(0,QD-(ev.start%QD)));return`<div class="ev-log-row"><span style="color:${ev.color||"#888"}">${ev.label}${p?" · "+p.name.split(" ")[0]:""}</span><span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#333">${cd}</span></div>`;}).join("")}
  </div>`;
}

// ── FIELD HTML ──
function buildFieldHTML(curOnField,curMin){
  const byMin=getPendingByMinute();
  const leavingIds=new Set();Object.values(byMin).forEach(grp=>grp.forEach(p=>leavingIds.add(p.outId)));
  const fc=FIELD_COLORS[S.fieldColor]||"#2d7a2d";

  const tokens=curOnField.map(id=>{
    const p=getPlayer(id);if(!p)return"";
    const pos=S.fieldPositions[id]||{x:50,y:50};
    const isGK=p.position==="GK";const isLeaving=leavingIds.has(id);const isSel=APP.selTok===id;
    let played=0,inF=S.changeLog.find(e=>e.type==="initial")?.onField?.includes(id)??false,lastT=0;
    S.changeLog.filter(e=>e.type==="sub").forEach(ev=>{if(ev.outId===id&&inF){played+=ev.sec-lastT;inF=false;lastT=ev.sec;}if(ev.inId===id&&!inF){inF=true;lastT=ev.sec;}});
    if(inF)played+=S.matchTime-lastT;
    const cls=`player-token ${isLeaving?"tok-leaving":isGK?"tok-gk":"tok-field"} ${isSel?"tok-sel":""}`;
    return `<div class="${cls}" id="tok-${id}" data-pid="${id}" data-from="field"
      style="left:calc(${pos.x}% - 29px);top:calc(${pos.y}% - 25px)"
      draggable="true" ondragstart="fieldDragStart(event,${id})"
      ontouchstart="tokTS(event,${id})" ontouchmove="tokTM(event,${id})" ontouchend="tokTE(event,${id})"
      onmousedown="tokMD(event,${id})">
      <div class="tok-num">#${p.number}</div>
      <div class="tok-name">${p.name.split(" ")[0]}</div>
      <div class="tok-time">${ft(played)}</div>
    </div>`;
  }).join("");

  // Penalty box tokens
  const pbTokens=S.penaltyBox.map(id=>{
    const p=getPlayer(id);if(!p)return"";
    const card=S.cards.find(c=>c.playerId===id&&cardActive(c)&&c.type!=="red");
    const rem=card?cardRemaining(card):0;
    return `<div class="pb-token" draggable="true" ondragstart="pbDragStart(event,${id})" ontouchstart="pbTouchStart(event,${id})" ontouchmove="pbTouchMove(event,${id})" ontouchend="pbTouchEnd(event,${id})">
      <div class="pb-num">#${p.number}</div>
      <div class="pb-name">${p.name.split(" ")[0]}</div>
      <div class="pb-cd">${ft(rem)}</div>
    </div>`;
  }).join("");

  const bench=squadPlayers().filter(p=>!curOnField.includes(p.id)&&!S.penaltyBox.includes(p.id)&&!S.unavailable.includes(p.id));

  return `<div id="hockey-field" style="background:${fc}"
    ondragover="fieldDragOver(event)" ondragleave="fieldDragLeave(event)" ondrop="fieldDrop(event)">
    ${drawField(fc)}${tokens}
    ${S.penaltyBox.length>0?`<div id="penalty-box"><div class="pb-label">🟨 PENALTI BOX</div>${pbTokens}</div>`:""}
  </div>
  <div style="margin-top:4px;font-size:9px;color:#333;text-align:center">Toca → shifts · Arrastra campo↔banquillo para cambios manuales</div>`;
}

function drawField(fc){
  const W=100,H=60;const l="rgba(255,255,255,0.85)";const d="rgba(255,255,255,0.45)";const s="rgba(255,255,255,0.03)";
  return `<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <rect width="${W}" height="${H}" fill="${fc}"/>
    ${[0,1,2,3,4,5].map(i=>`<rect x="${i*16.6}" y="0" width="8.3" height="${H}" fill="${s}"/>`).join("")}
    <rect x="1" y="1" width="${W-2}" height="${H-2}" fill="none" stroke="${l}" stroke-width="0.6"/>
    <line x1="${W/2}" y1="1" x2="${W/2}" y2="${H-1}" stroke="${l}" stroke-width="0.4"/>
    <line x1="25" y1="1" x2="25" y2="${H-1}" stroke="${l}" stroke-width="0.4"/>
    <line x1="75" y1="1" x2="75" y2="${H-1}" stroke="${l}" stroke-width="0.4"/>
    <clipPath id="cL"><rect x="1" y="1" width="24" height="${H-2}"/></clipPath>
    <circle cx="1" cy="${H/2}" r="18" fill="none" stroke="${l}" stroke-width="0.5" clip-path="url(#cL)"/>
    <circle cx="1" cy="${H/2}" r="22" fill="none" stroke="${d}" stroke-width="0.4" stroke-dasharray="1.5,1.5" clip-path="url(#cL)"/>
    <circle cx="9" cy="${H/2}" r="0.5" fill="${l}"/>
    <clipPath id="cR"><rect x="75" y="1" width="24" height="${H-2}"/></clipPath>
    <circle cx="${W-1}" cy="${H/2}" r="18" fill="none" stroke="${l}" stroke-width="0.5" clip-path="url(#cR)"/>
    <circle cx="${W-1}" cy="${H/2}" r="22" fill="none" stroke="${d}" stroke-width="0.4" stroke-dasharray="1.5,1.5" clip-path="url(#cR)"/>
    <circle cx="${W-9}" cy="${H/2}" r="0.5" fill="${l}"/>
    <rect x="1" y="${H/2-3.3}" width="2.4" height="6.6" fill="rgba(255,255,255,0.15)" stroke="${l}" stroke-width="0.5"/>
    <rect x="${W-3.4}" y="${H/2-3.3}" width="2.4" height="6.6" fill="rgba(255,255,255,0.15)" stroke="${l}" stroke-width="0.5"/>
    <circle cx="${W/2}" cy="${H/2}" r="0.5" fill="${l}"/>
  </svg>`;
}

// ── DRAG & DROP (field ↔ bench ↔ penalty box) ──
let _dragId=null,_dragSource=null;
function getFieldRect(){const f=document.getElementById("hockey-field");return f?f.getBoundingClientRect():null;}
function moveTok(id,cx,cy){const r=getFieldRect();if(!r)return;const x=Math.max(2,Math.min(98,(cx-r.left)/r.width*100));const y=Math.max(2,Math.min(98,(cy-r.top)/r.height*100));S.fieldPositions[id]={x,y};const t=document.getElementById("tok-"+id);if(t){t.style.left=`calc(${x}% - 29px)`;t.style.top=`calc(${y}% - 25px)`;}}

// HTML5 drag (desktop/iPad with mouse)
function fieldDragStart(e,id){_dragId=id;_dragSource="field";e.dataTransfer.setData("text/plain",id);}
function benchDragStart(e,id){_dragId=id;_dragSource="bench";e.dataTransfer.setData("text/plain",id);}
function pbDragStart(e,id){_dragId=id;_dragSource="penaltybox";e.dataTransfer.setData("text/plain",id);}

function fieldDragOver(e){e.preventDefault();e.dataTransfer.dropEffect="move";}
function fieldDragLeave(e){}
function fieldDrop(e){
  e.preventDefault();
  const id=parseInt(e.dataTransfer.getData("text/plain"));
  const r=getFieldRect();if(!r)return;
  const x=Math.max(2,Math.min(98,(e.clientX-r.left)/r.width*100));
  const y=Math.max(2,Math.min(98,(e.clientY-r.top)/r.height*100));
  if(_dragSource==="bench"){
    // Bench → Field: manual sub — need to pick who goes out
    openManualSubModal(id,"in",x,y);
  }else if(_dragSource==="penaltybox"){
    // PB → Field: player returns from penalty box
    S.penaltyBox=S.penaltyBox.filter(pid=>pid!==id);
    S.fieldPositions[id]={x,y};
    const p=getPlayer(id);pushAlert("↩ #"+p?.number+" "+p?.name+" vuelve al campo","ok");
    renderCenterPanel();renderRightPanel();renderHeader();
  }else{
    // Field → Field: reposition
    moveTok(id,e.clientX,e.clientY);
  }
  _dragId=null;_dragSource=null;
}

function benchDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  if(!_dragId)return;
  const id=_dragId;
  if(_dragSource==="field"){
    // Field → Bench: manual sub — pick who comes in
    openManualSubModal(id,"out",null,null);
  }else if(_dragSource==="penaltybox"){
    // PB → Bench: player sanctioned goes to bench permanently
    S.penaltyBox=S.penaltyBox.filter(pid=>pid!==id);
    // Mark as unavailable for rest of this rotation
    const p=getPlayer(id);pushAlert("↩ #"+p?.number+" "+p?.name+" al banquillo desde penalti box","info");
    renderCenterPanel();renderRightPanel();renderHeader();
  }
  _dragId=null;_dragSource=null;
}

function openManualSubModal(playerId,direction,newX,newY){
  const curOnField=getCurrentOnField();
  if(direction==="in"){
    // Bench player going in — pick who goes out
    const p=getPlayer(playerId);
    const fieldOpts=curOnField.map(id=>{const fp=getPlayer(id);return`<option value="${id}">#${fp?.number} ${fp?.name}</option>`;}).join("");
    openModal(`<div class="modal-title">CAMBIO MANUAL</div>
      <div style="font-size:11px;color:#4ade80;margin-bottom:12px;font-weight:700">↓ ENTRA: #${p?.number} ${p?.name}</div>
      <div style="font-size:10px;color:#888;margin-bottom:8px">¿Quién sale del campo?</div>
      <select class="finp" id="ms-out" style="margin-bottom:14px"><option value="">— seleccionar —</option>${fieldOpts}</select>
      <div style="display:flex;gap:10px">
        <button class="btn-primary" style="margin-top:0" onclick="confirmManualSub(${playerId},'in',${newX||50},${newY||50})">CONFIRMAR</button>
        <button class="btn-secondary" onclick="closeModal()">CANCELAR</button>
      </div>`);
  }else{
    // Field player going out — pick who comes in
    const p=getPlayer(playerId);
    const bench=squadPlayers().filter(b=>!curOnField.includes(b.id)&&!S.penaltyBox.includes(b.id)&&!S.unavailable.includes(b.id));
    const benchOpts=bench.map(b=>`<option value="${b.id}">#${b.number} ${b.name}</option>`).join("");
    openModal(`<div class="modal-title">CAMBIO MANUAL</div>
      <div style="font-size:11px;color:#f87171;margin-bottom:12px;font-weight:700">↑ SALE: #${p?.number} ${p?.name}</div>
      <div style="font-size:10px;color:#888;margin-bottom:8px">¿Quién entra?</div>
      <select class="finp" id="ms-in" style="margin-bottom:14px"><option value="">— seleccionar —</option>${benchOpts}</select>
      <div style="display:flex;gap:10px">
        <button class="btn-primary" style="margin-top:0" onclick="confirmManualSub(${playerId},'out',0,0)">CONFIRMAR</button>
        <button class="btn-secondary" onclick="closeModal()">CANCELAR</button>
      </div>`);
  }
}

function confirmManualSub(playerId,direction,newX,newY){
  if(direction==="in"){
    const outId=parseInt(document.getElementById("ms-out")?.value);if(!outId)return;
    executeManualSub(outId,playerId);if(newX)S.fieldPositions[playerId]={x:newX,y:newY};
  }else{
    const inId=parseInt(document.getElementById("ms-in")?.value);if(!inId)return;
    executeManualSub(playerId,inId);
  }
  closeModal();
}
function executeManualSub(outId,inId){const np={id:Date.now(),minute:Math.floor(S.matchTime/60),outId,inId};S.pairs.push(np);executePair(np);}

// Touch drag for tokens
let _tdId=null,_tdMoved=false,_tdFrom=null;
function tokTS(e,id){e.preventDefault();_tdId=id;_tdMoved=false;_tdFrom="field";}
function tokTM(e,id){e.preventDefault();if(_tdId!==id)return;_tdMoved=true;const t=e.touches[0];moveTok(id,t.clientX,t.clientY);}
function tokTE(e,id){if(!_tdMoved)openShiftPanelFor(id);_tdId=null;_tdMoved=false;}
function tokMD(e,id){e.preventDefault();_tdId=id;_tdMoved=false;const mm=ev=>{_tdMoved=true;moveTok(id,ev.clientX,ev.clientY);};const mu=()=>{if(!_tdMoved)openShiftPanelFor(id);_tdId=null;_tdMoved=false;document.removeEventListener("mousemove",mm);document.removeEventListener("mouseup",mu);};document.addEventListener("mousemove",mm);document.addEventListener("mouseup",mu);}

// Touch drag penalty box
let _pbTdId=null;
function pbTouchStart(e,id){e.preventDefault();_pbTdId=id;}
function pbTouchMove(e,id){e.preventDefault();}
function pbTouchEnd(e,id){
  // On release, show options: return to field or go to bench
  const p=getPlayer(id);

      <button class="btn-secondary" onclick="closeModal()">CANCELAR</button>
    </div>`);

}
function pbReturnToField(id){S.penaltyBox=S.penaltyBox.filter(pid=>pid!==id);const p=getPlayer(id);pushAlert("↩ #"+p?.number+" "+p?.name+" vuelve al campo","ok");closeModal();renderCenterPanel();renderRightPanel();renderHeader();}
function pbGoToBench(id){S.penaltyBox=S.penaltyBox.filter(pid=>pid!==id);const p=getPlayer(id);pushAlert("→ #"+p?.number+" "+p?.name+" al banquillo","info");closeModal();renderCenterPanel();renderRightPanel();renderHeader();}

function initDrag(){}

// ── SHIFT PANEL ──
function openShiftPanelFor(pid){
  APP.selTok=pid;
  document.querySelectorAll(".player-token").forEach(t=>{t.classList.toggle("tok-sel",parseInt(t.dataset.pid)===pid);});
  const p=getPlayer(pid);if(!p)return;
  const curOnField=getCurrentOnField();const curMin=Math.floor(S.matchTime/60);
  const myPairs=S.pairs.filter(pr=>pr.outId===pid||pr.inId===pid).sort((a,b)=>a.minute-b.minute);
  const bench=squadPlayers().filter(p2=>!curOnField.includes(p2.id)&&!S.penaltyBox.includes(p2.id)&&!S.unavailable.includes(p2.id)&&p2.id!==pid);
  const shiftsHTML=myPairs.length===0?`<div class="empty">Sin rotaciones planificadas</div>`:
    myPairs.map(pr=>{const isOut=pr.outId===pid;const other=getPlayer(isOut?pr.inId:pr.outId);const cd=minCD(pr.minute);const qNum=Math.floor(pr.minute/15)+1;const done=S.executedPairIds.has(pr.id);
      return `<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border:2px solid ${done?"var(--border2)":isOut?"#4a1a1a":"#1a4a1a"};border-radius:8px;margin-bottom:6px;background:${done?"var(--bg3)":isOut?"#1a0000":"#0a1f0a"}">
        <div style="font-size:11px;font-weight:800;color:var(--red);min-width:52px;font-family:'JetBrains Mono',monospace">${cd} Q${qNum}</div>
        <div style="flex:1;font-size:12px;font-weight:700;color:${isOut?"#f87171":"#4ade80"}">${isOut?"↑ SALE":"↓ ENTRA"} · #${other?.number} ${other?.name}</div>
        ${done?`<span style="font-size:8px;color:#333;font-weight:700">✓</span>`:`<button class="btn-del" onclick="removePairAndRefresh(${pr.id},${pid})">✕</button>`}
      </div>`;
    }).join("");
  const qOpts=[1,2,3,4].map(q=>`<optgroup label="Q${q}">${Array.from({length:15},(_,i)=>{const minAbs=(q-1)*15+(14-i);const cd=ft(Math.max(0,QD-(14-i)*60));return`<option value="${minAbs}">${cd} Q${q}</option>`;}).join("")}</optgroup>`).join("");
  const benchOpts=bench.map(b=>`<option value="${b.id}">#${b.number} ${b.name}</option>`).join("");
  openShiftPanel(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:42px;height:42px;border-radius:9px;background:${p.position==="GK"?"#7c3aed":"#16a34a"};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;font-family:'JetBrains Mono',monospace">#${p.number}</div>
      <div><div style="font-size:16px;font-weight:800;color:#fff">${p.name}</div><div style="font-size:10px;color:#555;font-weight:700">${p.position}</div></div>
      <button onclick="closeShiftPanel()" style="margin-left:auto;background:none;border:none;color:#444;font-size:22px;padding:4px 8px">✕</button>
    </div>
    <div class="slbl">ROTACIONES PLANIFICADAS</div>
    ${shiftsHTML}
    <div style="margin-top:14px;padding:12px;background:#0a0c12;border-radius:10px;border:1px solid var(--border2)">
      <div class="slbl" style="margin-bottom:10px">+ AÑADIR ROTACIÓN</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:110px"><label style="font-size:8px;color:#444;font-weight:700;letter-spacing:2px">TIEMPO</label><select class="finp" id="sp-min" style="margin-top:4px;font-size:12px">${qOpts}</select></div>
        <div style="flex:1;min-width:110px"><label style="font-size:8px;color:#444;font-weight:700;letter-spacing:2px">ENTRA</label><select class="finp" id="sp-in" style="color:#4ade80;margin-top:4px;font-size:12px"><option value="">— seleccionar —</option>${benchOpts}</select></div>
        <button class="btn-primary" style="margin-top:0;padding:10px 14px" onclick="addShiftFromPanel(${pid})">+ ADD</button>
      </div>
    </div>`);
}
function removePairAndRefresh(pairId,pid){S.pairs=S.pairs.filter(p=>p.id!==pairId);openShiftPanelFor(pid);}
function addShiftFromPanel(outId){const min=parseInt(document.getElementById("sp-min")?.value);const inId=parseInt(document.getElementById("sp-in")?.value);if(isNaN(min)||!inId)return pushAlert("Selecciona tiempo y jugador","warn");S.pairs.push({id:Date.now(),minute:min,outId,inId});pushAlert("✓ Rotación añadida","ok");openShiftPanelFor(outId);}

// ── GRID ──
function buildGridHTML(g,curMin,isMatch){
  const CW=11,LW=120,RH=17;
  let h=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid var(--border)">`;
  h+=`<div style="display:flex;margin-left:${LW}px;background:#0a0c12">`;
  [{l:"Q1"},{l:"Q2"},{l:"Q3"},{l:"Q4"}].forEach(q=>h+=`<div style="width:${15*CW}px;border-left:1px solid var(--border);padding:3px 4px;font-size:7px;color:#333;letter-spacing:2px;font-weight:700">${q.l}</div>`);
  h+=`</div><div style="display:flex;margin-left:${LW}px;border-bottom:1px solid var(--border)">`;
  for(let m=0;m<TOTAL_MINS;m++){const cdSec=QD-(m%15)*60;const lbl=(m%5===0)?String(Math.ceil(cdSec/60)):"";h+=`<div style="width:${CW}px;text-align:center;font-size:5px;color:${m%5===0?"#333":"#1a1a1a"};border-left:${m%15===0?"1px solid var(--border)":"none"}">${lbl}</div>`;}
  h+=`</div>`;
  squadPlayers().forEach(p=>{const isU=S.unavailable.includes(p.id);const tm=g[p.id]?.filter(Boolean).length??0;
    h+=`<div style="display:flex;align-items:center;border-bottom:1px solid #0d0d0d"><div style="width:${LW}px;flex-shrink:0;padding:0 7px;display:flex;align-items:center;gap:3px;opacity:${isU?0.3:1}"><span style="font-size:9px;color:var(--red);font-weight:800;min-width:20px;font-family:'JetBrains Mono',monospace">#${p.number}</span><span style="font-size:9px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:68px;font-weight:600">${p.name.split(" ")[0]}</span><span style="font-size:7px;color:#333;margin-left:auto;font-weight:700">${p.position}</span></div>`;
    for(let m=0;m<TOTAL_MINS;m++){const pl=g[p.id]?.[m]??false;const pv=m>0?(g[p.id]?.[m-1]??false):pl;const si=pl&&!pv&&m>0,so=!pl&&pv&&m>0;const ic=isMatch&&m===curMin;h+=`<div style="width:${CW}px;height:${RH}px;flex-shrink:0;position:relative;background:${isU?"#0d0d0d":ic?"#1a2a3a":pl?"#0a2a0a":"#0d0d0d"};border-left:${m%15===0?"1px solid var(--border)":"1px solid #111"}">`;if((si||so)&&!isU)h+=`<div style="position:absolute;top:0;left:0;width:2px;height:100%;background:${si?"#16a34a":"#e63030"}"></div>`;if(ic)h+=`<div style="position:absolute;top:0;left:0;width:100%;height:2px;background:#3b82f6"></div>`;h+=`</div>`;}
    h+=`<div style="width:26px;text-align:right;padding-right:4px;font-size:8px;color:${isU?"var(--red)":"#333"};flex-shrink:0;font-weight:700;font-family:'JetBrains Mono',monospace">${isU?"—":tm+"'"}</div></div>`;
  });
  const cvs=Array(TOTAL_MINS).fill(0).map((_,m)=>{const on=squadPlayers().filter(p=>g[p.id]?.[m]);const{miss}=checkCoverage(on.map(p=>p.id));return{miss:miss.length>0,cnt:on.length};});
  h+=`<div style="display:flex;margin-left:${LW}px">`;cvs.forEach((cv,m)=>h+=`<div style="width:${CW}px;height:4px;flex-shrink:0;background:${cv.miss?"#4a0a0a":cv.cnt!==11?"#2a1a00":"#0a2a0a"};border-left:${m%15===0?"1px solid var(--border)":"none"}"></div>`);
  h+=`</div></div>`;return h;
}

// ── CARD MODAL ──

function submitCard(){

function openEditTeam(id){const t=teams.find(x=>x.id===id);openModal(`<div class="modal-title">EDITAR EQUIPO</div><div class="frow"><label class="flbl">NOMBRE</label><input class="finp" id="et-name" value="${t.name}"></div><div style="display:flex;gap:10px;margin-top:14px"><button class="btn-primary" style="margin-top:0" onclick="saveTeam(${id})">GUARDAR</button><button class="btn-secondary" onclick="closeModal()">CANCELAR</button>${teams.length>1?`<button class="btn-danger" style="margin-left:auto" onclick="deleteTeam(${id})">ELIMINAR</button>`:""}</div>`);}
