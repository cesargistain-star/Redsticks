<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>RedSticks · ESP Absoluta</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --r:#C8102E;--n:#16213e;--g:#16a34a;--a:#f59e0b;--b:#2563eb;--p:#7c3aed;
  --bd:#dde1ef;--bg:#f0f2f8;--card:#ffffff;
  --t:#16213e;--t2:#5a6080;--t3:#a0a8c0;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'Barlow Condensed',sans-serif;overflow:hidden}
button,select,input{font-family:'Barlow Condensed',sans-serif;-webkit-appearance:none;touch-action:manipulation;outline:none}
button{cursor:pointer}
select,input{color:var(--t);background:var(--card);border:1.5px solid var(--bd)}

/* ── APP SHELL ── */
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
#hdr{background:var(--n);padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{font-size:19px;font-weight:900;letter-spacing:4px;color:#fff;line-height:1}
.logo em{color:var(--r);font-style:normal}
.logo-sub{font-size:7px;color:#6a7090;letter-spacing:2px;margin-top:1px}
.hdr-mid{flex:1;display:none;align-items:center;justify-content:center;gap:14px}
.hdr-mid-on{display:flex}
.sc-wrap{display:flex;align-items:center;gap:5px}
.sc-team{font-size:8px;color:#888;letter-spacing:2px;font-weight:700;text-align:center}
.sc-num{font-size:26px;font-weight:900;color:#fff;font-family:monospace;width:28px;text-align:center;line-height:1}
.sc-sep{font-size:18px;color:#444;margin:0 2px}
.sc-adj{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#aaa;width:22px;height:22px;border-radius:5px;font-size:13px;display:flex;align-items:center;justify-content:center}
.tmr-wrap{display:flex;flex-direction:column;align-items:center}
.tmr{font-size:26px;font-weight:900;font-family:monospace;color:#4ade80;letter-spacing:2px;line-height:1}
.tmr-phase{font-size:7px;color:#888;letter-spacing:2px;font-weight:700;margin-top:1px}
.qpips{display:flex;gap:3px;margin-top:2px}
.qpip{width:18px;height:4px;border-radius:2px;background:#333}
.qpip-a{background:var(--r)}.qpip-d{background:var(--g)}
.riv-btn{margin-left:auto;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:#aaa;padding:5px 10px;font-size:8px;font-weight:700;border-radius:6px;letter-spacing:1px}

/* ── TABS ── */
#tabs{background:var(--n);display:flex;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06)}
.tab{flex:1;background:none;border:none;border-bottom:3px solid transparent;color:#666;padding:9px 4px;font-size:9px;letter-spacing:2px;font-weight:800;cursor:pointer;margin-bottom:-1px}
.tab-a{border-bottom-color:var(--r);color:#fff}

/* ── BREAK BANNER ── */
#brk{display:none;background:#eff6ff;border-bottom:2px solid rgba(37,99,235,.3);padding:10px 16px;align-items:center;gap:12px;flex-shrink:0}
.brk-info{flex:1}
.brk-title{font-size:11px;font-weight:800;color:var(--b);letter-spacing:2px}
.brk-sub{font-size:9px;color:var(--t2);margin-top:2px}
.brk-tmr{font-size:32px;font-weight:900;color:var(--b);font-family:monospace}
.brk-btn{background:var(--b);border:none;color:#fff;padding:10px 16px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;min-height:42px}

/* ── SCREENS ── */
#screens{flex:1;overflow:hidden;position:relative}
.scr{position:absolute;inset:0;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 32px}
.scr-on{display:block}
.scr-flex{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.scr-flex-on{display:flex}

/* ── COMMON ── */
.lbl{font-size:7px;letter-spacing:3px;color:var(--t3);font-weight:800;text-transform:uppercase;margin-bottom:8px;margin-top:14px;display:block}
.lbl:first-child{margin-top:0}
.card{background:var(--card);border:1.5px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.row{display:flex;align-items:center;gap:8px}
.btn-r{background:var(--r);border:none;color:#fff;padding:11px 18px;font-size:10px;letter-spacing:2px;font-weight:800;border-radius:8px;min-height:44px}
.btn-n{background:var(--card);border:1.5px solid var(--bd);color:var(--t);padding:9px 14px;font-size:10px;font-weight:700;border-radius:8px;min-height:40px}
.btn-sm{padding:6px 12px;font-size:9px;min-height:32px;border-radius:6px}
.finp{background:var(--card);border:1.5px solid var(--bd);color:var(--t);padding:9px 12px;font-size:13px;border-radius:8px;min-height:42px;width:100%}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.flbl{font-size:8px;letter-spacing:2px;color:var(--t2);width:52px;flex-shrink:0;font-weight:700}

/* ── PLANTILLA ── */
.sub-tabs{display:flex;border-bottom:1.5px solid var(--bd);margin-bottom:12px}
.stab{flex:1;background:none;border:none;border-bottom:3px solid transparent;color:var(--t2);padding:9px 4px;font-size:9px;font-weight:800;letter-spacing:1px;cursor:pointer;margin-bottom:-2px}
.stab-a{border-bottom-color:var(--r);color:var(--t)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:6px;margin-bottom:10px}
.ptile{background:var(--card);border:1.5px solid var(--bd);border-radius:9px;padding:8px 10px;cursor:pointer;transition:transform .1s}
.ptile:active{transform:scale(.96)}
.ptile-f{border-color:var(--g);background:#f0fdf4}
.ptile-b{border-color:var(--a);background:#fffbeb}
.ptile-o{opacity:.32}
.pt-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.pt-num{font-size:20px;font-weight:900;color:var(--r);font-family:monospace;line-height:1}
.pt-edit{background:none;border:none;color:var(--t3);font-size:15px;cursor:pointer;padding:2px 4px}
.pt-name{font-size:11px;font-weight:700;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.pt-pos{font-size:7px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px;display:inline-block}
.pos-GK{background:rgba(124,58,237,.15);color:#7c3aed;border:1px solid rgba(124,58,237,.3)}
.pos-DEF{background:rgba(37,99,235,.12);color:var(--b);border:1px solid rgba(37,99,235,.25)}
.pos-MID{background:rgba(22,163,74,.12);color:var(--g);border:1px solid rgba(22,163,74,.25)}
.pos-FWD{background:rgba(200,16,46,.1);color:var(--r);border:1px solid rgba(200,16,46,.2)}
.pt-st{font-size:7px;font-weight:800;padding:2px 7px;border-radius:10px;margin-top:5px;display:inline-block;letter-spacing:1px}
.st-f{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.st-b{background:#fef9c3;color:#a16207;border:1px solid #fde68a}
.st-o{background:#f1f5f9;color:#94a3b8;border:1px solid #e2e8f0}
.roles-tbl{width:100%;border-collapse:collapse;font-size:10px}
.roles-tbl th{background:#f4f5f8;color:var(--t2);padding:6px 4px;font-size:7px;letter-spacing:1px;font-weight:800;text-align:center;border-bottom:1.5px solid var(--bd)}
.roles-tbl th:first-child{text-align:left;padding-left:10px}
.roles-tbl td{padding:5px 4px;text-align:center;border-bottom:1px solid #f0f2f8}
.roles-tbl td:first-child{text-align:left;padding-left:10px;font-weight:700}
.rk{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;cursor:pointer;min-width:22px}
.rk1{background:var(--a);color:#000}
.rk2{background:#fef9c3;color:#a16207;border:1px solid #fde68a}
.rk3{background:#f1f5f9;color:var(--t2);border:1px solid var(--bd)}
.rk0{color:var(--t3);font-size:16px;cursor:pointer}
.var-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.var-card{background:var(--card);border-radius:10px;padding:10px 12px;cursor:pointer;border:1.5px solid}
.vc-d{border-color:rgba(37,99,235,.4);background:#eff6ff}
.vc-v{border-color:rgba(124,58,237,.4);background:#f5f3ff}
.vc-rank{font-size:7px;font-weight:800;letter-spacing:1px;margin-bottom:3px}
.vc-name{font-size:13px;font-weight:900;margin-bottom:5px}
.vc-pips{display:flex;flex-wrap:wrap;gap:3px}
.pip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff}
.pip-d{background:var(--b)}.pip-v{background:var(--p)}

/* ── PROGRAMA ── */
.prog-hdr{background:var(--card);border-bottom:1.5px solid var(--bd);padding:9px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;position:sticky;top:0;z-index:5}
.qsbtn{background:var(--bg);border:1.5px solid var(--bd);color:var(--t2);padding:6px 12px;font-size:9px;font-weight:800;border-radius:6px;letter-spacing:1px}
.qsbtn-a{background:var(--r);border-color:var(--r);color:#fff}
.mir-btn{background:none;border:1.5px solid var(--g);color:var(--g);padding:6px 10px;font-size:8px;font-weight:800;border-radius:6px;letter-spacing:1px}
.mir-off{border-color:var(--bd);color:var(--t2)}
.tl-bar{display:flex;gap:3px;margin-bottom:6px}
.tl-min{flex:1;min-height:50px;border-radius:7px;background:var(--card);border:1.5px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s}
.tl-min:active{transform:scale(.9)}
.tl-min-cd{font-size:8px;font-weight:800;color:var(--t2);font-family:monospace}
.tl-min-n{font-size:11px;font-weight:900;color:var(--a)}
.tl-has{background:#fffbeb;border-color:var(--a)}
.tl-start{background:#fff0f0;border:1.5px solid rgba(200,16,46,.35);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.chg-item{background:var(--card);border:1.5px solid var(--bd);border-radius:9px;padding:9px 12px;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.chg-t{font-size:12px;font-weight:800;color:var(--a);min-width:44px;font-family:monospace}
.chg-out{font-size:12px;color:var(--r);font-weight:800}
.chg-in{font-size:12px;color:var(--g);font-weight:800}
.chg-arr{color:var(--t3);font-size:11px}
.chg-del{background:none;border:none;color:var(--t3);font-size:18px;margin-left:auto;padding:2px 6px;cursor:pointer}

/* ── PARTIDO ── */
.match-body{padding:10px 14px 32px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.mb-cols{display:flex;flex-direction:column;gap:0}
.mb-left{width:100%}
.mb-right{width:100%}
@media (orientation:landscape) and (min-width:780px){
  .mb-cols{display:flex;flex-direction:row;gap:12px;align-items:flex-start}
  .mb-left{width:60%;flex-shrink:0}
  .mb-right{width:40%;max-height:calc(100vh - 140px);overflow-y:auto;-webkit-overflow-scrolling:touch}
  .field-wrap{aspect-ratio:91.4/50}
}
.ctrl-row{display:flex;gap:6px;margin-bottom:10px}
.ctrl-play{background:#f0fdf4;border:1.5px solid var(--g);color:var(--g);padding:10px 16px;font-size:10px;font-weight:800;border-radius:8px;min-height:42px;letter-spacing:1px;flex:1}
.ctrl-pause{background:#fffbeb;border:1.5px solid var(--a);color:#92400e;padding:10px 16px;font-size:10px;font-weight:800;border-radius:8px;min-height:42px;letter-spacing:1px;flex:1}
.ctrl-end{background:#fff0f0;border:1.5px solid var(--r);color:var(--r);padding:10px 16px;font-size:10px;font-weight:800;border-radius:8px;min-height:42px;letter-spacing:1px}
.pend-box{background:var(--card);border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:10px}
.pend-hdr{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--bd);background:#f8f9fc;gap:8px}
.pend-lbl{font-size:8px;font-weight:800;letter-spacing:2px;color:var(--t2)}
.pend-cnt{background:var(--r);color:#fff;font-size:8px;font-weight:800;padding:2px 8px;border-radius:10px}
.pend-row{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid #f4f6fb}
.pend-row:last-child{border-bottom:none}
.pend-now{background:#fff5f5}
.pr-min{font-size:11px;font-weight:800;min-width:42px;font-family:monospace;color:var(--t2)}
.pr-sl{font-size:9px;min-width:40px;font-family:monospace}
.pr-sl-now{color:var(--r);font-weight:800}
.pr-sl-soon{color:var(--a);font-weight:800}
.pr-sl-ok{color:var(--t3)}
.pr-out{font-size:12px;font-weight:800;color:var(--r)}
.pr-in{font-size:12px;font-weight:800;color:var(--g)}
.pr-arr{color:var(--t3);font-size:11px}
.pr-exec{background:var(--r);border:none;color:#fff;padding:6px 12px;border-radius:7px;font-size:10px;font-weight:800;cursor:pointer;margin-left:auto;min-height:34px;letter-spacing:1px}
.field-wrap{width:100%;aspect-ratio:91.4/40;position:relative;border-radius:10px;overflow:visible;margin-bottom:8px}
.tok{position:absolute;width:48px;height:42px;border-radius:8px;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;cursor:pointer;user-select:none;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.tok-num{font-size:12px;font-weight:800;line-height:1;font-family:monospace}
.tok-nick{font-size:6px;font-weight:700;max-width:44px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tok-t{font-size:6px;opacity:.85;font-family:monospace}
.tok-gk{background:#7c3aed;border-color:#6d28d9}
.tok-def{background:var(--b);border-color:#1d4ed8}
.tok-mid{background:var(--g);border-color:#15803d}
.tok-fwd{background:var(--r);border-color:#991b1b}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 2px 6px rgba(0,0,0,.18)}50%{transform:scale(1.1);box-shadow:0 0 0 5px rgba(245,158,11,.35)}}
.tok-pend{animation:pulse .85s ease infinite;border-color:var(--a)!important;border-width:3px!important}
.bench-box{background:var(--card);border:1.5px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.bench-hdr{font-size:8px;font-weight:800;letter-spacing:2px;color:var(--t2);margin-bottom:8px}
.bench-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f4f6fb}
.bench-row:last-child{border-bottom:none}
.bench-num{font-size:13px;font-weight:800;min-width:30px;font-family:monospace}
.bench-name{font-size:11px;font-weight:700;flex:1}
.bench-in{font-size:8px;color:var(--g);font-weight:800;letter-spacing:1px}
.ev-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.ev-btn{padding:9px 4px;border-radius:9px;border:1.5px solid;font-size:10px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:48px;background:var(--card)}
.ev-sub{font-size:7px;opacity:.65;font-weight:600}
.ev-pcp{border-color:var(--b);color:var(--b)}
.ev-pcn{border-color:var(--a);color:var(--a)}
.ev-gp{border-color:var(--g);color:var(--g)}
.ev-gn{border-color:var(--r);color:var(--r)}

/* ── PC PANEL ── */
#pc-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;align-items:center;justify-content:center;padding:16px}
.pc-box{background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:18px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.pc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pc-ttl{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--b)}
.pc-cls{background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;padding:2px 8px}
.pc-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pc-col-lbl{font-size:8px;font-weight:800;letter-spacing:2px;margin-bottom:8px;display:block}
.pc-item{border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;border:1.5px solid}
.pc-item:active{transform:scale(.97)}
.pc-d{background:#eff6ff;border-color:rgba(37,99,235,.4)}
.pc-v{background:#f5f3ff;border-color:rgba(124,58,237,.4)}
.pc-na{opacity:.38;cursor:default}
.pc-rank{font-size:7px;font-weight:800;margin-bottom:3px}
.pc-name{font-size:14px;font-weight:900;margin-bottom:5px}

/* ── MODAL ── */
#mod-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:500;padding:16px}
.mod-box{background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.mod-ttl{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--t);margin-bottom:14px}
.mod-acts{display:flex;gap:8px;margin-top:14px}

/* ── TOASTS ── */
#toasts{position:fixed;top:8px;right:8px;z-index:600;display:flex;flex-direction:column;gap:4px;max-width:280px;pointer-events:none}
.toast{padding:8px 12px;border-radius:9px;font-size:11px;font-weight:700;pointer-events:all;box-shadow:0 4px 16px rgba(0,0,0,.1);display:flex;align-items:center;gap:8px;border:1.5px solid}
.t-ok{background:#f0fdf4;border-color:var(--g);color:#15803d}
.t-warn{background:#fffbeb;border-color:var(--a);color:#92400e}
.t-urgent{background:#fff0f0;border-color:var(--r);color:var(--r)}
.t-info{background:#eff6ff;border-color:var(--b);color:var(--b)}
.t-x{background:none;border:none;color:inherit;font-size:15px;margin-left:auto;cursor:pointer}

/* ── INFORME ── */
.inf-row{background:var(--card);border:1.5px solid var(--bd);border-radius:9px;padding:9px 12px;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.inf-bar-wrap{height:5px;background:#f0f2f8;border-radius:4px;flex:1;overflow:hidden}
.inf-bar-fill{height:100%;background:linear-gradient(90deg,var(--r),var(--a));border-radius:4px}
</style>
</head>
<body>
<div id="app">
  <div id="toasts"></div>
  <div id="pc-panel" onclick="if(event.target===this)closePCP()"><div class="pc-box" id="pc-box"></div></div>
  <div id="mod-bg" onclick="if(event.target===this)closeMod()"><div class="mod-box" id="mod-box" onclick="event.stopPropagation()"></div></div>

  <header id="hdr">
    <div><div class="logo">RED<em>STICKS</em></div><div class="logo-sub">ESP ABSOLUTA</div></div>
    <div class="hdr-mid" id="hdr-mid">
      <div class="sc-wrap">
        <div>
          <div class="sc-team">ESP</div>
          <div style="display:flex;align-items:center;gap:3px">
            <button class="sc-adj" onclick="adjSc(0,-1)">-</button>
            <div class="sc-num" id="sc-h">0</div>
            <button class="sc-adj" onclick="adjSc(0,1)">+</button>
          </div>
        </div>
        <div class="sc-sep">-</div>
        <div>
          <div class="sc-team" id="riv-lbl">RIV</div>
          <div style="display:flex;align-items:center;gap:3px">
            <button class="sc-adj" onclick="adjSc(1,-1)">-</button>
            <div class="sc-num" id="sc-a">0</div>
            <button class="sc-adj" onclick="adjSc(1,1)">+</button>
          </div>
        </div>
      </div>
      <div class="tmr-wrap">
        <div class="tmr" id="tmr">15:00</div>
        <div class="tmr-phase" id="tmr-phase">PRE-PARTIDO</div>
        <div class="qpips" id="qpips"></div>
      </div>
    </div>
    <button class="riv-btn" id="riv-btn" onclick="openRivMod()">ESP vs ?</button>
  </header>

  <div id="tabs">
    <button class="tab tab-a" onclick="go(0)">PLANTILLA</button>
    <button class="tab" onclick="go(1)">PROGRAMA</button>
    <button class="tab" onclick="go(2)">PARTIDO</button>
    <button class="tab" onclick="go(3)">INFORME</button>
  </div>

// ── UTILS ──
function ft(s){
  if(s<0)s=0;
  return (s>=600?'':s>=60?'':'0')+Math.floor(s/60)+':'+(Math.floor(s)%60<10?'0':'')+Math.floor(s)%60;
}
function pad2(n){ return n<10?'0'+n:''+n; }
function gP(id){ for(var i=0;i<POOL.length;i++) if(POOL[i].id===id) return POOL[i]; return null; }
function isQ(){ return MATCH.phase==='q1'||MATCH.phase==='q2'||MATCH.phase==='q3'||MATCH.phase==='q4'; }
function isBk(){ return MATCH.phase.charAt(0)==='b'; }
function qNum(){
  var m={q1:1,q2:2,q3:3,q4:4}; return m[MATCH.phase]||1;

function cdQ(){ return ft(Math.max(0,QD-MATCH.qElapsed)); }
function inField(id){ return ROSTER.squad.indexOf(id)>=0; }
function onBench(id){ return ROSTER.bench.indexOf(id)>=0; }

// ── LINE POSITIONS ──
function calcLinePos(){
  var lineX={GK:5,DEF:23,MID:50,FWD:75};
  var byPos={GK:[],DEF:[],MID:[],FWD:[]};
  for(var i=0;i<ROSTER.squad.length;i++){
    var p=gP(ROSTER.squad[i]);
    if(p&&byPos[p.pos]) byPos[p.pos].push(p.id);
  }
  var poss=['GK','DEF','MID','FWD'];
  for(var pi=0;pi<poss.length;pi++){
    var pos=poss[pi], ids=byPos[pos], n=ids.length;
    for(var ii=0;ii<n;ii++){
      if(!MATCH.posDragged[ids[ii]]){
        MATCH.pos[ids[ii]]={x:lineX[pos],y:10+(ii+1)*(80/(n+1))};
      }
    }
  }
}

// ── INIT ──
function initROSTER(){
  var gks=[],flds=[];
  for(var i=0;i<POOL.length;i++){
    if(POOL[i].pos==='GK') gks.push(POOL[i].id);
    else flds.push(POOL[i].id);
  }
  for(var i=0;i<10&&i<flds.length;i++) ROSTER.squad.push(flds[i]);
  if(gks.length) ROSTER.squad.push(gks[0]);
  for(var i=10;i<16&&i<flds.length;i++) ROSTER.bench.push(flds[i]);
  if(gks.length>1) ROSTER.bench.push(gks[1]);
  for(var i=0;i<POOL.length;i++){
    var p=POOL[i];
    ROSTER.roles[p.id]={};
    var pr=p.roles||{}, ks=Object.keys(pr);
    for(var k=0;k<ks.length;k++) ROSTER.roles[p.id][ks[k]]=pr[ks[k]];
    MATCH.pos[p.id]={x:50,y:50};
  }
}

// ── TOASTS ──
var _T=[];
function toast(msg,type){
  var id=Date.now()+Math.random(); type=type||'info';
  _T.push({id:id,msg:msg,type:type});
  rToasts();
  setTimeout(function(){ _T=_T.filter(function(t){return t.id!==id;}); rToasts(); },type==='urgent'?18000:6000);
}
function rToasts(){
  var el=document.getElementById('toasts'); if(!el) return;
  var h='';
  for(var i=0;i<_T.length;i++){
    h+='<div class="toast t-'+_T[i].type+'"><span style="flex:1">'+_T[i].msg+'</span>'+
       '<button class="t-x" data-tid="'+_T[i].id+'" onclick="dismissT(this)">x</button></div>';
  }
  el.innerHTML=h;
}
function dismissT(btn){ var id=parseFloat(btn.dataset.tid); _T=_T.filter(function(t){return t.id!==id;}); rToasts(); }

function cyclePlayer(el){
  var id=parseInt(el.dataset.pid); if(!id) return;
  var inf=ROSTER.squad.indexOf(id), ben=ROSTER.bench.indexOf(id);
  if(inf>=0){ ROSTER.squad.splice(inf,1); ROSTER.bench.push(id); }
  else if(ben>=0){ ROSTER.bench.splice(ben,1); }
  else { ROSTER.squad.push(id); }
  save(); rPlantilla();

  var pcdR=RDEFS.filter(function(r){return r.grp==='D';});
  var pcaR=RDEFS.filter(function(r){return r.grp==='A';});

    var h='<div style="overflow-x:auto;margin-bottom:16px"><table class="roles-tbl"><thead><tr><th>JUGADOR</th>';

          '<span class="rk rk0" data-pid="'+p.id+'" data-rid="'+r.id+'" onclick="cycleRank(this)">+</span>')+'</td>';
      }
      h+='</tr>';
    }
    h+='</tbody></table></div>';
    return h;
  }
  var h='<div style="font-size:9px;color:var(--t2);margin-bottom:10px">Toca la celda para ciclar R1 &#8594; R2 &#8594; R3 &#8594; sin rol</div>';
  h+='<span class="lbl" style="color:var(--a)">DEFENSA PC</span>'+buildT(pcdR,'var(--a)');
  h+='<span class="lbl" style="color:var(--p)">ATAQUE PC</span>'+buildT(pcaR,'var(--p)');
  return h;
}
function cycleRank(el){
  var pid=parseInt(el.dataset.pid), rid=el.dataset.rid;

function mkPlayerOpts(ids, selIds){

function rQSel(){
  var el=document.getElementById('qsel'); if(!el) return;
  var qs=MATCH.mirror?[1,2]:[1,2,3,4];
  var h='';
  for(var i=0;i<qs.length;i++){
    var q=qs[i], a=MATCH.curQ===q;
    var lbl='Q'+q+(MATCH.mirror&&q===1?' =Q3':MATCH.mirror&&q===2?' =Q4':'');
    h+='<button class="qsbtn'+(a?' qsbtn-a':'')+'" data-q="'+q+'" onclick="setQ(this)">'+lbl+'</button>';
  }
  el.innerHTML=h;
  var mb=document.getElementById('mir-btn');
  if(mb){ mb.className='mir-btn'+(MATCH.mirror?'':' mir-off'); mb.textContent=MATCH.mirror?'Q1=Q3 Q2=Q4':'SIN ESPEJO'; }
  var pi=document.getElementById('prog-info');
  if(pi) pi.textContent=MATCH.pairs.length+' cambios';
}
function setQ(btn){ MATCH.curQ=parseInt(btn.dataset.q); rProg(); }
function toggleMir(){ MATCH.mirror=!MATCH.mirror; if(MATCH.curQ>2&&MATCH.mirror)MATCH.curQ=1; rProg(); }

function rTimeline(){
  var el=document.getElementById('prog-body'); if(!el) return;
  var q=MATCH.curQ;
  var qP=MATCH.pairs.filter(function(p){return p.q===q;});
  var byMin={};
  for(var i=0;i<qP.length;i++){var p=qP[i];if(!byMin[p.cd])byMin[p.cd]=[];byMin[p.cd].push(p);}
  var h='';
  // INICIO DE CUARTO
  if(q>1){
    var sp=byMin[0]||[];
    h+='<span class="lbl" style="color:var(--r)">INICIO Q'+q+' — AUTO AL FINALIZAR Q'+(q-1)+'</span>';
    h+='<div class="tl-start">';
    if(sp.length){
      for(var i=0;i<sp.length;i++){
        var p=sp[i],pO=gP(p.out),pI=gP(p.inp);
        h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(200,16,46,.12)">';
        h+='<span style="font-size:9px;font-weight:800;color:var(--r);min-width:58px">INICIO Q'+q+'</span>';
        h+='<span class="chg-out">SALE #'+(pO?pO.num:'?')+' '+(pO?pO.nick:'')+'</span>';
        h+='<span class="chg-arr">&#8594;</span>';
        h+='<span class="chg-in">ENTRA #'+(pI?pI.num:'?')+' '+(pI?pI.nick:'')+'</span>';
        h+='<button class="chg-del" data-pid="'+p.id+'" onclick="delPair(this)">x</button></div>';
      }
    } else {
      h+='<div style="font-size:10px;color:var(--t2)">Sin cambios de inicio</div>';
    }
    h+='<button onclick="openPairMod('+q+',0)" style="margin-top:8px;background:none;border:1.5px solid rgba(200,16,46,.4);color:var(--r);padding:5px 12px;font-size:9px;font-weight:800;border-radius:6px;cursor:pointer">+ ANADIR</button>';
    h+='</div>';
  }
  // TIMELINE
  // Mirror indicator
  if(MATCH.mirror){
    if(q<=2){
      h+='<div style="background:#f0fdf4;border:1.5px solid rgba(22,163,74,.35);border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px">';
      h+='<span style="font-size:16px">&#8644;</span>';
      h+='<div><div style="font-size:9px;font-weight:800;color:var(--g);letter-spacing:1px">ESPEJO ACTIVO</div>';
      h+='<div style="font-size:9px;color:var(--t2)">Q'+q+' se replica automaticamente en Q'+(q+2)+'. Los cambios que programes aqui se ejecutaran tambien en Q'+(q+2)+'.</div></div></div>';
    } else {
      h+='<div style="background:#fffbeb;border:1.5px solid rgba(245,158,11,.4);border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px">';
      h+='<span style="font-size:16px">&#8644;</span>';
      h+='<div><div style="font-size:9px;font-weight:800;color:var(--a);letter-spacing:1px">MODO ESPEJO — Q'+(q-2)+' &#8594; Q'+q+'</div>';
      h+='<div style="font-size:9px;color:var(--t2)">Este cuarto replica Q'+(q-2)+'. Desactiva el espejo si quieres programar Q'+q+' de forma independiente.</div></div></div>';
    }
  }
  h+='<span class="lbl">TIMELINE Q'+q+'</span>';
  h+='<div class="tl-bar">';
  for(var cd=14;cd>=1;cd--){
    var cnt=(byMin[cd]||[]).length, has=cnt>0;
    h+='<div class="tl-min'+(has?' tl-has':'')+'" data-q="'+q+'" data-cd="'+cd+'" onclick="openPairModEl(this)">';
    h+='<div class="tl-min-cd">'+pad2(cd)+':00</div>';
    if(has) h+='<div class="tl-min-n">'+cnt+'x</div>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:7px;color:var(--t3);margin-bottom:10px"><span>INICIO Q'+q+'</span><span>FIN Q'+q+'</span></div>';
  // LIST
  var allQP=qP.filter(function(p){return p.cd>0;});
  allQP.sort(function(a,b){return b.cd-a.cd;});
  h+='<span class="lbl">CAMBIOS Q'+q+'</span>';
  if(!allQP.length){
    h+='<div style="color:var(--t2);font-size:11px;padding:8px 0">Sin cambios. Toca un minuto del timeline.</div>';
  } else {
    for(var i=0;i<allQP.length;i++){
      var p=allQP[i],pO=gP(p.out),pI=gP(p.inp);
      h+='<div class="chg-item">';
      h+='<span class="chg-t">'+pad2(p.cd)+':00</span>';

      h+='<span class="chg-arr">&#8594;</span>';

      h+='<button class="chg-del" data-pid="'+p.id+'" onclick="delPair(this)">x</button></div>';
    }

  h+='<button class="btn-r" style="width:100%;margin-top:16px" onclick="go(2)">IR AL PARTIDO</button>';
  el.innerHTML=h;

function openPairModEl(el){ openPairMod(parseInt(el.dataset.q),parseInt(el.dataset.cd)); }
function openPairMod(q,cd){
  var field=fieldAt(q,cd);
  var allConv=ROSTER.squad.concat(ROSTER.bench);
  var onF=field.filter(function(id){return allConv.indexOf(id)>=0;});
  var offF=allConv.filter(function(id){return onF.indexOf(id)<0;});
  var tlbl=cd===0?'INICIO Q'+q:pad2(cd)+':00';
  openMod('<div class="mod-ttl">CAMBIO '+tlbl+' Q'+q+'</div>'+
    '<div style="font-size:9px;color:var(--t2);margin-bottom:12px">'+onF.length+' jugadores en campo</div>'+
    '<div class="frow"><label class="flbl">SALE</label>'+
    '<select class="finp" id="p-out" style="color:var(--r)"><option value="">quien sale...</option>'+
    mkPlayerOpts(onF,[])+'</select></div>'+
    '<div class="frow"><label class="flbl">ENTRA</label>'+
    '<select class="finp" id="p-in" style="color:var(--g)"><option value="">quien entra...</option>'+
    mkPlayerOpts(offF,[])+'</select></div>'+
    '<div class="mod-acts">'+
    '<button class="btn-r" style="flex:1" data-q="'+q+'" data-cd="'+cd+'" onclick="addPair(this)">ANADIR</button>'+
    '<button class="btn-n" onclick="closeMod()">CANCELAR</button></div>'+
    '<div style="font-size:8px;color:var(--t2);margin-top:10px">Para varios cambios en el mismo minuto repite el proceso.</div>');
}
function addPair(btn){
  var q=parseInt(btn.dataset.q), cd=parseInt(btn.dataset.cd);
  var outEl=document.getElementById('p-out'), inEl=document.getElementById('p-in');
  var outId=parseInt(outEl?outEl.value:''), inId=parseInt(inEl?inEl.value:'');
  if(!outId||!inId) return toast('Selecciona quien sale y quien entra','warn');
  MATCH.pairs.push({id:Date.now(),q:q,cd:cd,out:outId,inp:inId});
  closeMod(); save(); rProg(); toast('Cambio anadido','ok');
}
function delPair(btn){
  var id=parseInt(btn.dataset.pid);
  MATCH.pairs=MATCH.pairs.filter(function(p){return p.id!==id;});
  save(); rProg();
}
function fieldAt(q,cd){
  var field=ROSTER.squad.slice();
  var sorted=MATCH.pairs.slice().sort(function(a,b){
    if(a.q!==b.q) return a.q-b.q;
    // Within same quarter: cd=0 (inicio) goes first, then descending cd
    if(a.cd===0&&b.cd!==0) return -1;
    if(b.cd===0&&a.cd!==0) return 1;
    return b.cd-a.cd;
  });
  for(var i=0;i<sorted.length;i++){
    var p=sorted[i];
    var before=(p.q<q)||(p.q===q&&p.cd===0)||(p.q===q&&cd!==0&&p.cd>cd);
    if(before){var oi=field.indexOf(p.out);if(oi>=0){field.splice(oi,1);if(field.indexOf(p.inp)<0)field.push(p.inp);}}
  }
  return field;
}

// ══════════════════════════════════════════════════
// PENDING HELPERS
// ══════════════════════════════════════════════════
function getQ(){ return isQ()?qNum():1; }
function getE(){ return isQ()?MATCH.qElapsed:0; }

function allPending(q,elapsed){
  var result=[], srcQ=(MATCH.mirror&&(q===3||q===4))?q-2:q;
  for(var i=0;i<MATCH.pairs.length;i++){
    var p=MATCH.pairs[i]; if(p.q!==srcQ||p.cd===0) continue;
    var mk=(q===3?'m3_':q===4?'m4_':'')+p.id;
    var ek=(q===3||q===4)?mk:String(p.id);
    if(MATCH.execIds.indexOf(ek)>=0) continue;
    result.push({pairId:p.id,out:p.out,inp:p.inp,cd:p.cd,mk:(q===3||q===4)?mk:'',sl:p.cd*60-elapsed});
  }
  result.sort(function(a,b){return b.cd-a.cd;});
  return result;
}

function rPartido(){
  var el=document.getElementById('match-body'); if(!el) return;
  var h='';
  // Controls (full width, above columns)
  h+='<div class="ctrl-row" style="margin-top:8px">';

  if(isQ()&&MATCH.running){ h+='<button class="ctrl-pause" onclick="pauseG()">PAUSA</button><button class="ctrl-end" onclick="endQ()">FIN Q'+qNum()+'</button>'; }
  if(isQ()&&!MATCH.running){ h+='<button class="ctrl-play" onclick="resumeG()">REANUDAR</button><button class="ctrl-end" onclick="endQ()">FIN Q'+qNum()+'</button>'; }
  if(MATCH.phase==='ended') h+='<button class="btn-r" style="flex:1" onclick="openNewMatch()">NUEVO PARTIDO</button>';
  h+='</div>';

  h+='<div class="mb-cols">';

  // ── LEFT COLUMN: field + bench + events ──
  h+='<div class="mb-left">';
  calcLinePos();
  h+='<span class="lbl">CAMPO</span>';
  h+=buildField();
  h+=buildBench();
  h+='<span class="lbl">EVENTOS</span>';
  h+='<div class="ev-row">';
  h+='<button class="ev-btn ev-pcp" onclick="trigPC(1)"><span>PC+</span><span class="ev-sub">ESP</span></button>';
  h+='<button class="ev-btn ev-pcn" onclick="trigPC(0)"><span>PC-</span><span class="ev-sub">'+ROSTER.rival+'</span></button>';
  h+='<button class="ev-btn ev-gp" onclick="trigGol(1)"><span>GOL+</span><span class="ev-sub">40s</span></button>';
  h+='<button class="ev-btn ev-gn" onclick="trigGol(0)"><span>GOL-</span><span class="ev-sub">40s</span></button>';
  h+='</div>';
  h+='</div>';

  // ── RIGHT COLUMN: pending changes list ──
  h+='<div class="mb-right">';
  var pend=allPending(getQ(),getE());
  if(pend.length){
    h+='<div class="pend-box"><div class="pend-hdr"><span class="pend-lbl">CAMBIOS Q'+getQ()+'</span><span class="pend-cnt">'+pend.length+'</span></div>';
    for(var i=0;i<pend.length;i++){
      var p=pend[i], pO=gP(p.out), pI=gP(p.inp);
      var sl=p.sl, isNow=sl<=0, isSoon=!isNow&&sl<=60;
      var slCls=isNow?'pr-sl-now':isSoon?'pr-sl-soon':'pr-sl-ok';
      var slTxt=isNow?'AHORA':isSoon?('en '+ft(sl)):'';
      h+='<div class="pend-row'+(isNow||isSoon?' pend-now':'')+'">';
      h+='<span class="pr-min">'+pad2(p.cd)+':00</span>';
      h+='<span class="pr-sl '+slCls+'">'+slTxt+'</span>';
      h+='<span class="pr-out">SALE #'+(pO?pO.num:'?')+' '+(pO?pO.nick:'')+'</span>';
      h+='<span class="pr-arr">&#8594;</span>';
      h+='<span class="pr-in">ENTRA #'+(pI?pI.num:'?')+' '+(pI?pI.nick:'')+'</span>';
      h+='<button class="pr-exec" data-pid="'+p.pairId+'" data-mk="'+(p.mk||'')+'" onclick="execBtn(this)">OK</button></div>';
    }
    h+='</div>';
  } else {
    h+='<div style="font-size:9px;color:var(--t2);padding:6px 0 10px">Sin cambios programados en Q'+getQ()+'</div>';
  }
  h+='</div>';

  h+='</div>'; // .mb-cols
  el.innerHTML=h;
}

function buildField(){
  var svg='<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 100 60" preserveAspectRatio="none">';
  svg+='<rect width="100" height="60" fill="#1a3a1a"/>';
  svg+='<rect x="1" y="1" width="98" height="58" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="0.6"/>';
  svg+='<line x1="50" y1="1" x2="50" y2="59" stroke="rgba(255,255,255,.2)" stroke-width="0.4"/>';
  svg+='<line x1="25" y1="1" x2="25" y2="59" stroke="rgba(255,255,255,.2)" stroke-width="0.4"/>';
  svg+='<line x1="75" y1="1" x2="75" y2="59" stroke="rgba(255,255,255,.2)" stroke-width="0.4"/>';
  svg+='<clipPath id="ca"><rect x="1" y="1" width="24" height="58"/></clipPath>';
  svg+='<circle cx="1" cy="30" r="18" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="0.5" clip-path="url(#ca)"/>';
  svg+='<clipPath id="cb"><rect x="75" y="1" width="24" height="58"/></clipPath>';
  svg+='<circle cx="99" cy="30" r="18" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="0.5" clip-path="url(#cb)"/>';
  svg+='<circle cx="50" cy="30" r="0.5" fill="rgba(255,255,255,.5)"/></svg>';
  var pend=allPending(getQ(),getE());
  var pendOut=[];
  for(var i=0;i<pend.length;i++) pendOut.push(pend[i].out);
  var posC={GK:'tok-gk',DEF:'tok-def',MID:'tok-mid',FWD:'tok-fwd'};
  var toks='';
  for(var i=0;i<ROSTER.squad.length;i++){
    var id=ROSTER.squad[i], p=gP(id); if(!p) continue;
    var ps=MATCH.pos[id]||{x:50,y:50};
    var isPend=pendOut.indexOf(id)>=0;
    var cls='tok '+(posC[p.pos]||'tok-mid')+(isPend?' tok-pend':'');
    var pt=playedTime(id);
    toks+='<div class="'+cls+'" data-pid="'+id+'" ontouchstart="tokTS(event)" onclick="tapTok(this)" '+
          'style="left:calc('+ps.x+'% - 24px);top:calc('+ps.y+'% - 21px)">';
    toks+='<div class="tok-num">#'+p.num+'</div>';
    toks+='<div class="tok-nick">'+p.nick+'</div>';
    toks+='<div class="tok-t">'+ft(pt)+'</div></div>';
  }
  return '<div class="field-wrap" id="fw">'+svg+toks+'</div>';
}

function buildBench(){
  var bench=ROSTER.bench.filter(function(id){return ROSTER.squad.indexOf(id)<0;});
  if(!bench.length) return '';
  var pend=allPending(getQ(),getE());
  var pendIn=[];
  for(var i=0;i<pend.length;i++) pendIn.push(pend[i].inp);
  bench.sort(function(a,b){
    var pa=gP(a),pb=gP(b);
    var po=['GK','DEF','MID','FWD'];
    var ia=po.indexOf(pa?pa.pos:'FWD'), ib=po.indexOf(pb?pb.pos:'FWD');
    return ia!==ib?ia-ib:(pa?pa.num:0)-(pb?pb.num:0);
  });
  var posC={GK:'#7c3aed',DEF:'var(--b)',MID:'var(--g)',FWD:'var(--r)'};
  var h='<div class="bench-box"><div class="bench-hdr">BANQUILLO ('+bench.length+')</div>';
  for(var i=0;i<bench.length;i++){
    var id=bench[i], p=gP(id); if(!p) continue;
    var isPend=pendIn.indexOf(id)>=0;
    h+='<div class="bench-row" style="'+(isPend?'background:#f0fdf4;border-left:3px solid var(--g)':'')+'">';
    h+='<span class="bench-num" style="color:'+(posC[p.pos]||'var(--r)')+'">'+p.num+'</span>';
    h+='<span class="bench-name">'+p.nick+'</span>';
    h+='<span class="pt-pos pos-'+p.pos+'">'+p.pos+'</span>';
    if(isPend) h+='<span class="bench-in">ENTRA</span>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

// ── EXEC PAIR ──
function execBtn(btn){ execPair(parseInt(btn.dataset.pid), btn.dataset.mk||''); }
function execPair(pairId, mk){
  var srcId=mk?parseInt(mk.replace('m3_','').replace('m4_','')):pairId;
  var pair=null;
  for(var i=0;i<MATCH.pairs.length;i++) if(MATCH.pairs[i].id===srcId){pair=MATCH.pairs[i];break;}
  if(!pair) return;
  var ek=mk||String(pairId);
  if(MATCH.execIds.indexOf(ek)>=0) return;
  MATCH.execIds.push(ek);
  // Move out -> bench, in -> squad
  var oi=ROSTER.squad.indexOf(pair.out);
  if(oi>=0){
    ROSTER.squad.splice(oi,1);
    if(ROSTER.bench.indexOf(pair.out)<0) ROSTER.bench.push(pair.out);
  }
  var bi=ROSTER.bench.indexOf(pair.inp);
  if(bi>=0) ROSTER.bench.splice(bi,1);
  if(ROSTER.squad.indexOf(pair.inp)<0) ROSTER.squad.push(pair.inp);
  // Transfer position
  if(MATCH.pos[pair.out]) MATCH.pos[pair.inp]={x:MATCH.pos[pair.out].x,y:MATCH.pos[pair.out].y};
  MATCH.log.push({type:'sub',sec:MATCH.matchTime,outId:pair.out,inId:pair.inp});
  var pO=gP(pair.out), pI=gP(pair.inp);
  toast('CAMBIO: #'+(pO?pO.num:'?')+' '+(pO?pO.nick:'')+' > #'+(pI?pI.num:'?')+' '+(pI?pI.nick:''),'ok');
  save(); if(CUR===2) rPartido();
}

// ── TIMER ──
function startTmr(){
  clearInterval(tiInt); if(!MATCH.running) return;
  tiInt=setInterval(function(){
    if(isBk()){
      MATCH.breakCd--;
      if(MATCH.breakCd<=0){MATCH.running=false;MATCH.breakCd=0;clearInterval(tiInt);}
    } else if(isQ()){
      MATCH.qElapsed++;MATCH.matchTime++;
      if(MATCH.qElapsed>=QD){autoEndQ();return;}
      checkAlerts();
    }
    rHdr();
    if(CUR===2) rPartido();
  },1000);
}
function stopTmr(){ clearInterval(tiInt); }

function startQ(){
  if(MATCH.phase==='pre'){
    MATCH.log=[{type:'init',ids:ROSTER.squad.slice(),sec:0}];
    MATCH.execIds=[];MATCH.alerted={};MATCH.events=[];
    MATCH.score={h:0,a:0};MATCH.matchTime=0;MATCH.qElapsed=0;MATCH.qLog=[];
    MATCH.posDragged={};
    var sh=document.getElementById('sc-h');if(sh)sh.textContent='0';
    var sa=document.getElementById('sc-a');if(sa)sa.textContent='0';
  }
  hideBrk();
  MATCH.phase='q1';MATCH.qElapsed=0;MATCH.running=true;
  startTmr();rHdr();if(CUR===2)rPartido();
}
function startNextQ(){
  var nq={b12:'q2',b23:'q3',b34:'q4'}[MATCH.phase]; if(!nq) return;
  hideBrk();
  MATCH.phase=nq;MATCH.qElapsed=0;MATCH.running=true;
  startTmr();rHdr();if(CUR===2)rPartido();
}
function pauseG(){MATCH.running=false;stopTmr();rHdr();if(CUR===2)rPartido();}
function resumeG(){MATCH.running=true;startTmr();rHdr();if(CUR===2)rPartido();}

function endQ(){
  stopTmr();MATCH.running=false;
  MATCH.qLog.push({num:qNum(),start:MATCH.matchTime-MATCH.qElapsed,end:MATCH.matchTime});
  var nxt={q1:'b12',q2:'b23',q3:'b34',q4:'ended'}[MATCH.phase];
  if(nxt==='ended'){MATCH.phase='ended';rHdr();if(CUR===2)rPartido();return;}
  var nqn={b12:2,b23:3,b34:4}[nxt];
  execInitPairs(nqn);
  MATCH.breakCd=BREAKS[nxt];MATCH.phase=nxt;MATCH.qElapsed=0;MATCH.running=true;
  showBrk(nxt,nqn);
  startTmr();rHdr();if(CUR===2)rPartido();
}
function autoEndQ(){
  stopTmr();MATCH.running=false;
  MATCH.qLog.push({num:qNum(),start:MATCH.matchTime-QD,end:MATCH.matchTime});
  var nxt={q1:'b12',q2:'b23',q3:'b34',q4:'ended'}[MATCH.phase];
  if(nxt==='ended'){MATCH.phase='ended';rHdr();if(CUR===3)rInforme();else go(3);return;}
  var nqn={b12:2,b23:3,b34:4}[nxt];
  execInitPairs(nqn);
  MATCH.breakCd=BREAKS[nxt];MATCH.phase=nxt;MATCH.qElapsed=0;MATCH.running=true;
  showBrk(nxt,nqn);
  startTmr();rHdr();if(CUR===2)rPartido();
}
function execInitPairs(nqn){
  var initP=MATCH.pairs.filter(function(p){return p.q===nqn&&p.cd===0;}), cnt=0;
  for(var i=0;i<initP.length;i++){
    var p=initP[i];
    var oi=ROSTER.squad.indexOf(p.out);
    if(oi>=0){
      ROSTER.squad.splice(oi,1);
      if(ROSTER.bench.indexOf(p.out)<0) ROSTER.bench.push(p.out);
    }
    var bi=ROSTER.bench.indexOf(p.inp); if(bi>=0) ROSTER.bench.splice(bi,1);
    if(ROSTER.squad.indexOf(p.inp)<0) ROSTER.squad.push(p.inp);
    if(MATCH.pos[p.out]) MATCH.pos[p.inp]={x:MATCH.pos[p.out].x,y:MATCH.pos[p.out].y};
    MATCH.log.push({type:'sub',sec:MATCH.matchTime,outId:p.out,inId:p.inp,sit:'inicio_q'+nqn});
    MATCH.execIds.push(String(p.id));
    cnt++;
  }
  if(cnt>0) toast(cnt+' cambios inicio Q'+nqn+' ejecutados','ok');
}
function showBrk(nxt,nqn){
  var bb=document.getElementById('brk'); if(!bb) return;
  bb.style.display='flex';
  var titles={b12:'DESCANSO 2 MIN',b23:'MEDIO TIEMPO',b34:'DESCANSO 2 MIN'};
  var bt=document.getElementById('brk-title');if(bt)bt.textContent=titles[nxt]||'DESCANSO';
  var bs=document.getElementById('brk-sub');if(bs)bs.textContent='Q'+nqn+' listo';
  var bbn=document.getElementById('brk-btn');if(bbn)bbn.textContent='INICIAR Q'+nqn;
}
function hideBrk(){ var bb=document.getElementById('brk');if(bb)bb.style.display='none'; }

function checkAlerts(){
  if(!isQ()) return;
  var q=qNum(), e=MATCH.qElapsed;
  var pend=allPending(q,e);
  for(var i=0;i<pend.length;i++){
    var p=pend[i], sl=p.sl;
    var pO=gP(p.out), pI=gP(p.inp);
    var k50='50_'+p.out+'_q'+q, k0='0_'+p.out+'_q'+q;
    if(!MATCH.alerted[k50]&&sl>0&&sl<=60){
      MATCH.alerted[k50]=1;
      toast('CAMBIO en '+Math.round(sl)+'s: #'+(pO?pO.num:'?')+' > #'+(pI?pI.num:'?'),'warn');
    }
    if(!MATCH.alerted[k0]&&sl<=0){
      MATCH.alerted[k0]=1;
      toast('CAMBIO AHORA: #'+(pO?pO.num:'?')+' > #'+(pI?pI.num:'?'),'urgent');
    }
  }
}

// ── PLAYED TIME ──
function playedTime(id){
  var t=0,inF=false,last=0;
  var init=null;
  for(var i=0;i<MATCH.log.length;i++) if(MATCH.log[i].type==='init'){init=MATCH.log[i];break;}
  if(init&&init.ids&&init.ids.indexOf(id)>=0){inF=true;last=0;}
  for(var i=0;i<MATCH.log.length;i++){
    var e=MATCH.log[i]; if(e.type!=='sub') continue;
    if(e.outId===id&&inF){t+=e.sec-last;inF=false;last=e.sec;}
    if(e.inId===id&&!inF){inF=true;last=e.sec;}
  }
  if(inF) t+=MATCH.matchTime-last;
  return t;
}

// ── PC ──
function trigPC(side){
  if(MATCH.running){MATCH.running=false;stopTmr();}
  MATCH.events.push({id:Date.now(),lbl:(side===1?'PC+ ESP':'PC- '+ROSTER.rival),start:Math.max(0,MATCH.matchTime-2),end:MATCH.matchTime+5});
  if(side===1) openPCPanel();
  rHdr();if(CUR===2)rPartido();
}
function openPCPanel(){
  var onF=ROSTER.squad.slice();
  var avail=ROSTER.pcVars.filter(function(v){return v.pids.every(function(pid){return onF.indexOf(pid)>=0;});});
  var notAvail=ROSTER.pcVars.filter(function(v){return !v.pids.every(function(pid){return onF.indexOf(pid)>=0;});});
  var dirs=avail.filter(function(v){return v.cat==='direct';}).sort(function(a,b){return a.rank-b.rank;});
  var vrs=avail.filter(function(v){return v.cat==='variant';}).sort(function(a,b){return a.rank-b.rank;});
  function grpH(items,col,pipCls,itemCls){
    if(!items.length) return '<div style="color:var(--t2);font-size:10px;padding:6px">Ninguna disponible</div>';
    var h='';
    for(var i=0;i<items.length;i++){
      var v=items[i], pls='';
      for(var j=0;j<v.pids.length;j++){var p=gP(v.pids[j]);if(p)pls+='<span class="pip '+pipCls+'">'+p.nick+'</span>';}
      h+='<div class="pc-item '+itemCls+'" data-vid="'+v.id+'" onclick="selVariant(this)">'+
         '<div class="pc-rank" style="color:'+col+'">R'+v.rank+'</div>'+
         '<div class="pc-name" style="color:'+col+'">'+v.name+'</div>'+
         '<div class="vc-pips">'+pls+'</div></div>';
    }
    return h;
  }
  var naH='';
  if(notAvail.length){
    naH='<div style="margin-top:12px;border-top:1.5px solid var(--bd);padding-top:12px">'+
        '<div style="font-size:8px;color:var(--t2);font-weight:700;letter-spacing:2px;margin-bottom:6px">NO DISPONIBLES</div>';
    for(var i=0;i<notAvail.length;i++){
      var v=notAvail[i];
      naH+='<div class="pc-item '+(v.cat==='direct'?'pc-d':'pc-v')+' pc-na"><div class="pc-rank">R'+v.rank+'</div><div class="pc-name">'+v.name+'</div></div>';
    }
    naH+='</div>';
  }
  document.getElementById('pc-box').innerHTML=
    '<div class="pc-hdr"><span class="pc-ttl">PC+ DISPONIBLES ('+avail.length+'/'+ROSTER.pcVars.length+')</span>'+
    '<button class="pc-cls" onclick="closePCP()">x</button></div>'+
    '<div class="pc-cols">'+
    '<div><span class="pc-col-lbl" style="color:var(--b)">DIRECTOS</span>'+grpH(dirs,'var(--b)','pip-d','pc-d')+'</div>'+
    '<div><span class="pc-col-lbl" style="color:var(--p)">VARIANTES</span>'+grpH(vrs,'var(--p)','pip-v','pc-v')+'</div>'+
    '</div>'+naH+
    '<button onclick="closePCP()" style="width:100%;margin-top:14px;background:none;border:1.5px solid var(--bd);color:var(--t2);padding:9px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer">CERRAR</button>';
  document.getElementById('pc-panel').style.display='flex';
}
function closePCP(){ document.getElementById('pc-panel').style.display='none'; }
function selVariant(el){
  var id=parseInt(el.dataset.vid), v=null;
  for(var i=0;i<ROSTER.pcVars.length;i++) if(ROSTER.pcVars[i].id===id){v=ROSTER.pcVars[i];break;}
  if(!v) return; closePCP();

// ── DRAG ──
var _D={id:null,el:null,fw:null,moved:false};
function tokTS(e){
  if(e.cancelable) e.preventDefault();
  var el=e.currentTarget;
  _D.id=parseInt(el.dataset.pid);
  _D.el=el;_D.moved=false;
  _D.fw=document.getElementById('fw');
  el.style.zIndex='20';
}
document.addEventListener('touchmove',function(e){
  if(_D.id===null||!_D.fw) return;
  if(e.cancelable) e.preventDefault();
  _D.moved=true;
  var t=e.touches[0], fr=_D.fw.getBoundingClientRect();
  var x=t.clientX-fr.left-_D.el.offsetWidth/2;
  var y=t.clientY-fr.top-_D.el.offsetHeight/2;
  var px=Math.max(0,Math.min(fr.width-_D.el.offsetWidth,x));
  var py=Math.max(0,Math.min(fr.height-_D.el.offsetHeight,y));
  _D.el.style.left=px+'px';
  _D.el.style.top=py+'px';
  MATCH.pos[_D.id]={x:Math.round((px+_D.el.offsetWidth/2)/fr.width*100),y:Math.round((py+_D.el.offsetHeight/2)/fr.height*100)};
  MATCH.posDragged[_D.id]=1;
},{passive:false});
document.addEventListener('touchend',function(){
  if(_D.id===null) return;
  if(!_D.moved) tapTok(_D.el);
  _D.el.style.zIndex='';
  _D.id=null;_D.el=null;_D.fw=null;
  save();
});

// ── HDR ──
function rHdr(){
  var td=document.getElementById('tmr');if(!td)return;

  var phases={pre:'PRE-PARTIDO',ended:'FINALIZADO',b12:'DESCANSO',b23:'MEDIO TIEMPO',b34:'DESCANSO'};
  var ph=document.getElementById('tmr-phase');

    var h='';
    for(var q=1;q<=4;q++){
      var done=false;
      for(var i=0;i<MATCH.qLog.length;i++) if(MATCH.qLog[i].num===q){done=true;break;}
      h+='<div class="qpip'+(done?' qpip-d':MATCH.phase===('q'+q)?' qpip-a':'')+'"></div>';

  openMod('<div class="mod-ttl">RIVAL</div>'+
    '<select class="finp" id="riv-sel" style="margin-bottom:10px" onchange="rivChg(this)">'+opts+'</select>'+
    '<div id="riv-cw" style="display:none;margin-bottom:10px"><input class="finp" id="riv-cust" placeholder="Codigo FIH"></div>'+
    '<div class="mod-acts"><button class="btn-r" style="flex:1" onclick="setRiv()">OK</button><button class="btn-n" onclick="closeMod()">CANCELAR</button></div>');
}
function rivChg(sel){ var cw=document.getElementById('riv-cw');if(cw)cw.style.display=sel.value==='OTHER'?'block':'none'; }
function setRiv(){
  var sel=document.getElementById('riv-sel');if(!sel)return;
  if(sel.value==='OTHER'){var c=document.getElementById('riv-cust');if(c&&c.value.trim())ROSTER.rival=c.value.trim().toUpperCase();}
  else ROSTER.rival=sel.value;
  closeMod();save();rHdr();if(CUR===2)rPartido();
}

// ── NEW MATCH ──
function openNewMatch(){
  openMod('<div class="mod-ttl">NUEVO PARTIDO</div>'+
    '<div style="font-size:11px;color:var(--t2);margin-bottom:14px">'+
    '<b>Se conserva:</b> plantilla, roles y variantes PC.<br>'+
    '<b>Se borra:</b> programacion, marcador y log de partido.</div>'+
    '<div class="mod-acts">'+
    '<button class="btn-r" style="flex:1" onclick="doNewMatch()">CONFIRMAR</button>'+
    '<button class="btn-n" onclick="closeMod()">CANCELAR</button></div>');
}
function doNewMatch(){
  closeMod();
  MATCH.pairs=[];MATCH.mirror=true;MATCH.curQ=1;
  MATCH.phase='pre';MATCH.running=false;MATCH.qElapsed=0;MATCH.matchTime=0;MATCH.breakCd=0;
  MATCH.score={h:0,a:0};MATCH.qLog=[];MATCH.log=[];MATCH.execIds=[];MATCH.alerted={};
  MATCH.events=[];MATCH.pos={};MATCH.posDragged={};
  stopTmr();clearInterval(stopInt);
  hideBrk();
  // Re-init positions
  for(var i=0;i<POOL.length;i++) MATCH.pos[POOL[i].id]={x:50,y:50};
  save();rHdr();go(0);
  toast('Nuevo partido. Plantilla conservada, programacion borrada.','ok');
}

// ══════════════════════════════════════════════════
// INFORME
// ══════════════════════════════════════════════════
function rInforme(){
  var el=document.getElementById('inf-content');if(!el)return;
  var h='<div style="font-size:12px;font-weight:800;margin-bottom:14px">ESP '+MATCH.score.h+' - '+MATCH.score.a+' '+ROSTER.rival+' &middot; '+ft(MATCH.matchTime)+'</div>';
  var subs=MATCH.log.filter(function(e){return e.type==='sub';});
  h+='<span class="lbl">CAMBIOS</span>';
  if(!subs.length) h+='<div style="color:var(--t2);font-size:10px;margin-bottom:12px">Sin cambios registrados</div>';
  for(var i=0;i<subs.length;i++){
    var ev=subs[i], pO=gP(ev.outId), pI=gP(ev.inId);
    var qn=Math.floor(ev.sec/QD)+1, cd=ft(Math.max(0,QD-(ev.sec%QD)));
    h+='<div class="inf-row">'+
       '<span style="font-size:10px;font-weight:800;color:var(--a);min-width:48px;font-family:monospace">'+cd+' Q'+qn+'</span>'+
       '<span style="font-size:11px;color:var(--r);font-weight:700">SALE #'+(pO?pO.num:'?')+' '+(pO?pO.nick:'')+'</span>'+
       '<span style="color:var(--t3);margin:0 4px">&#8594;</span>'+
       '<span style="font-size:11px;color:var(--g);font-weight:700">ENTRA #'+(pI?pI.num:'?')+' '+(pI?pI.nick:'')+'</span>'+
       '</div>';
  }
  var conv=ROSTER.squad.concat(ROSTER.bench);
  h+='<span class="lbl" style="margin-top:14px">TIEMPOS DE JUEGO</span>';
  for(var i=0;i<conv.length;i++){
    var p=gP(conv[i]);if(!p)continue;
    var pt=playedTime(conv[i]), pct=MATCH.matchTime>0?Math.round(pt/MATCH.matchTime*100):0;
    h+='<div style="background:var(--card);border:1.5px solid var(--bd);border-radius:9px;padding:9px 12px;margin-bottom:5px">'+
       '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'+
       '<span style="font-size:11px;font-weight:700">#'+p.num+' '+p.nick+'</span>'+
       '<span style="font-size:10px;color:var(--g);font-weight:700;font-family:monospace">'+ft(pt)+'</span></div>'+
       '<div class="inf-bar-wrap"><div class="inf-bar-fill" style="width:'+pct+'%"></div></div></div>';
  }
  h+='<div style="display:flex;gap:8px;margin-top:16px">'+
     '<button class="btn-r" style="flex:1" onclick="exportXML()">EXPORTAR XML</button>'+
     '<button class="btn-n" style="flex:1" onclick="openNewMatch()">NUEVO PARTIDO</button></div>';
  el.innerHTML=h;
}

function exportXML(){
  var iid=1, lines=[
    '<?xml version="1.0" encoding="utf-8"?>',
    '<file>',
    '  <ALL_INSTANCES>'
  ];
  var conv=ROSTER.squad.concat(ROSTER.bench);
  for(var ci=0;ci<conv.length;ci++){
    var id=conv[ci], segs=[], inF=false, seg=null, init=null;
    for(var i=0;i<MATCH.log.length;i++) if(MATCH.log[i].type==='init'){init=MATCH.log[i];break;}
    if(init&&init.ids&&init.ids.indexOf(id)>=0){inF=true;seg=0;}
    for(var i=0;i<MATCH.log.length;i++){
      var e=MATCH.log[i];if(e.type!=='sub')continue;
      if(e.outId===id&&inF){segs.push({s:seg,e:e.sec});inF=false;seg=null;}
      if(e.inId===id&&!inF){inF=true;seg=e.sec;}
    }
    if(inF&&seg!==null)segs.push({s:seg,e:MATCH.matchTime});
    var p=gP(id);
    for(var si=0;si<segs.length;si++){
      lines.push('    <instance><ID>'+iid+'</ID><start>'+segs[si].s+'</start><end>'+segs[si].e+'</end><code>'+(p?p.name:id)+'</code></instance>');
      iid++;
    }
  }
  for(var i=0;i<MATCH.events.length;i++){
    var ev=MATCH.events[i];
    lines.push('    <instance><ID>'+iid+'</ID><start>'+ev.start+'</start><end>'+ev.end+'</end><code>'+ev.lbl+'</code></instance>');
    iid++;
  }
  for(var i=0;i<MATCH.qLog.length;i++){
    var q=MATCH.qLog[i];
    lines.push('    <instance><ID>'+iid+'</ID><start>'+q.start+'</start><end>'+q.end+'</end><code>Quarters_Time</code></instance>');
    iid++;
  }
  lines.push('  </ALL_INSTANCES>','</file>','');
  var blob=new Blob([lines.join('\n')],{type:'application/xml'});

  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='Logs-'+new Date().toISOString().slice(0,10)+'_ESP-'+ROSTER.rival+'.xml';
  a.click();URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════════
// ROSTER EXPORT / IMPORT
// ══════════════════════════════════════════════════
function exportRoster(){
  var data={
    pool:POOL,
    squad:ROSTER.squad,
    bench:ROSTER.bench,
    roles:ROSTER.roles,
    pcVars:ROSTER.pcVars,
    nextVid:ROSTER.nextVid,
    rival:ROSTER.rival,
    exported:new Date().toISOString().slice(0,10),
    version:'rs27'
  };
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url;
  a.download='RedSticks-Plantilla-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Plantilla exportada','ok');
}
function importRoster(){
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(d.pool&&d.pool.length){
          POOL.length=0;
          for(var i=0;i<d.pool.length;i++) POOL.push(d.pool[i]);
        }
        if(d.squad) ROSTER.squad=d.squad;
        if(d.bench) ROSTER.bench=d.bench;
        if(d.roles) ROSTER.roles=d.roles;
        if(d.pcVars) ROSTER.pcVars=d.pcVars;
        if(d.nextVid) ROSTER.nextVid=d.nextVid;
        if(d.rival) ROSTER.rival=d.rival;
        save();
        rPlantilla();
        toast('Plantilla importada correctamente','ok');
      }catch(err){
        toast('Error al importar: archivo invalido','urgent');
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ══════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════
var LS='redsticks-esp-absoluta', _st=null;
function save(){ clearTimeout(_st); _st=setTimeout(doSave,1500); }
setInterval(doSave,15000);
function doSave(){
  try{
    localStorage.setItem(LS,JSON.stringify({
      roster:{
        squad:ROSTER.squad, bench:ROSTER.bench,
        roles:ROSTER.roles, pcVars:ROSTER.pcVars,
        nextVid:ROSTER.nextVid, rival:ROSTER.rival
      },
      match:{
        pairs:MATCH.pairs, mirror:MATCH.mirror, curQ:MATCH.curQ,
        phase:MATCH.phase, qElapsed:MATCH.qElapsed,
        matchTime:MATCH.matchTime, breakCd:MATCH.breakCd,
        score:MATCH.score, qLog:MATCH.qLog, log:MATCH.log,
        execIds:MATCH.execIds, alerted:MATCH.alerted,
        events:MATCH.events, pos:MATCH.pos, posDragged:MATCH.posDragged
      },
      pool:POOL
    }));
  }catch(e){console.warn('save',e);}
}
function doLoad(){
  try{
    var raw=localStorage.getItem(LS); if(!raw) return false;
    var d=JSON.parse(raw);
    if(d.pool&&d.pool.length){
      POOL.length=0;
      for(var i=0;i<d.pool.length;i++) POOL.push(d.pool[i]);
    }
    if(d.roster){
      var r=d.roster;
      if(r.squad) ROSTER.squad=r.squad;
      if(r.bench) ROSTER.bench=r.bench;
      if(r.roles) ROSTER.roles=r.roles;
      if(r.pcVars) ROSTER.pcVars=r.pcVars;
      if(r.nextVid) ROSTER.nextVid=r.nextVid;
      if(r.rival) ROSTER.rival=r.rival;
    }
    if(d.match){
      var m=d.match;
      var keys=['pairs','mirror','curQ','phase','qElapsed','matchTime','breakCd',
                'score','qLog','log','execIds','alerted','events','pos','posDragged'];
      for(var i=0;i<keys.length;i++) if(m[keys[i]]!==undefined) MATCH[keys[i]]=m[keys[i]];
    }
    return true;
  }catch(e){console.warn('load',e);return false;}
}

// ── START ──
initROSTER();
doLoad();
go(0);
</script>
